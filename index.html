  }

  if(t.step==='errorReview'&&t.item){
    const err = t.item;
    const meta = mk('div','flex');meta.style.cssText='gap:6px;margin-bottom:.5rem;flex-wrap:wrap';
    const disc = getDiscipline(err.disciplineId);
    if(disc){
      const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
      const dot = mk('span','disc-dot');dot.style.background=disc.color;
      const dn = mk('span');dn.textContent=disc.name;
      dTag.appendChild(dot);dTag.appendChild(dn);
      meta.appendChild(dTag);
    }
    const trTag = mk('span','badge b-err');trTag.textContent=TRAP_TYPES[err.trapType||0];
    meta.appendChild(trTag);
    const lbl = mk('span','txt3');lbl.textContent='Erro recente · revise rápido';
    meta.appendChild(lbl);
    wrap.appendChild(meta);

    const qc = mk('div','card fade');
    const qt = mk('p','txt');qt.style.margin='0';qt.textContent=err.question;
    qc.appendChild(qt);
    wrap.appendChild(qc);

    const ans = mk('div','meta-box');ans.style.marginTop='.75rem';
    const p1 = mk('p');p1.style.margin='0';p1.innerHTML=`<strong>Gabarito:</strong> ${err.correctAnswer}`;
    ans.appendChild(p1);
    if(err.explanation){
      const p2 = mk('p');p2.style.margin='0';p2.textContent=err.explanation;
      ans.appendChild(p2);
    }
    if(err.trap){
      const p3 = mk('p');p3.style.margin='0';p3.innerHTML=`<strong>Armadilha:</strong> ${err.trap}`;
      ans.appendChild(p3);
    }
    wrap.appendChild(ans);

    const actions = mk('div','flex');actions.style.cssText='margin-top:.875rem;gap:8px;flex-wrap:wrap';
    const genBtn = mkBtn('🎴 Virar flashcard','btn');
    genBtn.style.cssText='border-color:var(--accent);color:var(--accent-text);background:var(--accent-light)';
    genBtn.addEventListener('click',async()=>{
      genBtn.disabled=true;genBtn.textContent='Gerando...';
      try{
        const prompt = `QUESTÃO: ${err.question}\nGABARITO: ${err.correctAnswer}\nEXPLICAÇÃO: ${err.explanation||''}\nARMADILHA: ${err.trap||''} (${TRAP_TYPES[err.trapType||0]})\nTÓPICO: ${err.topic||''}\n\nGere o flashcard.`;
        const res = await callAPI(SYS_CARD_FROM_ERROR,[{role:'user',content:prompt}]);
        DATA.srs.cards.push({
          id:Date.now()+''+Math.random(),front:res.front,back:res.back,
          type:res.type||'concept',tags:res.tags||[err.topic||''],
          disciplineId:err.disciplineId,nextReview:Date.now(),
          interval:0,ease:2.5,reviews:0,createdAt:Date.now(),fromErrorId:err.id
        });
        err.hasCard=true;
        ST.turbo.stats.errors+=1;
        save();
        turboNext();
      }catch(e){
        alert('Erro ao gerar: '+(e.message||e));
        genBtn.disabled=false;genBtn.textContent='🎴 Virar flashcard';
      }
    });
    const skipBtn = mkBtn('Dispensar →','btn');
    skipBtn.addEventListener('click',()=>turboDismissError(err));
    actions.appendChild(genBtn);actions.appendChild(skipBtn);
    wrap.appendChild(actions);
    return wrap;
  }

  if(t.step==='question'&&t.q){
    wrap.appendChild(questionCard(t.q));
    if(!t.fb){
      wrap.appendChild(answerButtons(turboSubmitAnswer,t.answered||t.loading));
    } else {
      wrap.appendChild(feedbackCard(t.fb,turboNext,'Próximo item →'));
    }
    return wrap;
  }

  // Fallback
  wrap.appendChild(loading('Preparando...'));
  return wrap;
}

/* IMPORTED QUESTIONS — manual import without AI */
function renderImported(){
  const wrap = mk('div','fade');
  const h = mk('h1');h.textContent='📚 Banco de Questões';
  const sub = mk('p','txt2');sub.style.marginBottom='1rem';
  sub.textContent='Suas questões — importadas do TEC ou geradas pela IA durante prática. Organize em cadernos temáticos.';
  wrap.appendChild(h);wrap.appendChild(sub);

  const sub2 = ST.importedSubview||'list';
  const st = mk('div','sub-tabs');
  [['list','Banco'],['notebooks','Cadernos'],['import','+ Adicionar'],['practice','Praticar']].forEach(([v,lbl])=>{
    const t = mkBtn(lbl,'sub-tab'+(sub2===v?' on':''));
    t.addEventListener('click',()=>{
      ST.importedSubview=v;
      ST.importedCurrent=null;ST.importedAnswered=false;
      // Reset notebook practice state when leaving notebooks
      if(v!=='notebooks')ST.notebookPracticeCurrent=null;
      render();
    });
    st.appendChild(t);
  });
  wrap.appendChild(st);

  if(sub2==='list')return renderImportedList(wrap);
  if(sub2==='notebooks')return renderNotebooks(wrap);
  if(sub2==='import')return renderImportedImport(wrap);
  if(sub2==='practice')return renderImportedPractice(wrap);
  return wrap;
}

function renderImportedList(wrap){
  const bank = DATA.importedQuestions||[];
  if(bank.length===0){
    wrap.appendChild(infoBox('Nenhuma questão no banco ainda. Importe questões via aba "Importar" ou pratique com IA — questões geradas pela IA são salvas automaticamente aqui.'));
    return wrap;
  }

  // Unified filters
  wrap.appendChild(renderBankFilters('importedFilters',bank));
  const f = getBankFilters('importedFilters');
  const filtered = applyBankFilters(bank,f);

  // SORT CONTROL
  const sortControl = buildSortControl({
    prefKey:'bankOrder',
    defaultValue:'recent',
    options:[
      {value:'recent',label:'Mais recente',icon:'🕒'},
      {value:'mostPracticed',label:'Mais praticado',icon:'🎯',tip:'Questões com mais tentativas'},
      {value:'lowestAcc',label:'Pior aproveitamento',icon:'📉',tip:'Menor % de acerto primeiro'},
      {value:'discipline',label:'Disciplina',icon:'📚'}
    ]
  });
  wrap.appendChild(sortControl);

  const stats = mk('p','txt3');stats.style.marginBottom='.75rem';
  stats.textContent = `${filtered.length} questão${filtered.length===1?'':'ões'} (de ${bank.length} no total)`;
  wrap.appendChild(stats);

  if(filtered.length===0){
    wrap.appendChild(infoBox('Nenhuma questão corresponde aos filtros aplicados.'));
    return wrap;
  }

  // Apply sort
  const sortKey = (DATA.sortPrefs||{}).bankOrder || 'recent';
  let sorted;
  if(sortKey==='recent'){
    sorted = filtered.slice().reverse(); // recent first (latest indexes)
  } else if(sortKey==='mostPracticed'){
    sorted = applySort(filtered,'mostPracticed',(it)=>it.attempts||0);
  } else if(sortKey==='lowestAcc'){
    sorted = applySort(filtered,'lowestAcc',(it)=>{
      if(!it.attempts||it.attempts===0)return -1; // sem dados primeiro
      return -((it.correctCount||0)/it.attempts); // negativa pra baixo→cima
    });
  } else if(sortKey==='discipline'){
    sorted = applySort(filtered,'discipline',(it)=>{
      const d = getDiscipline(it.disciplineId);
      return d?d.name:'zzz';
    });
  } else {
    sorted = filtered.slice().reverse();
  }

  sorted.forEach(q=>{
    const it = mk('div','card card-pad');it.style.marginBottom='.5rem';
    // Highlight if we navigated here from an error
    if(ST.bankHighlightId===q.id){
      it.classList.add('card-highlighted');
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          try{it.scrollIntoView({behavior:'smooth',block:'center'});}
          catch(_){it.scrollIntoView();}
        });
      });
      setTimeout(()=>{delete ST.bankHighlightId;},4000);
    }
    const meta = mk('div','flex');meta.style.cssText='gap:6px;margin-bottom:.5rem;flex-wrap:wrap';
    // Source badge — distinguishes AI from imported
    const srcChip = mk('span','badge');
    if(q.source==='ai'){
      srcChip.style.cssText='background:rgba(108,92,231,.15);color:#6C5CE7';
      srcChip.textContent='🤖 IA'+(q.aiMethod?' · '+q.aiMethod:'');
    } else {
      srcChip.style.cssText='background:rgba(24,95,165,.15);color:var(--blue-text)';
      srcChip.textContent='📋 TEC';
    }
    meta.appendChild(srcChip);
    const kindChip = mk('span','badge b-info');
    kindChip.textContent = q.kind==='MC'?'Múltipla escolha':'C/E';
    meta.appendChild(kindChip);
    const disc = getDiscipline(q.disciplineId);
    if(disc){
      const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
      const dot = mk('span','disc-dot');dot.style.background=disc.color;
      const dn = mk('span');dn.textContent=disc.name;
      dTag.appendChild(dot);dTag.appendChild(dn);meta.appendChild(dTag);
    }
    if(q.topic){const tp = mk('span','topic-tag');tp.textContent=q.topic;tp.style.marginBottom='0';meta.appendChild(tp);}
    const gb = mk('span','badge '+(q.kind==='MC'||q.answer==='C'?'b-ok':'b-err'));
    gb.textContent='Gab: '+(q.answer||'?');
    meta.appendChild(gb);
    if(q.attempts){
      const pct = Math.round((q.correctCount||0)/q.attempts*100);
      const at = mk('span','badge '+(pct>=60?'b-ok':'b-err'));
      at.textContent=`${q.correctCount||0}/${q.attempts} (${pct}%)`;
      meta.appendChild(at);
    }
    // Show notebooks containing this question
    const inNbs = notebooksContaining(q.id);
    if(inNbs.length>0){
      const nbsTag = mk('span','badge');nbsTag.style.cssText='background:rgba(108,92,231,.15);color:#6C5CE7';
      nbsTag.textContent='📒 '+inNbs.length+' caderno'+(inNbs.length>1?'s':'');
      nbsTag.title = inNbs.map(n=>n.name).join(', ');
      meta.appendChild(nbsTag);
    }
    // Add to notebook button
    const addNbBtn = mkBtn('+ Caderno','btn btn-sm');addNbBtn.style.marginLeft='auto';
    addNbBtn.addEventListener('click',()=>showAddToNotebookModal(q.id));
    meta.appendChild(addNbBtn);
    // Ver na matéria
    if(q.topic){
      const mapBtn = mkBtn('🗺️','btn btn-sm');mapBtn.title='Ver no Mapa da Matéria';
      mapBtn.addEventListener('click',()=>mapNavigate(q.disciplineId,q.topic));
      meta.appendChild(mapBtn);
    }
    const del = mkBtn('×','icon-btn del');
    del.addEventListener('click',()=>{if(confirm('Remover esta questão? Será removida também de todos os cadernos.')){
      DATA.importedQuestions=DATA.importedQuestions.filter(x=>x.id!==q.id);
      // Also clean from notebooks
      (DATA.notebooks||[]).forEach(nb=>{nb.questionIds=nb.questionIds.filter(id=>id!==q.id);});
      save();render();
    }});
    meta.appendChild(del);
    it.appendChild(meta);
    if(q.meta){
      const mt = mk('p','txt3');mt.style.cssText='margin-bottom:4px;font-size:10.5px';
      mt.textContent=q.meta;
      it.appendChild(mt);
    }
    const qt = mk('p','txt');qt.style.cssText='margin:0;white-space:pre-wrap';
    qt.textContent=q.enunciado;
    it.appendChild(qt);
    if(q.kind==='MC'&&q.alternatives){
      const altWrap = mk('div');altWrap.style.cssText='margin-top:.5rem;padding-left:4px';
      q.alternatives.forEach(alt=>{
        const line = mk('p','txt2');line.style.cssText='margin:2px 0';
        const isCorrect = q.answer===alt.letter;
        line.innerHTML=`<b${isCorrect?' style="color:var(--accent-text)"':''}>${alt.letter})</b> ${alt.text}`;
        altWrap.appendChild(line);
      });
      it.appendChild(altWrap);
    }
    if(q.sourceUrl){
      const srcLink = mk('a');
      srcLink.href = q.sourceUrl.startsWith('http')?q.sourceUrl:'https://'+q.sourceUrl;
      srcLink.target='_blank';srcLink.rel='noopener';
      srcLink.textContent='Ver no TEC ↗';
      srcLink.style.cssText='font-size:11.5px;display:inline-block;margin-top:6px';
      it.appendChild(srcLink);
    }
    if(q.source==='ai'&&q.seenCount>1){
      const sn = mk('p','txt3');sn.style.cssText='margin-top:6px;font-size:10.5px;color:var(--text3)';
      sn.textContent=`A IA tentou gerar esta questão ${q.seenCount}× (deduplicada automaticamente).`;
      it.appendChild(sn);
    }
    // Link contextual: se essa questão já gerou erro(s), mostra chip pra ir até o histórico
    const relatedErrors = findErrorsFromBankQuestion(q.id);
    if(relatedErrors.length>0){
      const row = mk('div');row.style.cssText='margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center';
      const lbl = mk('span','txt3');lbl.style.cssText='font-size:11px';
      lbl.textContent = relatedErrors.length===1?'Você errou esta questão antes:':`Você errou esta questão ${relatedErrors.length}× antes:`;
      row.appendChild(lbl);
      // Pega o erro mais recente
      const lastErr = relatedErrors.sort((a,b)=>(b.date||0)-(a.date||0))[0];
      const link = mk('button','entity-link');
      link.innerHTML = '<span class="el-icon">✗</span><span>Ver no histórico</span>';
      link.title='Abrir o erro registrado para esta questão';
      link.addEventListener('click',()=>navigateToError(lastErr.id,{label:'Banco de questões'}));
      row.appendChild(link);
      it.appendChild(row);
    }
    wrap.appendChild(it);
  });
  return wrap;
}

function renderImportedImport(wrap){
  const card = mk('div','card');
  card.appendChild(sLabel('Importar questões'));

  // How-to (collapsible)
  const howto = mk('div','import-howto');
  const htHead = mk('button','import-howto-head');
  const htExpanded = ST.importHowtoOpen||false;
  htHead.innerHTML = `<span>💡 Como exportar do TEC Concursos</span><span class="howto-caret">${htExpanded?'▼':'▶'}</span>`;
  htHead.addEventListener('click',()=>{ST.importHowtoOpen=!htExpanded;render();});
  howto.appendChild(htHead);
  if(htExpanded){
    const body = mk('div','import-howto-body');
    body.innerHTML = `
      <p><b>Passo a passo:</b></p>
      <ol>
        <li>No TEC, abra o caderno ou lista de questões que deseja importar.</li>
        <li>Clique em <b>Imprimir</b> no menu superior.</li>
        <li>Configure:
          <ul>
            <li><b>Imprimir gabaritos:</b> "Junto com cada questão"</li>
            <li><b>Imprimir cabeçalho:</b> "Com matéria e assunto"</li>
            <li><b>Quantidade máxima de questões:</b> o total desejado</li>
            <li><b>Imprimir QR code:</b> Não (recomendado)</li>
          </ul>
        </li>
        <li>Clique em <b>IMPRIMIR CADERNO</b>. Na janela de impressão, escolha <b>"Salvar como PDF"</b>.</li>
        <li>Volte aqui e <b>carregue o PDF</b> usando o botão abaixo, ou copie o texto manualmente.</li>
      </ol>
      <p class="muted">O sistema remove automaticamente cabeçalhos, URLs de ordenação e QR codes do PDF do TEC.</p>
    `;
    howto.appendChild(body);
  }
  card.appendChild(howto);

  // Import mode tabs
  const modeRow = mk('div','flex');modeRow.style.cssText='gap:6px;margin:1rem 0 .75rem';
  const mode = ST.importMode||'text';
  [['text','📝 Colar texto'],['pdf','📄 Importar PDF']].forEach(([v,lbl])=>{
    const b = mk('button','filter-chip'+(mode===v?' on':''));
    b.textContent=lbl;
    b.addEventListener('click',()=>{ST.importMode=v;render();});
    modeRow.appendChild(b);
  });
  card.appendChild(modeRow);

  if(mode==='pdf'){
    // PDF upload area
    const pdfArea = mk('div','pdf-import-area');
    if(ST.importPdfLoading){
      pdfArea.innerHTML = '<div class="loading-row"><span class="spinner"></span> <span id="pdf-import-progress">'+(ST.importPdfProgress||'Processando PDF...')+'</span></div>';
    } else {
      const uploadLbl = mk('label','pdf-upload-btn');
      uploadLbl.innerHTML = '<span class="sib-icon">📄</span><span class="sib-body"><b>Selecionar PDF do TEC</b><span>Extrai texto e limpa cabeçalhos automaticamente</span></span>';
      const pdfInp = mk('input');pdfInp.type='file';pdfInp.accept='.pdf,application/pdf';pdfInp.style.display='none';
      pdfInp.addEventListener('change',async e=>{
        const file = e.target.files[0];if(!file)return;
        ST.importPdfLoading = true;
        ST.importPdfProgress = 'Carregando...';
        render();
        try{
          const text = await extractPdfText(file,(curr,total)=>{
            ST.importPdfProgress = `Extraindo página ${curr}/${total}...`;
            const progEl = document.getElementById('pdf-import-progress');
            if(progEl)progEl.textContent = ST.importPdfProgress;
          });
          // Clean TEC-specific header noise
          const cleaned = cleanTecPdfText(text);
          ST.importInput.text = cleaned;
          ST.importPreview = parseImportedQuestions(cleaned);
          ST.importPdfLoading = false;
          ST.importPdfProgress = null;
          const parsed = ST.importPreview.filter(q=>q.answer).length;
          if(parsed===0){
            showToast('⚠ Nenhuma questão identificada. Revise o texto extraído e ajuste se necessário.');
          } else {
            showToast(`✓ ${parsed} questão(ões) extraída(s) do PDF.`);
          }
          render();
        }catch(err){
          ST.importPdfLoading = false;
          ST.importPdfProgress = null;
          alert('Erro ao processar PDF: '+(err.message||err));
          render();
        }
      });
      uploadLbl.appendChild(pdfInp);
      uploadLbl.addEventListener('click',()=>pdfInp.click());
      pdfArea.appendChild(uploadLbl);
      const hint = mk('p','txt3');hint.style.cssText='margin-top:.5rem;font-size:11.5px;line-height:1.5';
      hint.innerHTML = 'O texto extraído aparecerá abaixo para você revisar. O parser detecta questões C/E e múltipla escolha automaticamente. Se o TEC mudou o layout e algo não for detectado, ajuste o texto manualmente antes de salvar.';
      pdfArea.appendChild(hint);
    }
    card.appendChild(pdfArea);
  }

  // Text area — always shown (PDF extraction puts content here for editing)
  const textLbl = mk('label');textLbl.textContent = mode==='pdf' ? 'Texto extraído (editável)' : 'Cole o texto aqui';
  textLbl.style.marginTop = mode==='pdf'?'1rem':'.75rem';
  card.appendChild(textLbl);
  if(mode==='text'){
    const tip = mk('p','txt2');tip.style.cssText='margin:0 0 .5rem;font-size:12px';
    tip.innerHTML='<b>Formatos aceitos:</b> TEC Concursos (URL + cabeçalho + enunciado + alternativas + "Gabarito: X") ou formato simples (questões separadas por linha em branco, gabarito em "Gabarito: C" ou linha própria).';
    card.appendChild(tip);
  }
  const ta = mk('textarea');ta.rows=10;
  ta.placeholder='Cole questões do TEC Concursos (com URL e cabeçalho) ou texto simples.';
  ta.value=ST.importInput.text;
  ta.addEventListener('input',e=>{
    ST.importInput.text=e.target.value;
    ST.importPreview=parseImportedQuestions(e.target.value);
    renderPreviewInto(previewArea);
    saveBtn.disabled = ST.importPreview.filter(q=>q.answer).length===0;
  });
  card.appendChild(ta);

  const row = mk('div','grid g2');row.style.marginTop='.75rem';
  const col1 = mk('div');
  const lbl1 = mk('label');lbl1.textContent='Disciplina';
  const selD = mk('select');
  DATA.disciplines.forEach(d=>{
    const o = mk('option');o.value=d.id;o.textContent=d.name;
    if(ST.importInput.disciplineId===d.id)o.selected=true;
    selD.appendChild(o);
  });
  selD.addEventListener('change',e=>{ST.importInput.disciplineId=e.target.value;});
  col1.appendChild(lbl1);col1.appendChild(selD);
  const col2 = mk('div');
  const lbl2 = mk('label');lbl2.textContent='Tópico (opcional)';
  const inpT = mk('input');inpT.type='text';inpT.placeholder='Ex: Ciclo de inteligência';
  inpT.value=ST.importInput.topic;
  inpT.addEventListener('input',e=>{ST.importInput.topic=e.target.value;});
  col2.appendChild(lbl2);col2.appendChild(inpT);
  row.appendChild(col1);row.appendChild(col2);
  card.appendChild(row);
  wrap.appendChild(card);

  const previewTitle = sLabel('Preview (antes de salvar)');
  previewTitle.style.marginTop='1.25rem';
  wrap.appendChild(previewTitle);
  const previewArea = mk('div');
  wrap.appendChild(previewArea);

  function renderPreviewInto(container){
    container.innerHTML='';
    const preview = ST.importPreview||[];
    if(preview.length===0){
      const p = mk('p','txt3');p.textContent='Cole texto no campo acima para ver o preview.';
      container.appendChild(p);return;
    }
    const parsed = preview.filter(q=>q.answer).length;
    const pending = preview.filter(q=>q.needsAnswer).length;
    const mc = preview.filter(q=>q.kind==='MC').length;
    const ce = preview.filter(q=>q.kind==='CE'&&q.answer).length;
    const summary = mk('p','txt2');summary.style.marginBottom='.5rem';
    summary.innerHTML = `<b>${parsed}</b> questão(ões) com gabarito${ce>0?` · <span style="color:var(--accent-text)">${ce} C/E</span>`:''}${mc>0?` · <span style="color:var(--blue-text)">${mc} múltipla escolha</span>`:''}${pending>0?` · <span style="color:var(--amber-text)">${pending} sem gabarito</span>`:''}`;
    container.appendChild(summary);
    preview.forEach((q,i)=>{
      const it = mk('div','card card-pad');it.style.marginBottom='.5rem';
      const headRow = mk('div','flex');headRow.style.cssText='gap:6px;margin-bottom:4px;flex-wrap:wrap;align-items:center';
      const num = mk('span','txt3');num.textContent='Q'+(i+1);
      headRow.appendChild(num);
      if(q.kind==='MC'){
        const k = mk('span','badge b-info');k.textContent='Múltipla escolha';headRow.appendChild(k);
      } else {
        const k = mk('span','badge b-info');k.textContent='C/E';headRow.appendChild(k);
      }
      if(q.meta){
        const mt = mk('span','txt3');mt.style.fontSize='10.5px';mt.textContent=q.meta.slice(0,60)+(q.meta.length>60?'...':'');
        headRow.appendChild(mt);
      }
      it.appendChild(headRow);
      const qt = mk('p','txt');qt.style.cssText='margin:.25rem 0;white-space:pre-wrap';qt.textContent=q.enunciado;
      it.appendChild(qt);
      // Show alternatives for MC
      if(q.kind==='MC'&&q.alternatives){
        const altWrap = mk('div');altWrap.style.cssText='margin:.5rem 0;padding-left:4px';
        q.alternatives.forEach(alt=>{
          const line = mk('p','txt2');line.style.cssText='margin:2px 0';
          const isCorrect = q.answer===alt.letter;
          line.innerHTML=`<b${isCorrect?' style="color:var(--accent-text)"':''}>${alt.letter})</b> ${alt.text}`;
          altWrap.appendChild(line);
        });
        it.appendChild(altWrap);
      }
      if(q.answer){
        const bg = mk('span','badge '+(q.kind==='MC'||q.answer==='C'?'b-ok':'b-err'));
        bg.textContent='Gabarito: '+q.answer;
        it.appendChild(bg);
      } else if(q.needsAnswer){
        const ar = mk('div','flex');ar.style.cssText='gap:6px;margin-top:.5rem';
        const lb = mk('span','txt2');lb.textContent='Definir:';
        const bc = mkBtn('Certo','btn btn-sm');
        bc.addEventListener('click',()=>{q.answer='C';delete q.needsAnswer;renderPreviewInto(container);saveBtn.disabled=false;});
        const be = mkBtn('Errado','btn btn-sm');
        be.addEventListener('click',()=>{q.answer='E';delete q.needsAnswer;renderPreviewInto(container);saveBtn.disabled=false;});
        ar.appendChild(lb);ar.appendChild(bc);ar.appendChild(be);
        it.appendChild(ar);
      }
      container.appendChild(it);
    });
  }

  const saveBtn = mkBtn('Salvar no banco →','btn btn-p');saveBtn.style.marginTop='.75rem';
  saveBtn.disabled=true;
  saveBtn.addEventListener('click',()=>{
    const valid = (ST.importPreview||[]).filter(q=>q.answer);
    if(valid.length===0){alert('Nenhuma questão com gabarito válido.');return;}
    valid.forEach(q=>{
      const rec = {
        id:Date.now()+''+Math.random(),
        enunciado:q.enunciado,
        answer:q.answer,
        kind:q.kind||'CE',
        disciplineId:ST.importInput.disciplineId,
        topic:ST.importInput.topic||q.topic||'',
        source:'imported',
        createdAt:Date.now(),
        attempts:0,correctCount:0
      };
      if(q.kind==='MC'&&q.alternatives)rec.alternatives=q.alternatives;
      if(q.meta)rec.meta=q.meta;
      if(q.source)rec.sourceUrl=q.source;
      DATA.importedQuestions.push(rec);
    });
    save();
    alert(`${valid.length} questão(ões) adicionada(s).`);
    ST.importInput.text='';ST.importPreview=[];
    ST.importedSubview='list';
    render();
  });
  wrap.appendChild(saveBtn);

  if(ST.importInput.text){
    ST.importPreview = parseImportedQuestions(ST.importInput.text);
    renderPreviewInto(previewArea);
    saveBtn.disabled = ST.importPreview.filter(q=>q.answer).length===0;
  } else renderPreviewInto(previewArea);

  return wrap;
}

function renderImportedPractice(wrap){
  const bank = DATA.importedQuestions||[];
  if(bank.length===0){
    wrap.appendChild(infoBox('Importe questões primeiro para praticar.'));
    return wrap;
  }
  const actDiscs = activeDisciplines();
  const discsWithQ = actDiscs.filter(d=>bank.some(q=>q.disciplineId===d.id));
  const filter = ST.importedPracticeDisc||'all';
  if(discsWithQ.length>=2){
    const fr = mk('div','disc-filter');fr.style.marginBottom='1rem';
    const allChip = mk('button','disc-chip'+(filter==='all'?' on':''));
    if(filter==='all'){allChip.style.background='var(--surface2)';allChip.style.color='var(--text)';}
    const d1 = mk('span','dot');d1.style.background='var(--text2)';
    const n1 = mk('span');n1.textContent='Todas';
    allChip.appendChild(d1);allChip.appendChild(n1);
    allChip.addEventListener('click',()=>{ST.importedPracticeDisc='all';ST.importedCurrent=null;ST.importedAnswered=false;render();});
    fr.appendChild(allChip);
    discsWithQ.forEach(d=>{
      const chip = mk('button','disc-chip'+(filter===d.id?' on':''));
      if(filter===d.id){chip.style.background=d.color+'22';chip.style.color=d.color;}
      const dot = mk('span','dot');dot.style.background=d.color;
      const nm = mk('span');nm.textContent=d.name;
      chip.appendChild(dot);chip.appendChild(nm);
      chip.addEventListener('click',()=>{ST.importedPracticeDisc=d.id;ST.importedCurrent=null;ST.importedAnswered=false;render();});
      fr.appendChild(chip);
    });
    wrap.appendChild(fr);
  }
  const pool = filter==='all'?bank:bank.filter(q=>q.disciplineId===filter);
  if(pool.length===0){wrap.appendChild(infoBox('Sem questões nessa disciplina.'));return wrap;}
  if(!ST.importedCurrent||!pool.find(q=>q.id===ST.importedCurrent.id)){
    ST.importedCurrent = pool[Math.floor(Math.random()*pool.length)];
    ST.importedAnswered=false;ST.importedAnswer=null;
  }
  const q = ST.importedCurrent;

  const meta = mk('div','flex');meta.style.cssText='gap:6px;margin-bottom:.5rem;flex-wrap:wrap';
  const disc = getDiscipline(q.disciplineId);
  if(disc){
    const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
    const dot = mk('span','disc-dot');dot.style.background=disc.color;
    const dn = mk('span');dn.textContent=disc.name;
    dTag.appendChild(dot);dTag.appendChild(dn);meta.appendChild(dTag);
  }
  if(q.topic){const tp = mk('span','topic-tag');tp.textContent=q.topic;tp.style.marginBottom='0';meta.appendChild(tp);}
  const src = mk('span','badge b-info');src.textContent='📋 Importada';meta.appendChild(src);
  wrap.appendChild(meta);

  const qc = mk('div','card fade');
  const qt = mk('p','txt');qt.style.cssText='margin:0;white-space:pre-wrap';qt.textContent=q.enunciado;
  qc.appendChild(qt);
  // Render alternatives inside the card if MC
  if(q.kind==='MC'&&q.alternatives){
    const altWrap = mk('div');altWrap.style.cssText='margin-top:.875rem;display:flex;flex-direction:column;gap:6px';
    q.alternatives.forEach(alt=>{
      const line = mk('p','txt');line.style.cssText='margin:0;padding:6px 8px;border-radius:var(--rs)';
      if(ST.importedAnswered){
        if(alt.letter===q.answer){line.style.background='var(--accent-light)';line.style.color='var(--accent-text)';}
        else if(alt.letter===ST.importedAnswer){line.style.background='var(--red-light)';line.style.color='var(--red-text)';}
      }
      line.innerHTML = `<b>${alt.letter})</b> ${alt.text}`;
      altWrap.appendChild(line);
    });
    qc.appendChild(altWrap);
  }
  wrap.appendChild(qc);

  if(!ST.importedAnswered){
    if(q.kind==='MC'&&q.alternatives){
      // Letter buttons
      const br = mk('div','grid');br.style.cssText='grid-template-columns:repeat(5,1fr);gap:6px;margin-top:.875rem';
      q.alternatives.forEach(alt=>{
        const b = mkBtn(alt.letter,'btn btn-ans');
        b.style.cssText='padding:10px 4px;font-size:14px;font-weight:700';
        b.addEventListener('click',()=>{
          ST.importedAnswered=true;ST.importedAnswer=alt.letter;
          q.attempts=(q.attempts||0)+1;
          const ok = alt.letter===q.answer;
          if(ok)q.correctCount=(q.correctCount||0)+1;
          DATA.session.total+=1;if(ok)DATA.session.correct+=1;
          updateByDisc(q.disciplineId,ok);
          if(!ok){
            const errRec = logError({question:q.enunciado+'\n\nAlternativas:\n'+q.alternatives.map(a=>`${a.letter}) ${a.text}`).join('\n'),correct_answer:q.answer,explanation:'(questão importada — múltipla escolha)',trap:'',keyword:'',trap_type:0,topic:q.topic||'',method:'imported',sourceBankId:q.id});
            ST.importedLastErrId = errRec.id;
          } else {
            ST.importedLastErrId = null;
          }
          save();render();
        });
        br.appendChild(b);
      });
      wrap.appendChild(br);
    } else {
      // C/E
      const br = mk('div','flex');br.style.marginTop='.875rem';
      ['C','E'].forEach(a=>{
        const b = mkBtn(a==='C'?'Certo':'Errado','btn btn-ans '+(a==='C'?'btn-c':'btn-e'));
        b.addEventListener('click',()=>{
          ST.importedAnswered=true;ST.importedAnswer=a;
          q.attempts=(q.attempts||0)+1;
          const ok = a===q.answer;
          if(ok)q.correctCount=(q.correctCount||0)+1;
          DATA.session.total+=1;if(ok)DATA.session.correct+=1;
          updateByDisc(q.disciplineId,ok);
          if(!ok){
            const errRec = logError({question:q.enunciado,correct_answer:q.answer,explanation:'(questão importada)',trap:'',keyword:'',trap_type:0,topic:q.topic||'',method:'imported',sourceBankId:q.id});
            ST.importedLastErrId = errRec.id;
          } else {
            ST.importedLastErrId = null;
          }
          save();render();
        });
        br.appendChild(b);
      });
      wrap.appendChild(br);
    }
  } else {
    const ok = ST.importedAnswer===q.answer;
    const fb = mk('div','fb-card fade '+(ok?'ok':'err'));
    const badge = mk('span','badge '+(ok?'b-ok':'b-err'));
    badge.textContent = ok?'✓ Correto':`✗ Incorreto · Gabarito: ${q.answer}`;
    fb.appendChild(badge);
    const info = mk('p','txt2');info.style.marginTop='.75rem';
    info.textContent='Questão importada — sem explicação automática. Consulte o comentário original na fonte.';
    fb.appendChild(info);
    const actions = mk('div','flex');actions.style.cssText='margin-top:.875rem;gap:8px;flex-wrap:wrap';
    const nb = mkBtn('Próxima →','btn btn-p');
    nb.addEventListener('click',()=>{
      ST.importedCurrent=null;ST.importedAnswered=false;ST.importedAnswer=null;render();
    });
    actions.appendChild(nb);
    if(q.sourceUrl){
      const srcLink = mk('a');srcLink.href=q.sourceUrl.startsWith('http')?q.sourceUrl:'https://'+q.sourceUrl;
      srcLink.target='_blank';srcLink.rel='noopener';
      srcLink.className='btn';srcLink.style.cssText='font-size:12px;padding:6px 12px;text-decoration:none';
      srcLink.textContent='Ver no TEC ↗';
      actions.appendChild(srcLink);
    }
    if(!ok){
      // Create flashcard button — uses the error just logged
      const errRef = DATA.errors.find(e=>e.id===ST.importedLastErrId);
      if(errRef){
        const ctaRow = mk('div');ctaRow.style.cssText='margin-bottom:.875rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center';
        if(errRef.hasCard){
          const done = mk('div','alert alert-accent');done.style.cssText='margin:0;flex:1;min-width:200px';
          done.innerHTML='✓ <b>Flashcard criado e adicionado ao deck.</b>';
          ctaRow.appendChild(done);
        } else {
          const genBtn = mkBtn('🎴 Criar flashcard deste erro','btn');
          genBtn.style.cssText='border-color:var(--accent);color:var(--accent-text);background:var(--accent-light);font-weight:600';
          genBtn.addEventListener('click',()=>generateCardFromError(errRef,genBtn,null,ctaRow));
          ctaRow.appendChild(genBtn);
        }
        // Ver na matéria
        if(errRef.topic){
          const mapBtn = mkBtn('🗺️ Ver na matéria','btn btn-sm');
          mapBtn.addEventListener('click',()=>mapNavigate(errRef.disciplineId,errRef.topic));
          ctaRow.appendChild(mapBtn);
        }
        fb.insertBefore(ctaRow,actions);
      }
      const exBtn = mkBtn('🤖 Pedir explicação à IA','btn');
      exBtn.addEventListener('click',async()=>{
        exBtn.disabled=true;exBtn.textContent='Pensando...';
        try{
          const qText = q.kind==='MC'?`${q.enunciado}\n\nAlternativas:\n${(q.alternatives||[]).map(a=>`${a.letter}) ${a.text}`).join('\n')}`:q.enunciado;
          const prompt = `QUESTÃO: ${qText}\nGABARITO: ${q.answer}\n\nCandidato respondeu ${ST.importedAnswer} e errou. Explique o gabarito em 2-3 frases, identifique a armadilha e a palavra-gatilho. Responda em JSON:\n{"explanation":"...","trap":"...","keyword":"..."}`;
          const res = await callAPI('Você é professor Cebraspe. Responda SEMPRE em JSON puro, sem markdown.',[{role:'user',content:prompt}]);
          const box = mk('div','meta-box');box.style.marginTop='.75rem';
          const p1 = mk('p');p1.style.margin='0';p1.innerHTML=`<strong>Explicação:</strong> ${res.explanation||''}`;box.appendChild(p1);
          if(res.trap){const p2=mk('p');p2.style.margin='0';p2.innerHTML=`<strong>Armadilha:</strong> ${res.trap}`;box.appendChild(p2);}
          if(res.keyword){const p3=mk('p');p3.style.margin='0';p3.innerHTML=`<strong>Gatilho:</strong> ${res.keyword}`;box.appendChild(p3);}
          fb.insertBefore(box,actions);
          exBtn.remove();
        }catch(e){
          exBtn.disabled=false;exBtn.textContent='🤖 Pedir explicação à IA';
          alert('Erro: '+(e.message||e));
        }
      });
      actions.appendChild(exBtn);
    }
    fb.appendChild(actions);
    wrap.appendChild(fb);
  }
  return wrap;
}

const SYS_REVGEN_CADERNO = `Você gera um CADERNO DE REVISÃO RÁPIDA em formato Markdown, otimizado pra leitura antes de prova.

Regras rígidas:
1. NÃO invente conteúdo que não está nos materiais do usuário. Use apenas o que aparece nas fontes, flashcards e erros informados.
2. Cada tópico solicitado deve ter ESTAS seções (nessa ordem):
   - **💡 Conceito-chave** (2-3 linhas diretas, sem rodeios)
   - **📌 Decoreba** (bullet points curtos, só o essencial, letra da lei, prazos exatos)
   - **🧠 Mnemônico** (frase ou acrônimo memorável — criativo mas plausível)
   - **⚠️ Pegadinhas** (armadilhas típicas de concurso nesse tópico)
3. Markdown limpo. Use títulos H2 para cada tópico. Evite parágrafos longos — estude rápido.
4. Português brasileiro, registro de estudo de concurso (técnico mas conciso).
5. Se não há dados suficientes sobre um tópico, escreva apenas "Sem dados suficientes — estude na fonte diretamente." Não fabrique.

Responda APENAS com o markdown. Sem preâmbulo, sem fecho.`;

const SYS_REVGEN_AUDIO = `Você gera um ROTEIRO DE DIÁLOGO estilo podcast educativo, 3-5 minutos, no formato esperado pelo Google NotebookLM.

Regras rígidas:
1. Dois apresentadores: ANFITRIÃ (curiosa, faz perguntas) e ESPECIALISTA (técnico, explica direto).
2. Formato: linhas alternadas "ANFITRIÃ:" e "ESPECIALISTA:" (sem negrito, letras maiúsculas).
3. Conversa fluida, como se fosse gravação real. Evite frases enlatadas. Use conectivos naturais ("é que", "olha", "não é?").
4. Foco nos tópicos solicitados — diálogo deve ENSINAR os conceitos, mnemônicos e pegadinhas.
5. Inclua 2-3 exemplos práticos (tipo "imagina que você tá fazendo a prova e cai uma questão assim...").
6. Comece com cumprimento natural e termine com encerramento breve.
7. NÃO invente fontes externas. Use apenas o que está nos materiais do usuário.
8. Português brasileiro, tom de podcast de concurso (sério mas leve).

Responda APENAS com o roteiro. Sem preâmbulo, sem fecho, sem narração adicional.`;

function renderRevgen(){
  const wrap = mk('div','fade');
  const backB = mkBtn('← Voltar','back-btn');
  backB.addEventListener('click',()=>{ST.view='review';render();});
  wrap.appendChild(backB);

  const h = mk('h1');h.textContent='📄 Gerar material de revisão';
  const sub = mk('p','txt2');sub.style.marginBottom='1.25rem';
  sub.textContent='A IA cria um caderno de decoreba em markdown (pra ler/exportar PDF) ou um roteiro de diálogo para o Google NotebookLM (áudio).';
  wrap.appendChild(h);wrap.appendChild(sub);

  // Estado interno
  if(!ST.revgen){
    ST.revgen = {
      mode:'caderno',             // 'caderno' ou 'audio'
      scope:'weak',                // 'all', 'discipline', 'weak', 'critical'
      disciplineId:null,
      result:null,
      loading:false,
      error:null
    };
  }
  const s = ST.revgen;

  // Se já gerou resultado — mostra
  if(s.result){
    const resCard = mk('div','card card-pad');resCard.style.marginBottom='1rem';
    const resHead = mk('div','flex');resHead.style.cssText='justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px';
    const resTitle = mk('h3');resTitle.style.margin='0';resTitle.style.fontSize='15px';
    resTitle.textContent = s.mode==='caderno'?'📄 Seu caderno de revisão':'🎙️ Seu roteiro de áudio';
    resHead.appendChild(resTitle);
    const actions = mk('div','flex');actions.style.gap='6px';
    // Copiar
    const copyBtn = mkBtn('📋 Copiar','btn btn-sm');
    copyBtn.addEventListener('click',()=>{
      navigator.clipboard.writeText(s.result).then(()=>{
        copyBtn.textContent='✓ Copiado';
        setTimeout(()=>{copyBtn.textContent='📋 Copiar';},1500);
      });
    });
    actions.appendChild(copyBtn);
    // Exportar PDF (via print) — só pro caderno
    if(s.mode==='caderno'){
      const pdfBtn = mkBtn('🖨 Imprimir / PDF','btn btn-sm');
      pdfBtn.addEventListener('click',()=>printRevisionNotebook(s.result));
      actions.appendChild(pdfBtn);
    }
    // Nova geração
    const newBtn = mkBtn('✨ Novo','btn btn-sm');
    newBtn.addEventListener('click',()=>{s.result=null;render();});
    actions.appendChild(newBtn);

    // Comparar com versão anterior — só aparece quando existe
    if(s.previousResult){
      const cmpBtn = mkBtn('⇄ Comparar com anterior','btn btn-sm');
      cmpBtn.title = 'Compara o resultado atual com a versão gerada anteriormente';
      cmpBtn.addEventListener('click',()=>showRevgenCompareModal(s));
      actions.appendChild(cmpBtn);
    }

    resHead.appendChild(actions);
    resCard.appendChild(resHead);

    // Indicador de qual modelo gerou
    if(s.modelUsed){
      const tag = mk('div','revgen-model-tag');
      if(s.modelUsed==='compiled'){
        tag.innerHTML = `<span class="rmt-icon">📚</span><span>Compilado de perfis salvos · <b>sem custo de IA</b></span>`;
        tag.classList.add('econ');
      } else {
        const modelLbl = shortModelName(s.modelUsed);
        const isPrem = s.modelUsed.includes('sonnet');
        tag.innerHTML = `<span class="rmt-icon">${isPrem?'💎':'⚡'}</span><span>Gerado com <b>${modelLbl}</b></span>`;
        tag.classList.add(isPrem?'premium':'econ');
      }
      resCard.appendChild(tag);

    if(s.mode==='caderno'){

      const content = mk('div','revgen-output');

      resCard.appendChild(content);
    } else {

// Quantos perfis salvos cabem no escopo atual?
function previewProfilesAvailable(s){
  const data = collectRevgenData(s);
  if(!data || data.topics.length===0)return {count:0, totalTopics:0};
  let count = 0;
  // Pra cada tópico no escopo, vê se há perfil salvo (em qualquer disciplina relevante)
  data.topics.forEach(topic=>{
    let relevantDiscIds = [];
    if(s.scope==='discipline' && s.disciplineId){
      relevantDiscIds = [s.disciplineId];
    } else {
      relevantDiscIds = DATA.disciplines.filter(d=>d.active).map(d=>d.id);
    }
    for(const did of relevantDiscIds){
      if(getTopicProfile(did, topic)){
        count++;
        break;
      }
    }
  });
  return {count, totalTopics:data.topics.length};
}

// Compila perfis salvos sem chamar IA
function compileProfilesIntoCaderno(s){
  const data = collectRevgenData(s);
  if(!data || data.topics.length===0){
    alert('Sem dados suficientes pra compilar.');return;
  }

  let relevantDiscIds = [];
  if(s.scope==='discipline' && s.disciplineId){
    relevantDiscIds = [s.disciplineId];
  } else {
    relevantDiscIds = DATA.disciplines.filter(d=>d.active).map(d=>d.id);
  }

  // Coleta perfis correspondentes
  const collected = [];
  data.topics.forEach(topic=>{
    for(const did of relevantDiscIds){
      const p = getTopicProfile(did, topic);
      if(p){
        collected.push({disc:getDiscipline(did), topic, profile:p});
        break;
      }
    }
  });

  if(collected.length===0){
    alert('Nenhum dos tópicos no escopo tem perfil salvo. Use "✨ Gerar agora" pra criar via IA, ou abra um tópico no Mapa pra gerar perfil específico.');
    return;
  }

  // Agrupa por disciplina
  const byDisc = {};
  collected.forEach(item=>{
    const dn = item.disc?.name || 'Geral';
    if(!byDisc[dn])byDisc[dn]=[];
    byDisc[dn].push(item);
  });

  let md = '';
  Object.keys(byDisc).forEach(dn=>{
    md += `# 📘 ${dn}\n\n`;
    byDisc[dn].forEach(item=>{
      md += `## 🧠 ${item.topic}\n\n`;
      // Remove o primeiro H2 do markdown do perfil (já temos o título acima)
      // Mas mantém estrutura interna — converte H2 internos pra H3 pra hierarquia ficar limpa
      const adjusted = item.profile.markdown.replace(/^## /gm,'### ');
      md += adjusted + '\n\n---\n\n';
    });
  });

  // Preserva versão anterior pra comparação
  if(s.result){
    s.previousResult = s.result;
    s.previousModel = s.modelUsed;
    s.previousMode = s.modeUsed || s.mode;
    s.previousAt = s.resultAt || Date.now();
  }
  s.result = md;
  s.modelUsed = 'compiled';  // sinal especial — sem custo
  s.modeUsed = 'caderno';
  s.resultAt = Date.now();
  save();render();
  showToast(`✓ Compilado ${collected.length} perfis sem custo de IA`);
}

// Prevê quantos tópicos/erros vão entrar
function revgenPreview(s){
  const data = collectRevgenData(s);
  if(!data || data.topics.length===0){
    return '<span style="color:var(--amber-text)">⚠ Não há dados suficientes para este foco. Pratique um pouco mais ou troque o foco.</span>';
  }
  return `📊 <b>${data.topics.length}</b> tópico${data.topics.length===1?'':'s'} · <b>${data.errors.length}</b> erro${data.errors.length===1?'':'s'} · <b>${data.cards.length}</b> flashcard${data.cards.length===1?'':'s'} vão alimentar a IA.`;
}

// Coleta os dados para gerar o material baseado no escopo
function collectRevgenData(s){
  let relevantDiscIds = [];
  if(s.scope==='all'){
    relevantDiscIds = DATA.disciplines.filter(d=>d.active).map(d=>d.id);
  } else if(s.scope==='discipline' && s.disciplineId){
    relevantDiscIds = [s.disciplineId];
  } else {
    relevantDiscIds = DATA.disciplines.filter(d=>d.active).map(d=>d.id);
  }

  // Filtra erros/cards pelas disciplinas
  let errors = (DATA.errors||[]).filter(e=>relevantDiscIds.includes(e.disciplineId));
  let cards = (DATA.srs?.cards||[]).filter(c=>relevantDiscIds.includes(c.disciplineId));

  // Aplica filtro adicional por escopo
  if(s.scope==='weak'){
    // Tópicos com 2+ erros OU baixo domínio no mapa
    const map = buildSubjectMap();
    const weakTopics = new Set();
    Object.values(map).forEach(discMap=>{
      if(!relevantDiscIds.includes(discMap.discipline.id))return;
      Object.values(discMap.topics).forEach(entry=>{
        if(entry.errors.length>=2 || masteryLevel(topicMastery(entry))==='low'){
          weakTopics.add(entry.normKey);
        }
      });
    });
    errors = errors.filter(e=>weakTopics.has(normTopic(e.topic||'')));
    cards = cards.filter(c=>weakTopics.has(normTopic((c.tags||[])[0]||'')));
  }
  if(s.scope==='critical'){
    // Só erros que têm >=2 ocorrências do mesmo tópico+armadilha
    const sigCount = {};
    errors.forEach(e=>{
      const sig = errSignature(e);
      sigCount[sig] = (sigCount[sig]||0)+1;
    });
    errors = errors.filter(e=>sigCount[errSignature(e)]>=2);
  }

  // Lista de tópicos únicos do conjunto
  const topicSet = new Set();
  errors.forEach(e=>{if(e.topic)topicSet.add(e.topic);});
  cards.forEach(c=>{if((c.tags||[])[0])topicSet.add(c.tags[0]);});

  // Cap — limite de tópicos por geração pra não estourar tokens
  const TOPIC_CAP = s.mode==='audio'?8:15;
  const topics = [...topicSet].slice(0,TOPIC_CAP);

  return {
    topics,
    errors:errors.slice(0,30),
    cards:cards.slice(0,25),
    disciplineNames:relevantDiscIds.map(id=>getDiscipline(id)?.name).filter(Boolean)
  };
}

async function runRevgen(){
  const s = ST.revgen;
  const data = collectRevgenData(s);
  if(!data || data.topics.length===0){
    s.error='Sem dados suficientes. Pratique mais ou troque o foco.';
    render();return;
  }
  s.loading=true;s.error=null;render();

  try{
    // Monta payload do user
    const payload = {
      mode:s.mode,
      disciplinas:data.disciplineNames,
      topicos:data.topics,
      erros:data.errors.map(e=>({
        topic:e.topic,
        question:e.question?.slice(0,300),
        trap:e.trap?.slice(0,200),
        correct:e.correctAnswer,
        explanation:e.explanation?.slice(0,300)
      })),
      flashcards:data.cards.map(c=>({
        topic:(c.tags||[])[0],
        front:(c.front||'').slice(0,200),
        back:(c.back||'').slice(0,400)
      }))
    };
    const system = s.mode==='caderno'?SYS_REVGEN_CADERNO:SYS_REVGEN_AUDIO;
    const model = getMethodModel('revgen');
    const instrSuffix = s.mode==='caderno'
      ? 'Gere o caderno seguindo o formato. Cobre todos os tópicos listados.'
      : 'Gere o roteiro seguindo o formato. Dure 3-5 min falados. Cobra os tópicos com naturalidade.';

    const userMsg = 'Material do aluno:\n\n'+JSON.stringify(payload,null,2)+'\n\n'+instrSuffix;

    const r = await apiGenerate({
      model,
      max_tokens:4000,
      system,
      messages:[{role:'user',content:userMsg}]
    });
    if(!r.ok){
      const t = await r.text().catch(()=>'');
      throw new Error('api-'+r.status+': '+t.slice(0,150));
    }
    const d = await r.json();
    if(d.usage){
      logUsage({model,kind:'revgen',action:s.mode,input:d.usage.input_tokens||0,output:d.usage.output_tokens||0,cacheRead:d.usage.cache_read_input_tokens||0,cacheWrite:d.usage.cache_creation_input_tokens||0});
    }
    const text = d.content?.[0]?.text || '';
    if(!text || text.length<100)throw new Error('A IA retornou um conteúdo vazio. Tente de novo.');
    // Preserva versão anterior para comparação
    if(s.result){
      s.previousResult = s.result;
      s.previousModel = s.previousModelOfResult || s.modelUsed || null;
      s.previousMode = s.modeUsed || s.mode;
      s.previousAt = s.resultAt || Date.now();
    }
    s.result = text;
    s.modelUsed = model;
    s.modeUsed = s.mode;
    s.previousModelOfResult = model;
    s.resultAt = Date.now();
    s.loading=false;
    save();render();
  }catch(err){
    console.error('Revgen error:',err);
    s.loading=false;
    s.error = err.message || 'Falha desconhecida. Tente de novo.';
    render();
  }
}

// Markdown simplista — headers, bold, lists, paragraphs
function simpleMarkdownToHtml(md){
  if(!md)return '';
  let html = escapeHTML(md);
  // Headers
  html = html.replace(/^### (.+)$/gm,'<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm,'<h2>$1</h2>');
  // Bold
  html = html.replace(/\*\*([^*]+?)\*\*/g,'<b>$1</b>');
  // Italic
  html = html.replace(/\*([^*]+?)\*/g,'<i>$1</i>');
  // Inline code
  html = html.replace(/`([^`]+?)`/g,'<code>$1</code>');

  // Tables — markdown padrão: | col1 | col2 |
  // Detecta blocos com mínimo de 2 linhas (header + separator) seguidos por linhas de tabela
  html = html.replace(/(^|\n)(\|[^\n]+\|\n\|[\s:|-]+\|\n(\|[^\n]+\|\n?)+)/g, (m, pre, tableBlock)=>{
    const lines = tableBlock.trim().split('\n').filter(l=>l.trim().startsWith('|'));
    if(lines.length<2)return m;
    const headerCells = lines[0].split('|').slice(1,-1).map(c=>c.trim());
    const bodyLines = lines.slice(2);  // pula separator
    let table = '<table class="md-table"><thead><tr>';
    headerCells.forEach(c=>{table+='<th>'+c+'</th>';});
    table += '</tr></thead><tbody>';
    bodyLines.forEach(line=>{
      const cells = line.split('|').slice(1,-1).map(c=>c.trim());
      table += '<tr>';
      cells.forEach(c=>{table+='<td>'+c+'</td>';});
      table += '</tr>';
    });
    table += '</tbody></table>';
    return pre + table;
  });

  // Numbered lists (1. 2. 3.) — antes das bullet lists pra não conflitar
  html = html.replace(/(^|\n)((\d+\.\s.+\n?)+)/g,(m,pre,block)=>{
    const items = block.trim().split('\n').map(l=>l.replace(/^\d+\.\s/,'').trim()).filter(Boolean);
    return pre+'<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>';
  });

  // Bullet lists — - ou *
  html = html.replace(/(^|\n)(([*-] .+\n?)+)/g,(m,pre,block)=>{
    const items = block.trim().split('\n').map(l=>l.replace(/^[*-] /,'').trim()).filter(Boolean);
    return pre+'<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
  });

  // Paragraphs
  html = html.split('\n\n').map(block=>{
    if(block.trim().startsWith('<') || !block.trim())return block;
    return '<p>'+block.trim()+'</p>';
  }).join('\n\n');
  return html;
}

// Abre o caderno em uma janela de impressão (pra exportar como PDF via Ctrl+P/Cmd+P)
// Modal lado-a-lado para comparar resultado atual com versão anterior
function showRevgenCompareModal(state){

  title.textContent = '⇄ Comparar versões';
  head.appendChild(title);
  const closeBtn = mkBtn('×','icon-btn');closeBtn.style.cssText='font-size:22px;width:32px;height:32px';
  closeBtn.addEventListener('click',()=>closeModal());
  head.appendChild(closeBtn);
  m.appendChild(head);

  const desc = mk('p','txt2');desc.style.cssText='font-size:12.5px;line-height:1.5;margin:0 0 .875rem';
  desc.textContent = 'Compare lado a lado e escolha qual versão manter como definitiva. A outra será descartada.';
  m.appendChild(desc);

  // Grid 2 colunas
  const grid = mk('div','revgen-compare-grid');

  // Coluna A — versão anterior
  const colA = mk('div','revgen-compare-col');
  const tagA = mk('div','rcc-tag');
  const modelA = state.previousModel ? shortModelName(state.previousModel) : 'IA';
  const isPremA = (state.previousModel||'').includes('sonnet');
  tagA.innerHTML = `<span class="rmt-icon">${isPremA?'💎':'⚡'}</span><span>Anterior · <b>${modelA}</b></span>`;
  tagA.classList.add(isPremA?'premium':'econ');
  colA.appendChild(tagA);

  const bodyA = mk('div','revgen-compare-body');
  if(state.previousMode==='caderno'){
    bodyA.innerHTML = simpleMarkdownToHtml(state.previousResult);
  } else {
    const ta = mk('textarea');ta.style.cssText='width:100%;min-height:380px;font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.55;padding:.75rem;border:1px solid var(--border);border-radius:var(--rs);resize:none';
    ta.value = state.previousResult;ta.readOnly = true;
    bodyA.appendChild(ta);
  }
  colA.appendChild(bodyA);

  const keepA = mkBtn('✓ Manter este','btn btn-sm btn-p');
  keepA.style.marginTop='.5rem';
  keepA.style.width='100%';
  keepA.addEventListener('click',()=>{
    showConfirmModal({
      title:'Manter versão anterior?',
      message:'A versão atual será descartada. Esta ação não pode ser desfeita.',
      confirmText:'Manter anterior',
      onConfirm:()=>{
        // Troca: previous vira current
        state.result = state.previousResult;
        state.modelUsed = state.previousModel;
        state.modeUsed = state.previousMode;
        state.mode = state.previousMode || state.mode;  // mantém UX consistente
        state.resultAt = state.previousAt;
        state.previousResult = null;
        state.previousModel = null;
        state.previousMode = null;
        state.previousAt = null;
        save();
        closeModal();closeModal();  // fecha confirm + compare
        render();
      }
    });
  });
  colA.appendChild(keepA);
  grid.appendChild(colA);

  // Coluna B — versão atual
  const colB = mk('div','revgen-compare-col current');
  const tagB = mk('div','rcc-tag');
  const modelB = state.modelUsed ? shortModelName(state.modelUsed) : 'IA';
  const isPremB = (state.modelUsed||'').includes('sonnet');
  tagB.innerHTML = `<span class="rmt-icon">${isPremB?'💎':'⚡'}</span><span>Atual · <b>${modelB}</b></span>`;
  tagB.classList.add(isPremB?'premium':'econ');
  colB.appendChild(tagB);

  const bodyB = mk('div','revgen-compare-body');
  if(state.modeUsed==='caderno' || state.mode==='caderno'){
    bodyB.innerHTML = simpleMarkdownToHtml(state.result);
  } else {
    const ta = mk('textarea');ta.style.cssText='width:100%;min-height:380px;font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.55;padding:.75rem;border:1px solid var(--border);border-radius:var(--rs);resize:none';
    ta.value = state.result;ta.readOnly = true;
    bodyB.appendChild(ta);
  }
  colB.appendChild(bodyB);

  const keepB = mkBtn('✓ Manter este','btn btn-sm btn-p');
  keepB.style.marginTop='.5rem';
  keepB.style.width='100%';
  keepB.addEventListener('click',()=>{
    // Atual já é o atual, só descarta o anterior
    state.previousResult = null;
    state.previousModel = null;
    state.previousMode = null;
    state.previousAt = null;
    save();
    closeModal();
    render();
  });
  colB.appendChild(keepB);
  grid.appendChild(colB);

  m.appendChild(grid);
  showModal(m);
}

/* NOTEBOOKS (cadernos) — organize imported questions into themed sets */
function renderNotebooks(wrap){
  // 3 sub-states: list of notebooks | manage one notebook (add/remove questions) | practice notebook
  const view = ST.notebookCurrentId
    ? (ST.notebookSubview==='practice'?'practice':'manage')
    : 'list';

  if(view==='list')return renderNotebooksList(wrap);
  if(view==='manage')return renderNotebookManage(wrap);
  if(view==='practice')return renderNotebookPractice(wrap);
  return wrap;
}

    head.appendChild(titleCol);head.appendChild(counter);

    if(stats){
      const statsRow = mk('div');statsRow.style.cssText='margin-top:6px;font-size:11.5px;color:var(--text2)';

// Returns inline stats HTML for a notebook (acertos cumulativos)
function notebookStatsHTML(notebookId){
  const qs = notebookQuestions(notebookId);
  if(qs.length===0)return '';
  const totalAttempts = qs.reduce((a,q)=>a+(q.attempts||0),0);
  const totalCorrect = qs.reduce((a,q)=>a+(q.correctCount||0),0);
  const practiced = qs.filter(q=>(q.attempts||0)>0).length;
  if(totalAttempts===0)return `<span style="color:var(--text3)">Não praticado ainda</span>`;
  const pct = Math.round(totalCorrect/totalAttempts*100);
  return `${practiced}/${qs.length} questões praticadas · ${pct}% acertos (${totalCorrect}/${totalAttempts})`;
}

function showAddToNotebookModal(questionId){
  const q = (DATA.importedQuestions||[]).find(x=>x.id===questionId);
  if(!q){alert('Questão não encontrada.');return;}
  const m = mk('div');
  const head = mk('div','modal-head');
  const h = mk('h3');h.textContent='Adicionar ao caderno';
  const cl = mkBtn('×','modal-close');cl.addEventListener('click',closeModal);
  head.appendChild(h);head.appendChild(cl);
  m.appendChild(head);

  const preview = mk('p','txt2');preview.style.cssText='margin-bottom:1rem;padding:.5rem .75rem;background:var(--surface2);border-radius:var(--rs);font-size:12.5px;max-height:80px;overflow-y:auto';
  preview.textContent = q.enunciado.slice(0,200) + (q.enunciado.length>200?'...':'');
  m.appendChild(preview);

  const nbs = DATA.notebooks||[];
  if(nbs.length===0){
    const empty = mk('p','txt2');empty.style.marginBottom='1rem';
    empty.textContent='Você ainda não tem cadernos criados. Crie um agora:';
    m.appendChild(empty);
    const newBtn = mkBtn('+ Criar caderno','btn btn-p');
    newBtn.addEventListener('click',()=>{closeModal();ST.importedSubview='notebooks';render();setTimeout(()=>showCreateNotebookModal(),50);});
    m.appendChild(newBtn);
    showModal(m);return;
  }

  const lbl = mk('label');lbl.textContent='Marque os cadernos onde quer incluir esta questão:';
  m.appendChild(lbl);

  const list = mk('div');list.style.cssText='display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-top:.5rem';
  const initialState = {};
  nbs.forEach(nb=>{initialState[nb.id]=nb.questionIds.includes(questionId);});
  const toggleState = {...initialState};

  nbs.forEach(nb=>{
    const row = mk('label');row.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500';
    const cb = mk('input');cb.type='checkbox';cb.checked=toggleState[nb.id];cb.style.cssText='width:16px;height:16px;cursor:pointer;margin:0';
    cb.addEventListener('change',e=>{toggleState[nb.id]=e.target.checked;});
    const txt = mk('span');txt.style.flex='1';
    txt.innerHTML = '📒 '+nb.name+`<span style="color:var(--text3);font-weight:400;font-size:11.5px;margin-left:6px">(${nb.questionIds.length} questões)</span>`;
    row.appendChild(cb);row.appendChild(txt);
    list.appendChild(row);
  });
  m.appendChild(list);

  const actions = mk('div','flex');actions.style.cssText='margin-top:1rem;gap:8px';
  const saveB = mkBtn('Salvar','btn btn-p');
  saveB.addEventListener('click',()=>{
    let added=0,removed=0;
    nbs.forEach(nb=>{
      const want = toggleState[nb.id];
      const has = initialState[nb.id];
      if(want&&!has){nb.questionIds.push(questionId);added++;}
      else if(!want&&has){nb.questionIds=nb.questionIds.filter(id=>id!==questionId);removed++;}
    });
    if(added>0||removed>0)save();
    closeModal();render();
  });
  const newBtn = mkBtn('+ Novo caderno','btn');
  newBtn.addEventListener('click',()=>{closeModal();showCreateNotebookModal();});
  const cancelB = mkBtn('Cancelar','btn');cancelB.style.marginLeft='auto';
  cancelB.addEventListener('click',closeModal);
  actions.appendChild(saveB);actions.appendChild(newBtn);actions.appendChild(cancelB);
  m.appendChild(actions);
  showModal(m);
}

function renderNotebookManageAdd(wrap,nb){
  const all = DATA.importedQuestions||[];
  if(all.length===0){
    wrap.appendChild(infoBox('Você ainda não tem questões no banco. Importe ou pratique com IA para criar questões.'));
    return wrap;
  }
  // Unified filters
  wrap.appendChild(renderBankFilters('notebookAddFilters',all));
  const f = getBankFilters('notebookAddFilters');
  const filtered = applyBankFilters(all,f);
  const inSet = new Set(nb.questionIds);
  const selected = ST.notebookSelectedIds||{};
  const selCount = Object.keys(selected).filter(id=>selected[id]&&!inSet.has(id)).length;

  // Bulk action bar
  const bulk = mk('div','flex');bulk.style.cssText='gap:8px;margin-bottom:.875rem;flex-wrap:wrap;align-items:center';
  const stats = mk('span','txt3');stats.textContent=`${filtered.length} mostrando · ${selCount} selecionada(s)`;
  bulk.appendChild(stats);
  const selAllBtn = mkBtn('Selecionar todas filtradas','btn btn-sm');
  selAllBtn.addEventListener('click',()=>{
    filtered.forEach(q=>{if(!inSet.has(q.id))ST.notebookSelectedIds[q.id]=true;});
    render();
  });
  bulk.appendChild(selAllBtn);
  const clearSel = mkBtn('Limpar seleção','btn btn-sm');
  clearSel.addEventListener('click',()=>{ST.notebookSelectedIds={};render();});
  bulk.appendChild(clearSel);
  const addBtn = mkBtn(`+ Adicionar ${selCount} ao caderno`,'btn btn-p btn-sm');
  addBtn.disabled = selCount===0;
  addBtn.style.marginLeft='auto';
  addBtn.addEventListener('click',()=>{
    const ids = Object.keys(selected).filter(id=>selected[id]&&!inSet.has(id));
    const added = addQuestionsToNotebook(nb.id,ids);
    ST.notebookSelectedIds={};
    alert(`${added} questão(ões) adicionada(s) ao caderno.`);
    ST.notebookManageTab='in';
    render();
  });
  bulk.appendChild(addBtn);
  wrap.appendChild(bulk);

  filtered.forEach(q=>{
    const isIn = inSet.has(q.id);
    const isSel = !!selected[q.id];
    const it = mk('div','card card-pad');it.style.marginBottom='.5rem';
    if(isIn){it.style.opacity='.55';}
    const meta = mk('div','flex');meta.style.cssText='gap:6px;margin-bottom:.5rem;flex-wrap:wrap;align-items:center';

    // Checkbox / status
    if(isIn){
      const chip = mk('span','badge b-ok');chip.textContent='✓ Já no caderno';meta.appendChild(chip);
    } else {
      const cb = mk('input');cb.type='checkbox';cb.checked=isSel;cb.style.cssText='width:18px;height:18px;cursor:pointer;margin:0';
      cb.addEventListener('change',e=>{
        if(e.target.checked)ST.notebookSelectedIds[q.id]=true;
        else delete ST.notebookSelectedIds[q.id];
        render();
      });
      meta.appendChild(cb);
    }

    const kindChip = mk('span','badge b-info');kindChip.textContent = q.kind==='MC'?'Múltipla escolha':'C/E';
    meta.appendChild(kindChip);
    // Source badge in notebook add view
    const srcChip = mk('span','badge');
    if(q.source==='ai'){
      srcChip.style.cssText='background:rgba(108,92,231,.15);color:#6C5CE7';
      srcChip.textContent='🤖 IA';
    } else {
      srcChip.style.cssText='background:rgba(24,95,165,.15);color:var(--blue-text)';
      srcChip.textContent='📋 TEC';
    }
    meta.appendChild(srcChip);
    const disc = getDiscipline(q.disciplineId);
    if(disc){
      const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
      const dot = mk('span','disc-dot');dot.style.background=disc.color;
      const dn = mk('span');dn.textContent=disc.name;
      dTag.appendChild(dot);dTag.appendChild(dn);meta.appendChild(dTag);
    }
    if(q.topic){const tp = mk('span','topic-tag');tp.textContent=q.topic;tp.style.marginBottom='0';meta.appendChild(tp);}

    // Show how many notebooks already contain this question (excluding current)
    const others = notebooksContaining(q.id).filter(n=>n.id!==nb.id);
    if(others.length>0){
      const o = mk('span','txt3');o.style.fontSize='10.5px';o.textContent=`em ${others.length} outro${others.length>1?'s':''} caderno${others.length>1?'s':''}`;
      meta.appendChild(o);
    }

    it.appendChild(meta);
    const qt = mk('p','txt');qt.style.cssText='margin:0;white-space:pre-wrap';qt.textContent=q.enunciado;
    it.appendChild(qt);
    wrap.appendChild(it);
  });
  return wrap;
}

function startNotebookPractice(notebookId){
  const qs = notebookQuestions(notebookId);
  if(qs.length===0){alert('Este caderno está vazio.');return;}
  ST.notebookCurrentId = notebookId;
  ST.notebookSubview = 'practice';
  // Shuffle order
  const order = qs.map(q=>q.id);
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  ST.notebookPracticeOrder = order;
  ST.notebookPracticeIdx = 0;
  ST.notebookPracticeCurrent = qs.find(q=>q.id===order[0]);
  ST.notebookPracticeAnswered = false;
  ST.notebookPracticeAnswer = null;
  ST.notebookPracticeStats = {correct:0,total:0,answered:0};
  render();
}

function renderNotebookPractice(wrap){
  const nb = getNotebook(ST.notebookCurrentId);
  if(!nb){ST.notebookCurrentId=null;ST.notebookSubview='list';render();return wrap;}

  const back = mkBtn('← Voltar ao caderno','back-btn');
  back.addEventListener('click',()=>{
    ST.notebookSubview='manage';
    ST.notebookManageTab='in';
    ST.notebookPracticeCurrent=null;ST.notebookPracticeAnswered=false;
    render();
  });
  wrap.appendChild(back);

  const head = mk('div');head.style.marginBottom='1rem';
  const t = mk('h2');t.style.marginBottom='4px';t.textContent='📒 '+nb.name;
  const sub = mk('p','txt3');sub.style.margin='0';
  const total = ST.notebookPracticeOrder.length;
  const idx = ST.notebookPracticeIdx;
  const stats = ST.notebookPracticeStats||{correct:0,answered:0};
  sub.textContent = `Questão ${idx+1} de ${total} · Sessão: ${stats.correct}/${stats.answered} acertos`;
  head.appendChild(t);head.appendChild(sub);
  wrap.appendChild(head);

  if(idx>=total){
    // End of round
    const card = mk('div','card');card.style.cssText='text-align:center;padding:2rem 1rem';
    const big = mk('div');big.style.cssText='font-size:48px;margin-bottom:.5rem';big.textContent='🎉';
    card.appendChild(big);
    const msg = mk('h3');msg.style.marginBottom='.5rem';msg.textContent='Caderno completo!';
    card.appendChild(msg);
    const pct = stats.answered>0?Math.round(stats.correct/stats.answered*100):0;
    const result = mk('p','txt2');result.textContent = `Você acertou ${stats.correct} de ${stats.answered} (${pct}%)`;
    card.appendChild(result);
    const actions = mk('div','flex');actions.style.cssText='justify-content:center;gap:8px;margin-top:1.25rem';
    const again = mkBtn('Praticar novamente','btn btn-p');
    again.addEventListener('click',()=>startNotebookPractice(nb.id));
    actions.appendChild(again);
    const exit = mkBtn('Voltar ao caderno','btn');
    exit.addEventListener('click',()=>{
      ST.notebookSubview='manage';ST.notebookManageTab='in';ST.notebookPracticeCurrent=null;ST.notebookPracticeAnswered=false;render();
    });
    actions.appendChild(exit);
    card.appendChild(actions);
    wrap.appendChild(card);
    return wrap;
  }

  const q = ST.notebookPracticeCurrent;
  if(!q){
    // Question was deleted from bank — skip
    ST.notebookPracticeIdx+=1;
    const nextId = ST.notebookPracticeOrder[ST.notebookPracticeIdx];
    ST.notebookPracticeCurrent = nextId ? (DATA.importedQuestions||[]).find(qq=>qq.id===nextId) : null;
    ST.notebookPracticeAnswered=false;ST.notebookPracticeAnswer=null;
    setTimeout(render,0);
    wrap.appendChild(loading('Carregando...'));return wrap;
  }

  // Question display (reuses imported question UI patterns)
  const meta = mk('div','flex');meta.style.cssText='gap:6px;margin-bottom:.5rem;flex-wrap:wrap';
  const disc = getDiscipline(q.disciplineId);

  const src = mk('span','badge b-info');src.textContent='📒 Caderno';meta.appendChild(src);

  const qc = mk('div','card fade');
  const qt = mk('p','txt');qt.style.cssText='margin:0;white-space:pre-wrap';qt.textContent=q.enunciado;
  qc.appendChild(qt);
  if(q.kind==='MC'&&q.alternatives){
    const altWrap = mk('div');altWrap.style.cssText='margin-top:.875rem;display:flex;flex-direction:column;gap:6px';
    q.alternatives.forEach(alt=>{
      const line = mk('p','txt');line.style.cssText='margin:0;padding:6px 8px;border-radius:var(--rs)';
      if(ST.notebookPracticeAnswered){
        if(alt.letter===q.answer){line.style.background='var(--accent-light)';line.style.color='var(--accent-text)';}
        else if(alt.letter===ST.notebookPracticeAnswer){line.style.background='var(--red-light)';line.style.color='var(--red-text)';}
      }
      line.innerHTML = `<b>${alt.letter})</b> ${alt.text}`;
      altWrap.appendChild(line);
    });
    qc.appendChild(altWrap);
  }
  wrap.appendChild(qc);

  if(!ST.notebookPracticeAnswered){
    if(q.kind==='MC'&&q.alternatives){
      const br = mk('div','grid');br.style.cssText='grid-template-columns:repeat(5,1fr);gap:6px;margin-top:.875rem';
      q.alternatives.forEach(alt=>{
        const b = mkBtn(alt.letter,'btn btn-ans');
        b.style.cssText='padding:10px 4px;font-size:14px;font-weight:700';
        b.addEventListener('click',()=>notebookSubmitAnswer(alt.letter));
        br.appendChild(b);
      });
      wrap.appendChild(br);
    } else {
      const br = mk('div','flex');br.style.marginTop='.875rem';
      ['C','E'].forEach(a=>{
        const b = mkBtn(a==='C'?'Certo':'Errado','btn btn-ans '+(a==='C'?'btn-c':'btn-e'));
        b.addEventListener('click',()=>notebookSubmitAnswer(a));
        br.appendChild(b);
      });
      wrap.appendChild(br);
    }
  } else {
    const ok = ST.notebookPracticeAnswer===q.answer;
    const fb = mk('div','fb-card fade '+(ok?'ok':'err'));
    const badge = mk('span','badge '+(ok?'b-ok':'b-err'));
    badge.textContent = ok?'✓ Correto':`✗ Incorreto · Gabarito: ${q.answer}`;
    fb.appendChild(badge);
    const info = mk('p','txt2');info.style.marginTop='.75rem';
    info.textContent='Questão importada — sem explicação automática.';
    fb.appendChild(info);
    const actions = mk('div','flex');actions.style.cssText='margin-top:.875rem;gap:8px;flex-wrap:wrap';
    const isLast = ST.notebookPracticeIdx>=ST.notebookPracticeOrder.length-1;
    const nb2 = mkBtn(isLast?'Finalizar →':'Próxima →','btn btn-p');
    nb2.addEventListener('click',()=>{
      ST.notebookPracticeIdx+=1;
      const nextId = ST.notebookPracticeOrder[ST.notebookPracticeIdx];
      ST.notebookPracticeCurrent = nextId ? (DATA.importedQuestions||[]).find(qq=>qq.id===nextId) : null;
      ST.notebookPracticeAnswered=false;ST.notebookPracticeAnswer=null;
      render();
    });
    actions.appendChild(nb2);
    if(q.sourceUrl){
      const srcLink = mk('a');srcLink.href=q.sourceUrl.startsWith('http')?q.sourceUrl:'https://'+q.sourceUrl;
      srcLink.target='_blank';srcLink.rel='noopener';
      srcLink.className='btn';srcLink.style.cssText='font-size:12px;padding:6px 12px;text-decoration:none';
      srcLink.textContent='Ver no TEC ↗';
      actions.appendChild(srcLink);
    }
    if(!ok){
      // Find the error just logged for this question
      const errRef = DATA.errors.find(e=>e.id===ST.notebookLastErrId);
      if(errRef){
        const ctaRow = mk('div');ctaRow.style.cssText='margin-bottom:.875rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center';
        if(errRef.hasCard){
          const done = mk('div','alert alert-accent');done.style.cssText='margin:0;flex:1;min-width:200px';
          done.innerHTML='✓ <b>Flashcard criado.</b>';
          ctaRow.appendChild(done);
        } else {
          const genBtn = mkBtn('🎴 Criar flashcard deste erro','btn');
          genBtn.style.cssText='border-color:var(--accent);color:var(--accent-text);background:var(--accent-light);font-weight:600';
          genBtn.addEventListener('click',()=>generateCardFromError(errRef,genBtn,null,ctaRow));
          ctaRow.appendChild(genBtn);
        }
        if(errRef.topic){
          const mapBtn = mkBtn('🗺️ Ver na matéria','btn btn-sm');
          mapBtn.addEventListener('click',()=>mapNavigate(errRef.disciplineId,errRef.topic));
          ctaRow.appendChild(mapBtn);
        }
        fb.insertBefore(ctaRow,actions);
      }
    }
    fb.appendChild(actions);
    wrap.appendChild(fb);
  }
  return wrap;
}

function notebookSubmitAnswer(answer){
  const q = ST.notebookPracticeCurrent;if(!q)return;
  ST.notebookPracticeAnswered=true;ST.notebookPracticeAnswer=answer;
  q.attempts=(q.attempts||0)+1;
  const ok = answer===q.answer;
  if(ok)q.correctCount=(q.correctCount||0)+1;
  // Track session stats
  if(!ST.notebookPracticeStats)ST.notebookPracticeStats={correct:0,total:0,answered:0};
  ST.notebookPracticeStats.answered+=1;
  if(ok)ST.notebookPracticeStats.correct+=1;
  // Global session stats
  DATA.session.total+=1;if(ok)DATA.session.correct+=1;
  updateByDisc(q.disciplineId,ok);
  ST.notebookLastErrId = null;
  if(!ok){
    const errRec = logError({
      question:q.kind==='MC'?(q.enunciado+'\n\nAlternativas:\n'+(q.alternatives||[]).map(a=>`${a.letter}) ${a.text}`).join('\n')):q.enunciado,
      correct_answer:q.answer,
      explanation:'(questão de caderno)',
      trap:'',keyword:'',trap_type:0,
      topic:q.topic||'',method:'notebook'
    });
    ST.notebookLastErrId = errRec.id;
  }
  save();render();
}

/* EVE — leitura rápida, feed contínuo, sem IA */
function renderEve(){
  const wrap = mk('div','fade');
  const h = mk('h1');h.textContent='📖 Revisão de Véspera';
  const sub = mk('p','txt2');sub.style.marginBottom='1rem';
  sub.textContent='Leitura corrida. Role a tela para revisar flashcards e resumos dos erros. Zero interação, zero IA.';
  wrap.appendChild(h);wrap.appendChild(sub);

  // Filter chips
  const actDiscs = activeDisciplines();
  const discsWithData = actDiscs.filter(d=>
    DATA.srs.cards.some(c=>c.disciplineId===d.id)||
    (DATA.errors||[]).some(e=>e.disciplineId===d.id)
  );
  const filter = ST.eveFilter||'all';
  if(discsWithData.length>=2){
    const filterRow = mk('div','disc-filter');filterRow.style.marginBottom='1rem';
    const allChip = mk('button','disc-chip'+(filter==='all'?' on':''));
    if(filter==='all'){allChip.style.background='var(--surface2)';allChip.style.color='var(--text)';}
    const allDot = mk('span','dot');allDot.style.background='var(--text2)';
    const allNm = mk('span');allNm.textContent='Todas';
    allChip.appendChild(allDot);allChip.appendChild(allNm);
    allChip.addEventListener('click',()=>{ST.eveFilter='all';render();});
    filterRow.appendChild(allChip);
    discsWithData.forEach(d=>{
      const chip = mk('button','disc-chip'+(filter===d.id?' on':''));
      if(filter===d.id){chip.style.background=d.color+'22';chip.style.color=d.color;}
      const dot = mk('span','dot');dot.style.background=d.color;
      const nm = mk('span');nm.textContent=d.name;
      chip.appendChild(dot);chip.appendChild(nm);
      chip.addEventListener('click',()=>{ST.eveFilter=d.id;render();});
      filterRow.appendChild(chip);
    });
    wrap.appendChild(filterRow);
  }

  // Collect items from active disciplines (or chosen filter)
  const actIds = new Set(actDiscs.map(d=>d.id));
  const matchesFilter = (itemDiscId)=>{
    if(filter==='all')return !itemDiscId||actIds.has(itemDiscId);
    return itemDiscId===filter;
  };

  const cards = DATA.srs.cards.filter(c=>matchesFilter(c.disciplineId));
  const errors = (DATA.errors||[]).filter(e=>matchesFilter(e.disciplineId));

  if(cards.length===0&&errors.length===0){
    wrap.appendChild(infoBox('Nada para revisar nesta seleção. Crie flashcards ou resolva questões primeiro.'));
    return wrap;
  }

  // Build feed: interleave cards and errors, alternating
  const feedItems = [];
  const sortedCards = [...cards].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const sortedErrors = sortByRecency(errors);
  const max = Math.max(sortedCards.length, sortedErrors.length);
  for(let i=0;i<max;i++){
    if(sortedCards[i])feedItems.push({kind:'card',data:sortedCards[i]});
    if(sortedErrors[i])feedItems.push({kind:'error',data:sortedErrors[i]});
  }

  // Summary bar
  const summary = mk('p','txt3');summary.style.marginBottom='1rem';
  summary.textContent=`${sortedCards.length} flashcard${sortedCards.length===1?'':'s'} · ${sortedErrors.length} erro${sortedErrors.length===1?'':'s'} · ${feedItems.length} itens no feed`;
  wrap.appendChild(summary);

  // Feed
  const feed = mk('div');feed.style.cssText='display:flex;flex-direction:column;gap:10px';
  feedItems.forEach(item=>{
    if(item.kind==='card')feed.appendChild(eveCardItem(item.data));
    else feed.appendChild(eveErrorItem(item.data));
  });
  wrap.appendChild(feed);

  // End marker
  const end = mk('p','txt3');end.style.cssText='text-align:center;margin-top:1.5rem;padding:1rem';
  end.textContent='— fim do feed —';
  wrap.appendChild(end);

  return wrap;
}

    const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
    const dot = mk('span','disc-dot');dot.style.background=disc.color;
    const dn = mk('span');dn.textContent=disc.name;
    dTag.appendChild(dot);dTag.appendChild(dn);
    meta.appendChild(dTag);
  }
  const trTag = mk('span','badge b-warn');trTag.textContent=TRAP_TYPES[err.trapType||0];
  meta.appendChild(trTag);
  it.appendChild(meta);
  // Topic (small)
  if(err.topic){
    const tp = mk('p','txt3');tp.style.marginBottom='4px';tp.textContent=err.topic;
    it.appendChild(tp);
  }
  // Question truncated
  const qt = mk('p','txt2');qt.style.cssText='margin-bottom:.5rem;font-style:italic';
  qt.textContent = err.question.length>160?err.question.slice(0,160)+'...':err.question;
  it.appendChild(qt);
  // What matters: gabarito + explicação + armadilha
  const summary = mk('p','txt');summary.style.margin='0';
  let html = `<strong>Gabarito:</strong> ${err.correctAnswer}`;
  if(err.explanation)html += ` · ${err.explanation}`;
  if(err.trap)html += `<br><strong>Armadilha:</strong> ${err.trap}`;
  if(err.keyword)html += ` · <strong>Gatilho:</strong> ${err.keyword}`;
  summary.innerHTML = html;
  it.appendChild(summary);
  return it;
}

    if(oc>20)wrap.appendChild(errorBox(`⚠ <b>Falsa segurança: ${oc}%</b> dos "tenho certeza" estão errados.`));
  }

    wrap.appendChild(buildModelPicker('calibration'));

    const cg = mk('div','conf-grid');
    [['certain','🟢','Tenho certeza','sel-c'],['think','🟡','Acho que sei','sel-t'],['guess','🔴','É um chute','sel-g']].forEach(([k,icon,lbl,cls])=>{
      const b = mkBtn('','conf-btn'+(ST.calibConf===k?' '+cls:''));
      b.innerHTML=`<span class="conf-icon">${icon}</span>${lbl}`;
      b.addEventListener('click',()=>{ST.calibConf=k;render();});

      card.insertBefore(warn,card.children[1]);

  return wrap;

async function calibStart(container){
  ST.calibLoading=true;render();
  try{
    const seed = avoidRepeatPrompt('calibration');
    const res = await timedCallAPI('calibration','question',SYS_CALIB,[{role:'user',content:'Gere a primeira questão.'+seed}],{model:getMethodModel('calibration')});
    ST.calibHist=[{role:'user',content:'Gere a primeira questão.'},{role:'assistant',content:JSON.stringify(res)}];
    ST.calibQ=res;saveAIQuestion('calibration',res,getMethodModel('calibration'));
  }catch(e){handleErr(e,container);}
  ST.calibLoading=false;render();
}
async function calibSubmit(answer){
  if(ST.calibAnswered||ST.calibLoading||!ST.calibConf)return;
  ST.calibAnswered=true;ST.calibLoading=true;render();
  const um = {role:'user',content:'Resposta: '+answer};
  const nh = [...ST.calibHist,um];
  try{
    const res = await timedCallAPI('calibration','question',SYS_CALIB,nh,{model:getMethodModel('calibration')});
    ST.calibHist=[...nh,{role:'assistant',content:JSON.stringify(res)}];
    const ok = res.is_correct, ck = ST.calibConf;
    DATA.session.total+=1;if(ok)DATA.session.correct+=1;
    DATA.session.calibration[ck].t+=1;if(ok)DATA.session.calibration[ck].c+=1;
    if(!ok){const tt=res.trap_type??0;DATA.session.dna[tt]=(DATA.session.dna[tt]||0)+1;}
    save();
    let errCtx=null;
    if(!ok){
      errCtx=logError({question:ST.calibQ.question,correct_answer:ST.calibQ.correct_answer,explanation:res.explanation,trap:res.trap,keyword:res.keyword,trap_type:res.trap_type,topic:ST.calibQ.topic,method:'calibration'});
    }
    ST.calibFb={ok,explanation:res.explanation,trap:res.trap,keyword:res.keyword,confKey:ck,next:res.next,errCtx};
  }catch(e){ST.calibAnswered=false;console.error(e);}
  ST.calibLoading=false;render();
}
function calibNext(){if(ST.calibFb?.next){ST.calibQ=ST.calibFb.next;saveAIQuestion('calibration',ST.calibQ,getMethodModel('calibration'));ST.calibFb=null;ST.calibConf=null;ST.calibAnswered=false;render();}}

function renderDrill(){
  const s = DATA.session;
  const wrap = mk('div','fade');
  wrap.appendChild(backBtn('methods'));
  const h = mk('h2');h.textContent='🔬 Drill DNA';
  wrap.appendChild(h);

    wrap.appendChild(buildModelPicker('drill'));
