/* ============================================================
   SYNC LAYER — sobe/baixa DATA (JSONB) via Supabase
   ============================================================ */

// Timer de debounce pro autoSync
let _syncTimer = null;
const SYNC_DEBOUNCE_MS = 3000; // Aguarda 3s de inatividade antes de subir

// Salva DATA no Supabase. Debounced — múltiplas chamadas em sequência
// viram uma única requisição ao servidor.
function scheduleSync(){
  if(!isAuthed())return;
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer = setTimeout(()=>{syncUp().catch(e=>console.warn('Sync falhou:',e.message));},SYNC_DEBOUNCE_MS);
}

// Helper: wraps a promise with a timeout so a hung request can't block forever
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout: '+(label||'request'))),ms))
  ]);
}

// Sobe o DATA atual pra Supabase (upsert)
async function syncUp(){
  if(!isAuthed())return;
  AUTH.syncing = true;
  // Não chama render imediatamente — a UI atualiza o indicador via CSS
  const indicator = document.getElementById('sync-indicator');
  if(indicator)indicator.classList.add('syncing');
  try{
    // Clona o DATA e remove campos que não queremos sincronizar
    const payload = JSON.parse(JSON.stringify(DATA));
    // config.apiKey é legado do BYOK; não faz sentido sincronizar
    if(payload.config)delete payload.config.apiKey;

    const {error} = await withTimeout(
      supa.from('user_data').upsert({
        user_id:AUTH.user.id,
        data:payload,
        updated_at:new Date().toISOString()
      },{onConflict:'user_id'}),
      10000,
      'syncUp'
    );
    if(error)throw error;
    AUTH.lastSyncAt = Date.now();
    AUTH.syncError = null;
  }catch(e){
    AUTH.syncError = e.message||'erro desconhecido';
    console.error('[NEXUS] syncUp error:',e);
  }finally{
    AUTH.syncing = false;
    if(indicator)indicator.classList.remove('syncing');
    updateSyncIndicator();
  }
}

// Baixa DATA do Supabase. Retorna null se usuário novo sem dados.
async function syncDown(){
  if(!isAuthed())return null;
  AUTH.syncing = true;
  updateSyncIndicator();
  try{
    const {data,error} = await withTimeout(
      supa.from('user_data')
        .select('data,updated_at')
        .eq('user_id',AUTH.user.id)
        .maybeSingle(),
      10000,
      'syncDown'
    );
    if(error)throw error;
    AUTH.lastSyncAt = Date.now();
    AUTH.syncError = null;
    return data?.data||null;
  }catch(e){
    AUTH.syncError = e.message||'erro desconhecido';
    console.error('[NEXUS] syncDown error:',e);
    return null;
  }finally{
    AUTH.syncing = false;
    updateSyncIndicator();
  }
}

// Atualiza o pequeno indicador visual de sync
function updateSyncIndicator(){
  const el = document.getElementById('sync-indicator');
  if(!el)return;
  el.classList.toggle('syncing',AUTH.syncing);
  el.classList.toggle('error',!!AUTH.syncError);
  if(AUTH.syncError){
    el.title='Erro ao sincronizar: '+AUTH.syncError;
  } else if(AUTH.syncing){
    el.title='Sincronizando...';
  } else if(AUTH.lastSyncAt){
    const mins = Math.round((Date.now()-AUTH.lastSyncAt)/60000);
    el.title='Sincronizado '+(mins<1?'agora':'há '+mins+' min');
  }
}

// Merge inteligente: decide o que fazer no primeiro login
// - Local vazio + remoto com dados → usa remoto
// - Local com dados + remoto vazio → pergunta se quer subir
// - Local com dados + remoto com dados → usa o mais recente (simple last-write-wins por ora)
async function handleFirstLoginMerge(){
  const hasLocalData = (DATA.errors||[]).length>0||(DATA.srs?.cards||[]).length>0||(DATA.sources||[]).length>0;
  const remote = await syncDown();

  if(!remote&&!hasLocalData){
    // Usuário novo, nada para fazer
    return;
  }
  if(!remote&&hasLocalData){
    // Subir dados locais para a conta nova
    const confirmed = confirm('Encontramos dados locais neste dispositivo (questões, erros, flashcards). Deseja enviá-los para sua conta na nuvem? Clique OK para sincronizar ou Cancelar para manter a conta vazia.');
    if(confirmed){
      await syncUp();
      showToast('✓ Dados enviados para sua conta.');
    }
    return;
  }
  if(remote&&!hasLocalData){
    // Conta tem dados, local não → carrega remoto
    Object.assign(DATA,remote);
    save();
    showToast('✓ Dados da sua conta carregados.');
    render();
    return;
  }
  // Ambos com dados: usa o mais recente baseado no updated_at remoto e timestamp local
  // Por enquanto, simples: pergunta ao usuário
  const useRemote = confirm('Você tem dados tanto neste dispositivo quanto na sua conta. Qual versão deseja manter?\n\nOK = Usar dados da conta (substitui o local)\nCancelar = Usar dados locais (substitui o da conta)');
  if(useRemote){
    Object.assign(DATA,remote);
    save();
    showToast('✓ Dados da conta carregados.');
  } else {
    await syncUp();
    showToast('✓ Dados locais enviados para a conta.');
  }
  render();
}

// Signup with email + password
async function authSignUp(email,password){
  if(!supa)throw new Error('Supabase não configurado');
  const {data,error} = await supa.auth.signUp({email,password});
  if(error)throw error;
  return data;
}

// Login
async function authSignIn(email,password){
  if(!supa)throw new Error('Supabase não configurado');
  const {data,error} = await supa.auth.signInWithPassword({email,password});
  if(error)throw error;
  return data;
}

// Logout
async function authSignOut(){
  if(!supa)return;
  // Sync before logout to preserve latest state
  try{await syncUp();}catch(_){}
  await supa.auth.signOut();
  // State reset happens in onAuthStateChange callback
}

// Render login/signup screen
function renderAuthScreen(){
  const wrap = mk('div','auth-wrap fade');
  const card = mk('div','auth-card');

  const logo = mk('div','auth-logo');
  logo.innerHTML = `<img src="${BRAND.birdLogo}" alt="" class="auth-logo-bird auth-bird-light"><img src="${BRAND.birdLogoDark}" alt="" class="auth-logo-bird auth-bird-dark"><span class="auth-logo-text">Gralia</span>`;
  card.appendChild(logo);
  const eyebrow = mk('div','auth-eyebrow');eyebrow.textContent='Preparação adaptativa para concursos';
  card.appendChild(eyebrow);

  const mode = ST.authMode||'login';
  const tabs = mk('div','auth-tabs');
  [['login','Entrar'],['signup','Criar conta']].forEach(([v,lbl])=>{
    const t = mk('button','auth-tab'+(mode===v?' on':''));
    t.textContent=lbl;
    t.addEventListener('click',()=>{ST.authMode=v;ST.authError=null;render();});
    tabs.appendChild(t);
  });
  card.appendChild(tabs);

  const form = mk('div','auth-form');
  const emailLbl = mk('label');emailLbl.textContent='Email';
  const email = mk('input');email.type='email';email.autocomplete='email';email.placeholder='voce@email.com';
  email.value=ST.authEmail||'';email.addEventListener('input',e=>{ST.authEmail=e.target.value;});
  form.appendChild(emailLbl);form.appendChild(email);

  const passLbl = mk('label');passLbl.textContent='Senha';passLbl.style.marginTop='.75rem';
  const pass = mk('input');pass.type='password';pass.autocomplete=mode==='signup'?'new-password':'current-password';
  pass.placeholder='mínimo 6 caracteres';
  pass.value=ST.authPass||'';pass.addEventListener('input',e=>{ST.authPass=e.target.value;});
  form.appendChild(passLbl);form.appendChild(pass);

  if(ST.authError){
    const err = mk('div','auth-error');err.textContent=ST.authError;
    form.appendChild(err);
  }

  const submitBtn = mkBtn(mode==='signup'?'Criar conta':'Entrar','btn btn-p btn-lg auth-submit');
  submitBtn.addEventListener('click',async()=>{
    const em = (ST.authEmail||'').trim();
    const pw = ST.authPass||'';
    if(!em||!pw){ST.authError='Preencha email e senha.';render();return;}
    if(mode==='signup'&&pw.length<6){ST.authError='Senha deve ter ao menos 6 caracteres.';render();return;}
    submitBtn.disabled=true;submitBtn.textContent='Aguarde...';
    ST.authError=null;
    try{
      if(mode==='signup'){
        await authSignUp(em,pw);
        ST.authSuccess='Conta criada! Verifique seu email para ativar (se configurado) e faça login.';
        ST.authMode='login';ST.authPass='';
      } else {
        await authSignIn(em,pw);
        // onAuthStateChange triggers the session + first render
        ST.authPass='';
      }
    }catch(e){
      ST.authError = (e.message||'').includes('Invalid login')?'Email ou senha incorretos.':
                     (e.message||'').includes('User already')?'Este email já está cadastrado.':
                     e.message||'Falha na autenticação.';
    }
    submitBtn.disabled=false;submitBtn.textContent=mode==='signup'?'Criar conta':'Entrar';
    render();
  });
  form.appendChild(submitBtn);

  if(ST.authSuccess){
    const ok = mk('div','auth-ok');ok.textContent=ST.authSuccess;
    form.appendChild(ok);
    ST.authSuccess=null;
  }

  card.appendChild(form);

  // Micro-note
  const note = mk('p','auth-note');
  note.textContent = mode==='signup'
    ? 'Ao criar conta, você concorda com os termos de uso. Seus dados ficam armazenados com segurança.'
    : 'Login requer conexão com internet.';
  card.appendChild(note);

  // "Back to welcome" link — useful if user wants to reread the landing
  const backLink = mk('a','auth-back-link');
  backLink.href='#';
  backLink.textContent='← Voltar e ler mais sobre a plataforma';
  backLink.addEventListener('click',e=>{
    e.preventDefault();
    ST.showAuth=false;
    DATA.welcomeShown=false;save();
    render();
  });
  card.appendChild(backLink);

  wrap.appendChild(card);
  return wrap;
}

/* ============================================================
   AUTH INIT — roda no boot
   ============================================================ */
async function initAuth(){
  // Wait up to 5s for Supabase CDN to load (may take a few hundred ms after fallbacks)
  const startWait = Date.now();
  while(typeof window.supabase==='undefined' && Date.now()-startWait<5000){
    await new Promise(r=>setTimeout(r,100));
  }
  if(typeof window.supabase==='undefined'){
    console.error('[NEXUS] Supabase SDK não carregou após 5s. Verifique sua conexão ou bloqueadores de script.');
    AUTH.loading = false;
    AUTH.authReady = true;
    render();
    return;
  }

  const client = initSupabase();
  if(!client){
    console.warn('[NEXUS] Supabase client não inicializou. Verifique SUPABASE_CONFIG.');
    AUTH.loading = false;
    AUTH.authReady = true;
    render();
    return;
  }

  // Listen for auth changes
  client.auth.onAuthStateChange(async(event,session)=>{
    const wasAuthed = !!AUTH.user;
    AUTH.session = session;
    AUTH.user = session?.user||null;
    AUTH.loading = false;
    AUTH.authReady = true;

    if(event==='SIGNED_IN'&&!wasAuthed){
      // Reset auth-flow state and ensure welcome is marked as seen
      ST.showAuth = false;
      DATA.welcomeShown = true;
      save();
      // First login of this session — merge data
      await handleFirstLoginMerge();
      // Load quota in background (non-blocking)
      fetchQuota().then(()=>render()).catch(()=>{});
    }
    if(event==='SIGNED_OUT'){
      // Clear sync state. Keep DATA as-is — user may log in to another account
      AUTH.syncError = null;
      AUTH.lastSyncAt = null;
      ST.showAuth = false;
      // Reset quota
      QUOTA.remaining = null;
      QUOTA.plan = 'trial';
    }
    render();
  });

  // Restore existing session (if any)
  try{
    const {data:{session}} = await withTimeout(client.auth.getSession(),5000,'getSession');
    if(session){
      AUTH.session = session;
      AUTH.user = session.user;
      // getSession doesn't fire SIGNED_IN; do a manual download (but don't block boot if it hangs)
      syncDown().then(remote=>{
        if(remote){
          Object.assign(DATA,remote);
          save();
          render();
        }
      }).catch(err=>{
        console.warn('[NEXUS] Initial syncDown failed (non-blocking):',err.message);
      });
      // Fetch quota (also non-blocking)
      fetchQuota().then(()=>render()).catch(()=>{});
    }
  }catch(e){
    console.warn('[NEXUS] getSession timeout or error:',e.message);
  }
  AUTH.loading = false;
  AUTH.authReady = true;
  render();
}
