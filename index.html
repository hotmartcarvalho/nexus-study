<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS · Polícia Legislativa Federal 2026</title>
<style>
:root{
  /* Light theme (default values, used when data-theme="light") */
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0ede8;--surface3:#e8e5e0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#181816;--text2:#686864;--text3:#a0a09c;
  --accent:#0F6E56;--accent-light:#E1F5EE;--accent-mid:#1D9E75;--accent-text:#085041;
  --red:#D94B4A;--red-light:#FCEBEB;--red-text:#791F1F;
  --amber:#B07316;--amber-light:#FDF0D5;--amber-text:#5E3A08;
  --purple:#6C5CE7;--purple-light:#EEEAFB;--purple-text:#3D3485;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-text:#0C447C;
  --r:10px;--rs:6px;
}
/* Dark theme: applied via data-theme="dark" on html OR via system preference when no override */
:root[data-theme="dark"]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#252523;--surface3:#2e2e2b;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --text:#eeebe5;--text2:#9a9a94;--text3:#585854;
  --accent:#1D9E75;--accent-light:#0b2e22;--accent-mid:#2CC490;--accent-text:#5DCAA5;
  --red:#E24B4A;--red-light:#281212;--red-text:#F09595;
  --amber:#EF9F27;--amber-light:#271c08;--amber-text:#FAC775;
  --purple:#8B7FF0;--purple-light:#1e1a38;--purple-text:#B0A8F8;
  --blue:#378ADD;--blue-light:#0a1e33;--blue-text:#85B7EB;
}
/* Fallback: if no explicit data-theme is set, follow system preference */
@media (prefers-color-scheme:dark){
  :root:not([data-theme]){
    --bg:#111110;--surface:#1c1c1a;--surface2:#252523;--surface3:#2e2e2b;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
    --text:#eeebe5;--text2:#9a9a94;--text3:#585854;
    --accent:#1D9E75;--accent-light:#0b2e22;--accent-mid:#2CC490;--accent-text:#5DCAA5;
    --red:#E24B4A;--red-light:#281212;--red-text:#F09595;
    --amber:#EF9F27;--amber-light:#271c08;--amber-text:#FAC775;
    --purple:#8B7FF0;--purple-light:#1e1a38;--purple-text:#B0A8F8;
    --blue:#378ADD;--blue-light:#0a1e33;--blue-text:#85B7EB;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
button,textarea,input,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;transition:background .15s,border-color .15s,color .15s,opacity .15s}
a{color:var(--accent)}

.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 1.25rem;gap:1.25rem}
.brand{font-size:15px;font-weight:700;letter-spacing:-.5px;white-space:nowrap}
.brand em{color:var(--accent);font-style:normal}
.tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.tab{padding:6px 12px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);border-radius:var(--rs);white-space:nowrap}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.on{background:var(--accent-light);color:var(--accent-text)}
.countdown-pill{background:var(--red-light);color:var(--red-text);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}

.page{max-width:740px;margin:0 auto;padding:1.75rem 1.25rem}
h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin-bottom:4px}
h3{font-size:15px;font-weight:600}

.setup-wrap{max-width:520px;margin:3rem auto;padding:0 1.25rem}
.setup-logo{font-size:36px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px}
.setup-logo em{color:var(--accent);font-style:normal}
.setup-eyebrow{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:1.75rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem}
.card+.card{margin-top:.75rem}
.card-pad{padding:1.1rem 1.25rem}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;font-size:13.5px;font-weight:500;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--text)}
.btn:hover:not(:disabled){background:var(--surface2)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover:not(:disabled){opacity:.9;background:var(--accent)}
.btn-lg{padding:12px 22px;font-size:14.5px;border-radius:var(--r)}
.btn-danger{color:var(--red-text);border-color:var(--red-light)}
.btn-danger:hover:not(:disabled){background:var(--red-light)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ans{flex:1;padding:13px;font-size:15px;font-weight:500;border-radius:var(--r)}
.btn-c:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.btn-e:hover:not(:disabled){background:var(--red-light);border-color:var(--red);color:var(--red-text)}

input[type=text],input[type=password],input[type=number],input[type=date],input[type=email],input[type=url],textarea,select{
  width:100%;padding:10px 12px;font-size:14px;line-height:1.55;
  border:1px solid var(--border2);border-radius:var(--rs);
  background:var(--surface);color:var(--text);outline:none;
  font-family:inherit
}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}
:root[data-theme="dark"] input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
@media (prefers-color-scheme:dark){
  :root:not([data-theme]) input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.65}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}

.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}

.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;text-align:center}
.scard-v{font-size:22px;font-weight:700;line-height:1.1}
.scard-l{font-size:11.5px;color:var(--text2);margin-top:3px}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.b-ok{background:var(--accent-light);color:var(--accent-text)}
.b-err{background:var(--red-light);color:var(--red-text)}
.b-warn{background:var(--amber-light);color:var(--amber-text)}
.b-info{background:var(--blue-light);color:var(--blue-text)}

.topic-tag{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);display:inline-block;margin-bottom:.875rem}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent-mid);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.flex{display:flex;gap:10px;align-items:center}
.flex-col{display:flex;flex-direction:column;gap:10px}
.mt{margin-top:.875rem}.mt-lg{margin-top:1.5rem}
.mb{margin-bottom:.875rem}.mb-lg{margin-bottom:1.5rem}
.txt{font-size:14px;line-height:1.75}
.txt2{font-size:13px;color:var(--text2);line-height:1.65}
.txt3{font-size:12px;color:var(--text3)}
.hint{font-size:12px;color:var(--text3);line-height:1.6;margin-top:6px}

.section-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:.7rem}

.countdown{background:linear-gradient(135deg,var(--accent) 0%,#0a5141 100%);color:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem;margin-bottom:1.25rem}
.countdown-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px}
.countdown-body{flex:1}
.countdown-lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.85;margin-bottom:2px}
.countdown-sub{font-size:13.5px;opacity:.95;margin-top:3px}

.dna-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.dna-lbl{font-size:12px;color:var(--text2);min-width:190px;text-align:right;flex-shrink:0}
.dna-track{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.dna-fill{height:100%;border-radius:4px;transition:width .5s ease}
.dna-num{font-size:12px;color:var(--text3);min-width:20px}

.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem;cursor:pointer;text-align:left;transition:all .15s;position:relative}
.mcard:hover{border-color:var(--accent);background:var(--accent-light)}
.mcard:hover .mcard-title{color:var(--accent-text)}
.mcard-icon{font-size:22px;margin-bottom:7px;display:block}
.mcard-title{font-size:13.5px;font-weight:600;margin-bottom:3px}
.mcard-desc{font-size:12px;color:var(--text2);line-height:1.5}
.mcard-tag{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:999px;text-transform:uppercase}

.conf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.conf-btn{padding:11px 6px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);text-align:center;font-size:12.5px;font-weight:500;color:var(--text)}
.conf-btn:hover{border-color:var(--border2);background:var(--surface2)}
.conf-btn.sel-c{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.conf-btn.sel-t{border-color:var(--amber);background:var(--amber-light);color:var(--amber-text)}
.conf-btn.sel-g{border-color:var(--red);background:var(--red-light);color:var(--red-text)}
.conf-icon{font-size:18px;display:block;margin-bottom:4px}

.fb-card{margin-top:.875rem;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);padding:1.25rem 1.5rem}
.fb-card.ok{border-color:var(--accent)}
.fb-card.err{border-color:var(--red)}
.meta-box{background:var(--surface2);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--text2);display:flex;flex-direction:column;gap:5px;margin-bottom:.875rem}
.meta-box strong{color:var(--text);font-weight:600}
.warn-box{background:var(--red-light);border:1px solid rgba(217,75,74,.2);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--red-text);margin-bottom:.875rem;line-height:1.6}
.warn-box b{font-weight:700}

.srs-flip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem 1.5rem;min-height:160px;display:flex;flex-direction:column;justify-content:center;margin-bottom:1rem}
.srs-front,.srs-back{font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.srs-front{font-weight:500}
.srs-divider{border-top:1px dashed var(--border2);margin:1rem 0}
.srs-rating{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rating-btn{padding:10px 6px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);text-align:center;font-size:12px;font-weight:500}
.rating-btn:hover{background:var(--surface2)}
.rating-btn b{display:block;font-size:14px;margin-bottom:2px}
.rating-hint{font-size:10.5px;color:var(--text3);margin-top:2px}

.pomo-main{text-align:center;padding:2rem 1rem}
.pomo-phase{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:.75rem}
.pomo-phase.focus{color:var(--accent)}
.pomo-phase.sbreak{color:var(--blue)}
.pomo-phase.lbreak{color:var(--purple)}
.pomo-time{font-size:84px;font-weight:800;letter-spacing:-4px;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:1rem;color:var(--text)}
.pomo-cycles{display:flex;justify-content:center;gap:8px;margin:1rem 0}
.cycle-dot{width:10px;height:10px;border-radius:50%;background:var(--surface3);border:1px solid var(--border)}
.cycle-dot.done{background:var(--accent);border-color:var(--accent)}
.pomo-controls{display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}

.src-list{display:flex;flex-direction:column;gap:8px}
.src-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1.1rem;display:flex;align-items:center;gap:12px}
.src-icon{width:36px;height:36px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.src-info{flex:1;min-width:0}
.src-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-meta{font-size:11.5px;color:var(--text3)}
.src-del{background:transparent;border:none;padding:6px;border-radius:var(--rs);color:var(--text3);font-size:16px}
.src-del:hover{background:var(--red-light);color:var(--red-text)}

.loading-row{display:flex;align-items:center;gap:10px;padding:.875rem 0;color:var(--text2);font-size:14px}
.pbar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:1.25rem}
.pbar{height:100%;border-radius:2px;transition:width .4s ease}

.drill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;cursor:pointer;position:relative;text-align:left}
.drill-card:hover{border-color:var(--border2);background:var(--surface2)}
.err-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700}
.drill-count{font-size:12px;color:var(--text2);margin-top:4px}

.alert{padding:11px 14px;border-radius:var(--rs);font-size:13px;line-height:1.6;margin-bottom:1rem;border:1px solid}
.alert-err{background:var(--red-light);color:var(--red-text);border-color:rgba(217,75,74,.25)}
.alert-warn{background:var(--amber-light);color:var(--amber-text);border-color:rgba(176,115,22,.25)}
.alert-info{background:var(--blue-light);color:var(--blue-text);border-color:rgba(24,95,165,.25)}
.alert a{color:inherit;text-decoration:underline}

.concept-box{background:var(--surface2);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem}
.stars{font-size:17px;letter-spacing:1px}

.back-btn{background:transparent;border:none;color:var(--text2);font-size:13px;padding:4px 0;margin-bottom:1rem;display:inline-flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--text)}

.sub-tabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:8px;flex-wrap:wrap}
.sub-tab{padding:5px 12px;font-size:12.5px;font-weight:500;border:none;background:transparent;color:var(--text2);border-radius:var(--rs)}
.sub-tab:hover{color:var(--text)}
.sub-tab.on{background:var(--surface2);color:var(--text)}

/* Discipline chips + filters */
.disc-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;margin-right:4px}
.disc-dot{width:7px;height:7px;border-radius:50%}
.disc-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.disc-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.disc-chip.on{border-color:transparent;color:var(--text)}
.disc-chip:hover{border-color:var(--border2)}
.disc-chip .dot{width:8px;height:8px;border-radius:50%}
.disc-chip .count{font-size:11px;color:var(--text3);margin-left:2px}
.disc-edit{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;display:flex;align-items:center;gap:10px;margin-bottom:6px}

/* Icon button */
.icon-btn{background:transparent;border:none;padding:6px;border-radius:var(--rs);color:var(--text3);font-size:14px;cursor:pointer}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.del:hover{background:var(--red-light);color:var(--red-text)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fd .15s ease}
.modal{background:var(--surface);border-radius:var(--r);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem 1.5rem}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-close{background:transparent;border:none;font-size:22px;color:var(--text2);cursor:pointer;line-height:1}

/* Card type selector */
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:.875rem}
.type-btn{padding:8px 4px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface);text-align:center;font-size:11px;font-weight:500;cursor:pointer}
.type-btn:hover{background:var(--surface2)}
.type-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.type-btn .emoji{font-size:18px;display:block;margin-bottom:3px}

/* Flashcard list item */
.flash-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;position:relative;margin-bottom:6px}
.flash-front{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.5;padding-right:32px;white-space:pre-wrap;word-break:break-word}
.flash-back{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.flash-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.flash-actions{position:absolute;top:8px;right:8px;display:flex;gap:2px}

@media(max-width:620px){.type-grid{grid-template-columns:repeat(3,1fr)}}

/* Review entry point on dashboard */
/* Feedback top row — badge + quality seal inline */
.fb-top-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* Quality seal — discreet badge explaining the review system */
.quality-seal{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--text3);font-size:10.5px;font-weight:500;cursor:help;border:1px solid transparent;transition:all .15s;margin-left:auto}
.quality-seal .qs-icon{color:var(--accent);font-weight:700;font-size:11px}
.quality-seal:hover{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent)}
/* First-time variant — subtle pulse to draw attention once */
.quality-seal.first-time{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent);padding-right:4px;animation:seal-pulse 2s ease-out 1}
.quality-seal.first-time .qs-dismiss{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.12);color:var(--accent-text);font-size:10px;margin-left:3px;cursor:pointer;font-weight:700;line-height:1}
.quality-seal.first-time .qs-dismiss:hover{background:rgba(0,0,0,.2)}
@keyframes seal-pulse{0%{box-shadow:0 0 0 0 var(--accent)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* ====== IMPORTAR QUESTÕES — howto + PDF upload ====== */
.import-howto{background:var(--blue-light);border:1px solid var(--blue);border-radius:var(--rs);overflow:hidden;margin-bottom:1rem}
.import-howto-head{width:100%;display:flex;justify-content:space-between;align-items:center;padding:.625rem .875rem;background:transparent;border:none;cursor:pointer;font-family:inherit;color:var(--blue-text);font-weight:600;font-size:12.5px;text-align:left}
.import-howto-head:hover{background:rgba(0,0,0,.04)}
.howto-caret{font-size:10px;opacity:.7}
.import-howto-body{padding:.25rem 1rem 1rem;font-size:12.5px;line-height:1.6;color:var(--text)}
.import-howto-body p{margin:.5rem 0}
.import-howto-body ol{margin:.5rem 0 .5rem 1.25rem;padding:0}
.import-howto-body ol > li{margin:4px 0}
.import-howto-body ul{margin:4px 0 4px 1.25rem;padding:0}
.import-howto-body ul li{margin:2px 0;font-size:12px}
.import-howto-body .muted{color:var(--text3);font-size:11.5px;margin-top:.75rem}

.pdf-import-area{background:var(--surface2);border-radius:var(--rs);padding:1rem;margin-bottom:.5rem}
.pdf-upload-btn{display:flex;align-items:center;gap:12px;padding:.875rem 1rem;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--rs);cursor:pointer;width:100%;transition:all .15s}
.pdf-upload-btn:hover{background:var(--accent-light);border-color:var(--accent);border-style:solid}

/* ====== PAINEL refinado (novo) ====== */
/* Hero — countdown + today stats */
.dash-hero{display:flex;gap:12px;margin-bottom:1rem;align-items:stretch;flex-wrap:wrap}
.dash-hero-left{flex:1;min-width:200px;background:linear-gradient(135deg,var(--accent),var(--accent-mid));color:#fff;border-radius:var(--r);padding:1.125rem 1.25rem;display:flex;align-items:center;gap:14px}
.dash-hero-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px}
.dhl-main{font-size:11px;font-weight:700;letter-spacing:1px;opacity:.92}
.dhl-sub{font-size:12.5px;opacity:.85;margin-top:3px}
.dash-hero-right{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch}
.dash-hero-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.625rem .875rem;min-width:95px;display:flex;flex-direction:column;justify-content:center}
.dhs-val{font-size:16px;font-weight:700;color:var(--text);line-height:1}
.dhs-lbl{font-size:10.5px;color:var(--text3);margin-top:3px}
@media(max-width:540px){
  .dash-hero{flex-direction:column}
  .dash-hero-right{width:100%;justify-content:space-between}
  .dash-hero-stat{flex:1;min-width:0;text-align:center;align-items:center}
}

/* Next action — single clear recommendation */
.next-action{background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.next-action-body{flex:1;min-width:240px;display:flex;align-items:center;gap:10px}
.next-action-emoji{font-size:22px;flex-shrink:0}
.next-action-texts{min-width:0}
.next-action-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:2px}
.next-action-desc{font-size:12px;color:var(--text2);line-height:1.5}
.next-action .btn{flex-shrink:0}

/* Compact summary grid */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:540px){.summary-grid{grid-template-columns:repeat(2,1fr)}}

/* Quick access row — slim buttons */
.quick-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:640px){.quick-row{grid-template-columns:repeat(2,1fr)}}
.quick-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:.75rem .5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;min-height:62px}
.quick-card:hover{background:var(--accent-light);border-color:var(--accent);transform:translateY(-1px)}
.qc-icon{font-size:18px}
.qc-title{font-size:12.5px;font-weight:500;line-height:1.2;text-align:center}

/* ====== USO DA API (card + detalhes) ====== */
.usage-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue-text,#185FA5);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:1.25rem;transition:border-color .2s}
.usage-card.warn{border-left-color:var(--amber)}
.usage-card.over{border-left-color:var(--red)}
.usage-card-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.usage-card-compact{flex:1;font-size:12px;color:var(--text2);min-width:200px}
.usage-card-compact b{color:var(--text);font-weight:600}
.usage-card-toggle{background:transparent;border:none;color:var(--text3);font-size:11px;padding:4px 8px;cursor:pointer;border-radius:var(--rs)}
.usage-card-toggle:hover{background:var(--surface2);color:var(--text)}

.usage-budget-bar-wrap{margin-top:.625rem}
.usage-budget-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.usage-budget-fill{height:100%;background:var(--accent);transition:width .4s}
.usage-budget-fill.warn{background:var(--amber)}
.usage-budget-fill.over{background:var(--red)}
.usage-budget-lbl{display:block;font-size:11px;color:var(--text3);margin-top:4px}
.usage-budget-lbl b{color:var(--text2);font-weight:600}

.usage-card-detail{margin-top:.875rem;padding-top:.75rem;border-top:1px dashed var(--border)}
.usage-card-sublbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-bottom:6px;margin-top:.75rem}
.usage-card-sublbl:first-child{margin-top:0}

.usage-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
@media(max-width:540px){.usage-mini-grid{grid-template-columns:repeat(2,1fr)}}
.usage-mini-cell{background:var(--surface2);border-radius:var(--rs);padding:.5rem;display:flex;flex-direction:column;gap:2px;text-align:center}
.mi-icon{font-size:16px}
.mi-label{font-size:10.5px;color:var(--text3);line-height:1.3}
.mi-cost{font-size:12px;font-weight:600;color:var(--text)}
.mi-cost.big{font-size:15px}
.mi-count{font-size:10px;color:var(--text3)}

/* Full usage view */
.usage-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.5rem}
@media(max-width:540px){.usage-stats-grid{grid-template-columns:1fr 1fr}}
.usage-stat{background:var(--surface2);border-radius:var(--rs);padding:.625rem;text-align:center}
.usage-stat .v{font-size:16px;font-weight:700;color:var(--text)}
.usage-stat .l{font-size:10.5px;color:var(--text3);margin-top:2px}

.usage-brk{display:flex;flex-direction:column;gap:4px}
.usage-brk-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:var(--rs);font-size:12.5px}
.usage-brk-left{display:flex;align-items:center;gap:8px}
.k-icon{font-size:14px}
.k-label{color:var(--text);font-weight:500}
.k-count{color:var(--text3);font-size:11px}
.usage-brk-cost{color:var(--text2);font-weight:600;font-size:12.5px}

.usage-proj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:.5rem}
@media(max-width:720px){.usage-proj-grid{grid-template-columns:repeat(2,1fr)}}
.usage-proj-cell{background:var(--surface2);border-radius:var(--rs);padding:.75rem;display:flex;flex-direction:column;gap:3px;text-align:center;align-items:center}
.usage-proj-cell.dim{opacity:.55}
.p-icon{font-size:18px}
.p-label{font-size:11px;color:var(--text2);line-height:1.3}
.p-cost{font-size:12.5px;font-weight:600;color:var(--text);margin-top:2px}
.p-cost.big{font-size:18px;font-weight:700}
.p-cost .brl{font-size:10.5px;color:var(--text3);font-weight:400}
.p-hint{font-size:10px;color:var(--text3);margin-top:2px}

/* ====== FONTES — importação inteligente ====== */
.smart-import-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.25rem}
@media(max-width:540px){.smart-import-row{grid-template-columns:1fr}}
.smart-import-btn{display:flex;align-items:center;gap:10px;padding:.75rem;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;color:inherit;position:relative;min-height:58px}
.smart-import-btn:not(.disabled):hover{background:var(--accent-light);border-color:var(--accent)}
.smart-import-btn.disabled{opacity:.5;cursor:not-allowed}
.smart-import-btn.loading{opacity:.6;cursor:wait}
.sib-icon{font-size:22px;flex-shrink:0}
.sib-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.sib-body b{font-size:13px;color:var(--text);font-weight:600}
.sib-body span{font-size:11px;color:var(--text3);line-height:1.4}

.quick-actions-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:540px){.quick-actions-grid{grid-template-columns:1fr}}
.quick-action{display:flex;align-items:center;gap:10px;padding:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;color:inherit}
.quick-action:hover{background:var(--accent-light);border-color:var(--accent);transform:translateY(-1px)}
.qa-icon{font-size:22px;flex-shrink:0}
.qa-body{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.qa-body b{font-size:13px;color:var(--text);font-weight:600}
.qa-body span{font-size:11px;color:var(--text3);line-height:1.4}

/* ====== MAPA DA MATÉRIA ====== */
.map-filters{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.875rem;padding:.75rem;background:var(--surface2);border-radius:var(--rs)}
.map-legend{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);margin-bottom:1rem;padding:.5rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);flex-wrap:wrap;line-height:1.6}
.map-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.map-legend .dot.high,.map-topic-dot.high{background:var(--accent-mid)}
.map-legend .dot.med,.map-topic-dot.med{background:var(--amber)}
.map-legend .dot.low,.map-topic-dot.low{background:var(--red)}
.map-legend .dot.none,.map-topic-dot.none{background:var(--text3);opacity:.5}
.map-tree{display:flex;flex-direction:column;gap:8px}
.map-disc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.map-disc-head{width:100%;background:transparent;border:none;padding:.75rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;font-family:inherit;color:inherit}
.map-disc-head:hover{background:var(--surface2)}
.map-caret{color:var(--text3);font-size:10px;width:12px;flex-shrink:0}
.map-disc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-disc-name{flex:1;font-weight:600;font-size:14px;color:var(--text)}
.map-disc-stats{color:var(--text3);font-size:11.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.map-mast-pill{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.map-mast-pill.high{background:var(--accent-light);color:var(--accent-text)}
.map-mast-pill.med{background:var(--amber-light);color:var(--amber-text)}
.map-mast-pill.low{background:var(--red-light);color:var(--red-text)}
.map-mast-pill.none{background:var(--surface2);color:var(--text3)}
.map-mast-pill.big{font-size:12px;padding:4px 10px}
.map-topics{display:flex;flex-direction:column;border-top:1px solid var(--border)}
.map-topic{width:100%;background:transparent;border:none;padding:.625rem .875rem .625rem 2.25rem;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;font-family:inherit;color:inherit;border-bottom:1px solid var(--border);transition:background .12s}
.map-topic:last-child{border-bottom:none}
.map-topic:hover{background:var(--surface2)}
.map-topic.selected{background:var(--accent-light);border-left:3px solid var(--accent);padding-left:calc(2.25rem - 3px)}
.map-topic-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.map-topic-name{font-size:13.5px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-topic-stats{font-size:11px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-shrink:0}
.map-topic-stats .err{color:var(--red-text)}
.map-topic-stats .crd{color:var(--purple-text)}
.map-topic-stats .qs{color:var(--blue-text)}
.map-topic-stats .mast.high{color:var(--accent-text)}
.map-topic-stats .mast.med{color:var(--amber-text)}
.map-topic-stats .mast.low{color:var(--red-text)}
.map-topic-detail{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--r);padding:1.125rem;margin-bottom:1.25rem}
.map-detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:.75rem}
.map-detail-stats{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:.75rem;border-bottom:1px dashed var(--border);margin-bottom:.875rem}
.map-stat-chip{font-size:11.5px;color:var(--text2);padding:3px 8px;background:var(--surface2);border-radius:10px}
.map-stat-chip.red{background:var(--red-light);color:var(--red-text)}
.map-stat-chip.amber{background:var(--amber-light);color:var(--amber-text)}
.map-section{margin-bottom:1rem}
.map-summary{margin:0 0 .5rem;font-size:13.5px;line-height:1.65;color:var(--text)}
.map-sublbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-top:.5rem;margin-bottom:4px}
.map-kp{margin:0 0 .5rem;padding-left:1.25rem;font-size:12.5px;line-height:1.6;color:var(--text2)}
.map-kp li{margin:2px 0}
.map-watch{margin:.5rem 0 0;padding:.625rem .75rem;background:var(--amber-light);border-left:3px solid var(--amber);border-radius:var(--rs);font-size:12.5px;line-height:1.55;color:var(--text)}
.map-card-item{padding:.5rem .75rem;background:var(--surface2);border-radius:var(--rs);margin-bottom:4px}
.map-card-front{margin:0;font-size:13px;line-height:1.5;color:var(--text)}
.map-card-meta{margin:3px 0 0;font-size:10.5px;color:var(--text3)}
.map-card-meta .tag-err{background:var(--red-light);color:var(--red-text);padding:1px 5px;border-radius:6px;margin-right:4px}
.map-card-meta .tag-hard{background:var(--amber-light);color:var(--amber-text);padding:1px 5px;border-radius:6px;margin-right:4px}
.map-err-item{padding:.5rem .75rem;background:var(--surface2);border-radius:var(--rs);margin-bottom:4px}
.map-err-q{margin:0;font-size:13px;line-height:1.5;color:var(--text)}
.map-err-meta{margin:3px 0 0;font-size:10.5px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ====== HISTÓRICO — cards ativos e interativos ====== */
.history-insight{background:var(--amber-light);border-left:3px solid var(--amber);padding:.7rem .875rem;border-radius:var(--rs);font-size:13px;line-height:1.5;color:var(--text);margin-bottom:1rem}

.quick-review-btn{width:100%;background:linear-gradient(135deg,var(--red),#b23030);color:#fff;border:none;border-radius:var(--r);padding:.875rem 1rem;display:flex;flex-direction:column;gap:2px;cursor:pointer;text-align:left;transition:transform .15s,filter .15s}
.quick-review-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.quick-review-btn span:first-child{font-size:14px}
.quick-review-btn span:last-child{font-size:11.5px;opacity:.85}

.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;position:relative}
.history-card.recent-24h{border-left:3px solid var(--red)}
.history-card.recurring{box-shadow:0 0 0 1px var(--amber) inset;background:linear-gradient(to right,var(--amber-light) 0%,var(--surface) 10%)}
.history-card.fixed{opacity:.75;border-left:3px solid var(--accent)}
.history-card-meta{display:flex;gap:6px;margin-bottom:.5rem;flex-wrap:wrap;align-items:center}
.history-question{font-size:14px;line-height:1.6;margin:.5rem 0;color:var(--text)}
.history-answer{font-size:12.5px;color:var(--text2);margin:.5rem 0 .375rem}
.history-answer b{color:var(--text);font-size:14px}
.history-actions{display:flex;gap:6px;margin-top:.625rem;flex-wrap:wrap;align-items:center}

.kw-hl{background:var(--amber-light);color:var(--amber-text);padding:0 3px;border-radius:3px;font-weight:600}

.exp-toggle-btn{background:transparent;border:none;color:var(--text3);font-size:11.5px;padding:4px 0;cursor:pointer;margin:4px 0 0;font-weight:500}
.exp-toggle-btn:hover{color:var(--text)}

.history-expl-box{background:var(--surface2);border-radius:var(--rs);padding:.625rem .75rem;margin-top:.25rem;margin-bottom:.5rem}

.retry-box{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--rs);padding:.75rem;margin:.5rem 0}
.retry-result{padding:.625rem;border-radius:var(--rs);font-size:13px}
.retry-result.ok{background:var(--accent-light);color:var(--accent-text)}
.retry-result.err{background:var(--red-light);color:var(--red-text)}
.retry-expl{margin-top:.5rem;font-size:12.5px;line-height:1.55;color:var(--text2)}

.trap-group-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:.625rem .875rem;background:var(--surface2);border-radius:var(--rs);margin-bottom:.5rem;flex-wrap:wrap}
.trap-group-title{font-size:14px;font-weight:600;color:var(--text)}
.trap-group-count{font-size:11.5px;color:var(--text2);margin-left:6px}

.qr-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}

.b-warn{background:var(--amber-light);color:var(--amber-text)}

/* ====== MODO FOCO (zen mode) ====== */
html.focus-mode .topbar{display:none}
html.focus-mode .container{padding-top:1rem}
html.focus-mode .back-btn{opacity:.5}
html.focus-mode .back-btn:hover{opacity:1}
html.focus-mode .method-info{display:none}
html.focus-mode .scard,html.focus-mode .dna-row,html.focus-mode .insight-card{display:none}

/* Focus mode toggle button (always visible in bottom-right) */
.focus-toggle{position:fixed;bottom:18px;right:18px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:all .15s}
.focus-toggle:hover{background:var(--accent-light);color:var(--accent-text);transform:scale(1.05)}
html.focus-mode .focus-toggle{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ====== TOAST ====== */
.ux-toast{position:fixed;bottom:-60px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,.2);z-index:1000;opacity:0;transition:bottom .3s,opacity .3s;max-width:80vw;text-align:center}
.ux-toast.visible{bottom:24px;opacity:1}

/* ====== SHORTCUTS OVERLAY ====== */
.shortcuts-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
.shortcuts-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;max-width:400px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.sk-row{display:flex;align-items:center;gap:12px;padding:6px 0;font-size:13px;color:var(--text2)}
.sk-row kbd{background:var(--surface2);border:1px solid var(--border2);border-bottom-width:2px;border-radius:4px;padding:2px 8px;font-size:11px;font-family:ui-monospace,monospace;color:var(--text);min-width:22px;text-align:center;font-weight:600}

/* ====== MICRO INTERAÇÕES ====== */
@keyframes flashGreen{0%{background:transparent}20%{background:var(--accent-light)}100%{background:transparent}}
@keyframes flashRed{0%{background:transparent}20%{background:var(--red-light)}100%{background:transparent}}
.flash-ok{animation:flashGreen .6s ease-out}
.flash-err{animation:flashRed .6s ease-out}

/* Enhanced fade for question transitions */
@keyframes gentleFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:gentleFadeIn .22s ease-out}

/* Softer loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ====== LEGIBILIDADE ====== */
/* Question enunciado — prioridade visual */
.question-card{font-size:15px;line-height:1.65}
.qcard-enun{font-size:15.5px;line-height:1.65;font-weight:500;color:var(--text)}

/* Feedback card — explicação com destaque sem ser pesada */
.fb-card .meta-box p,.fb-card > p{line-height:1.65}

/* Mobile comfort — slightly bigger touch targets */
@media(max-width:520px){
  .question-card,.qcard-enun{font-size:15px;line-height:1.7}
  .btn-ans{min-height:44px;font-size:15px}
  .btn{min-height:40px}
  .sub-tab{min-height:36px}
}

/* Shortcut hint chip (small, top-right on method screens) */
.sk-hint{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text3);padding:3px 7px;background:var(--surface2);border-radius:10px;margin-left:8px}

/* Method info panel — expandable explanation above each method */
.method-info{margin-bottom:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}

/* Score badge shown after quality-gated generation */
.score-badge{padding:6px 10px;background:var(--surface2);border-radius:var(--rs);font-size:11.5px;color:var(--text2);line-height:1.5}

/* Bank filters */

.wel-feat-desc{font-size:13px;line-height:1.55;color:var(--text2);margin:0}

/* Final CTA */
.wel-final-cta{text-align:center;padding:3rem 1.25rem;background:linear-gradient(135deg,var(--accent),var(--accent-mid));color:#fff;border-radius:var(--r);margin-top:1rem}

<script>
/* CONSTANTS */
// Default exam date — can be overridden in Config (stored in DATA.config.examDate)
const DEFAULT_EXAM_DATE = '2026-04-26T13:00:00-03:00';
const DEFAULT_EXAM_NAME = 'Prova';
function examDate(){
  const d = (DATA&&DATA.config&&DATA.config.examDate)||DEFAULT_EXAM_DATE;
  return new Date(d);
}
function examName(){
  return (DATA&&DATA.config&&DATA.config.examName)||DEFAULT_EXAM_NAME;
}
function formatExamDate(){
  const d = examDate();
  const pad = n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
const STORAGE_KEY = 'nexus_pl_v4';

    // Daily adaptive insights — cached by date (YYYY-MM-DD)
    insights:{},
    // Topic summaries cache
    topicSummaries:{},
    // Usage log

function activeDisciplines(){return DATA.disciplines.filter(d=>d.active)}
function activeSources(){
  const ids = new Set(activeDisciplines().map(d=>d.id));
  return DATA.sources.filter(s=>!s.disciplineId||ids.has(s.disciplineId));
}
function getDiscipline(id){return DATA.disciplines.find(d=>d.id===id)}
function inferDiscipline(topic){
  const t = (topic||'').toLowerCase();
  const active = activeDisciplines();
  if(active.length===0)return null;
  const map = {d1:['inteligência','contrainteligência','contra-inteligência','abin','sisbin','operação','fonte'],
    d2:['criminologia','criminoso','vítima','escola','delito','prevenção'],
    d3:['criminalística','perícia','balística','dna','local de crime','papiloscopia']};
  for(const d of active){
    const keys = map[d.id];
    if(keys&&keys.some(k=>t.includes(k)))return d.id;
  }
  return active[0].id;
}
function buildContent(){
  const srcs = activeSources();
  if(srcs.length===0)return '';
  // Detect dominant content type for directive injection
  const typeCount = {};
  srcs.forEach(s=>{const t=s.contentType||'misto';typeCount[t]=(typeCount[t]||0)+1;});
  const dominant = Object.entries(typeCount).sort((a,b)=>b[1]-a[1])[0][0];
  let directive = '';
  if(dominant==='lei_seca'){
    directive = '\n\n--- DIRETRIZ DE ESTILO ---\nConteúdo é majoritariamente LEI SECA. Priorize: (a) armadilhas por INVERSÃO de texto legal, (b) TERMO ABSOLUTO onde há exceções na lei, (c) OMISSÃO de prazos/percentuais/requisitos, (d) palavras-chave exatas ("somente", "exclusivamente", "em regra"). Evite questões sobre doutrina ou jurisprudência que não esteja no conteúdo.\n';
  } else if(dominant==='jurisprudencia'){
    directive = '\n\n--- DIRETRIZ DE ESTILO ---\nConteúdo é majoritariamente JURISPRUDÊNCIA. Priorize: (a) cenários APLICADOS ao caso concreto, (b) variação de contexto para testar se o candidato entendeu a tese, (c) diferenciação entre o que a Súmula/STF decidiu e o que é o texto legal puro. Evite literalidade de lei que não esteja explícita no conteúdo.\n';
  } else if(dominant==='doutrina'){
    directive = '\n\n--- DIRETRIZ DE ESTILO ---\nConteúdo é majoritariamente DOUTRINA. Priorize: (a) CLASSIFICAÇÕES e distinções conceituais, (b) comparações entre correntes/autores, (c) aplicação do conceito a situações práticas.\n';
  }
  return srcs.map(s=>{
    const disc = getDiscipline(s.disciplineId);
    const dLbl = disc?` (disciplina: ${disc.name})`:'';
    const tLbl = s.contentType&&s.contentType!=='misto' ? ` [${(CONTENT_TYPES[s.contentType]||{}).label||s.contentType}]` : '';
    return `[${SRC_TYPES[s.type].label.toUpperCase()}${dLbl}${tLbl}: ${s.name}]\n${s.content}`;
  }).join('\n\n---\n\n') + directive;
}
function hasContent(){return activeSources().length>0&&buildContent().length>50}

// Chamadas passam pelo proxy /api/generate (Vercel) que adiciona a chave Anthropic
// no servidor. Assim a chave nunca é exposta ao cliente.
async function callAPI(system, msgs, opts){
  const content = buildContent();
  if(!content)throw new Error('no-content');
  // Build system as array with cache_control on the content block.
  // The system instructions change between methods but the content block is reused
  // between chat turns of the same method — so caching it saves ~90% on repeated calls.
  const systemArr = [
    {type:'text',text:system},
    {type:'text',text:'CONTEÚDO DO CANDIDATO:\n\n'+content,cache_control:{type:'ephemeral'}}
  ];
  const finalMsgs = msgs; // user messages ficam limpos, sem conteúdo duplicado
  const modelOverride = opts&&opts.model;
  const body = {model:modelOverride||DATA.config.model,max_tokens:2500,system:systemArr,messages:finalMsgs};
  let r;
  try{
    r = await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
  }catch(netErr){
    console.error('Network error:',netErr);
    throw new Error('network: '+(netErr.message||'falha de rede'));
  }
  if(!r.ok){
    let errText = '';
    try{errText = await r.text();}catch(e){}
    console.error('API error', r.status, errText);
    throw new Error('api-'+r.status+': '+errText.slice(0,300));
  }
  let d;
  try{d = await r.json();}catch(e){throw new Error('resposta não é JSON válido');}
  const txt = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!txt)throw new Error('resposta vazia da IA');
  // Capture usage metrics (for cache ratio visibility)
  if(d.usage){
    ST._lastUsage = {
      input:d.usage.input_tokens||0,
      output:d.usage.output_tokens||0,
      cacheCreation:d.usage.cache_creation_input_tokens||0,
      cacheRead:d.usage.cache_read_input_tokens||0
    };
  }
  // Robust JSON extraction. The model sometimes wraps output in ```json ... ``` and
  // adds trailing narration after the block. We try, in order:
  // 1. Stripped backticks around the whole thing (happy path)
  // 2. Content between the first ```json ... ``` fence (if present)
  // 3. First balanced {...} object in the text (fallback)
  function extractJSON(raw){
    if(!raw||typeof raw!=='string')throw new Error('empty');
    // Strategy 1: strip fences and trim
    let s = raw.trim();
    const fence = s.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
    if(fence){s = fence[1].trim();}
    // Strategy 2: try direct parse
    try{return JSON.parse(s);}catch(_){}
    // Strategy 3: find first balanced JSON object in raw text.
    // Walks character by character tracking brace depth, respecting strings/escapes.
    const findBalanced = str=>{
      const start = str.indexOf('{');
      if(start<0)return null;
      let depth=0, inStr=false, esc=false;
      for(let i=start;i<str.length;i++){
        const ch = str[i];
        if(esc){esc=false;continue;}
        if(ch==='\\'){esc=true;continue;}
        if(ch==='"'){inStr=!inStr;continue;}
        if(inStr)continue;
        if(ch==='{')depth++;
        else if(ch==='}'){depth--;if(depth===0)return str.slice(start,i+1);}
      }
      return null;
    };
    const found = findBalanced(raw);
    if(found){
      try{return JSON.parse(found);}catch(_){}
    }
    throw new Error('no valid JSON found');
  }
  try{
    return extractJSON(txt);
  }catch(e){
    console.error('Parse error. Raw text:',txt);
    throw new Error('JSON inválido da IA: '+txt.slice(0,150));
  }
}

// Wraps an async callAPI invocation and records duration
async function timedCallAPI(methodKey,kind,system,msgs,opts){
  const t0 = performance.now();
  try{
    const res = await callAPI(system,msgs,opts);
    const dur = performance.now()-t0;
    const u = ST._lastUsage||{};
    const model = (opts&&opts.model)||DATA.config.model;
    ST.lastGen[methodKey] = {
      model,durationMs:dur,kind,
      cacheRead:u.cacheRead||0,
      input:u.input||0,
      output:u.output||0
    };
    // Log for usage tracking
    logUsage({
      model,
      kind,
      action:methodKey,
      input:u.input||0,
      output:u.output||0,
      cacheRead:u.cacheRead||0,
      cacheCreation:u.cacheCreation||0
    });
    return res;
  }catch(e){
    throw e;
  }
}

/* Quality-gated call: accept if score>=75, retry once, then accept best result.
   Used for flashcards (SRS_GEN, CARD_FROM_ERROR) which have SYS_COMPLETE_EVAL prompts.
   Returns {result, attempts, finalScore, regenerated, discarded}. */
async function callAPIWithScore(methodKey,kind,system,msgs,opts,minScore){
  const threshold = minScore||75;
  let best = null;let bestScore = -1;
  const attempts = [];
  for(let i=0;i<3;i++){
    try{
      const res = await timedCallAPI(methodKey,kind,system,msgs,opts);
      // Extract score — handle single card or array of cards
      let score = 100;
      if(res.score!==undefined)score=Number(res.score)||0;
      else if(Array.isArray(res.cards)&&res.cards.length>0){
        // Average scores from all cards
        const scores = res.cards.map(c=>Number(c.score)||100).filter(s=>s>0);
        if(scores.length>0)score = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
      }
      attempts.push({score,res});
      if(score>bestScore){best=res;bestScore=score;}
      if(score>=threshold)break; // ótimo, aceita
      // Se score<75 e ainda não tentou todas, vai tentar de novo (regenerar)
    }catch(e){
      // Se primeira tentativa falha, propaga. Se tentativas seguintes falham,
      // retorna o melhor resultado anterior (se houver).
      if(i===0)throw e;
      break;
    }
  }
  return {
    result:best,
    finalScore:bestScore,
    attempts:attempts.length,
    regenerated:attempts.length>1,
    discarded:bestScore>0&&bestScore<threshold
  };
}

function dynamicLoading(kind,initialMsg){

  const d = mk('div','loading-row');
  const sp = mk('span','spinner');
  const txt = mk('span');txt.style.marginLeft='6px';

  d.appendChild(sp);d.appendChild(txt);
  let i = 0;

    txt.style.transition='opacity .25s';

  },2500);
  return d;

  }
  if(needsAPIKey()){
    const w = errorBox('⚠ <b>Chave API não configurada.</b> Os métodos com IA não funcionarão sem ela. <a href="#" id="goConf">Configurar agora</a>');
    wrap.appendChild(w);
    setTimeout(()=>{const l=$('goConf');if(l)l.addEventListener('click',e=>{e.preventDefault();ST.view='settings';render();});},0);
  }

  // ===== NEXT ACTION — single clear recommendation =====
  const nextAction = buildNextActionCard(dueSrs,errorsNoCard,overconf,s);
  if(nextAction)wrap.appendChild(nextAction);

  // ===== INSIGHT =====
  wrap.appendChild(buildInsightCard());

  // ===== USAGE =====
  const uc = buildUsageCard();
  if(uc)wrap.appendChild(uc);

  // ===== PROGRESS BY DISCIPLINE — only if there's data =====
  const byD = {};
  DATA.disciplines.forEach(d=>{byD[d.id]={total:0,recent:0,score:0}});
  const DAY_MS = 24*60*60*1000;
  DATA.errors.forEach(e=>{
    if(e.disciplineId&&byD[e.disciplineId]){
      byD[e.disciplineId].total+=1;
      byD[e.disciplineId].score+=errorWeight(e);
      if(Date.now()-(e.date||0)<=DAY_MS)byD[e.disciplineId].recent+=1;
    }
  });
  const discWithErr = DATA.disciplines.filter(d=>byD[d.id].total>0)
    .sort((a,b)=>byD[b.id].score-byD[a.id].score);

  if(discWithErr.length>0){
    const discCard = mk('div','card');discCard.style.cssText='margin-bottom:1.25rem';
    const head = mk('div','flex');head.style.cssText='justify-content:space-between;align-items:center;margin-bottom:.625rem';
    const t = mk('h3');t.style.cssText='margin:0;font-size:14px';t.textContent='📊 Erros por disciplina';
    head.appendChild(t);
    const hint = mk('span','txt3');hint.style.fontSize='10.5px';hint.textContent='mais recentes pesam mais';
    head.appendChild(hint);
    discCard.appendChild(head);
    const maxScore = Math.max(...discWithErr.map(d=>byD[d.id].score),1);
    discWithErr.slice(0,5).forEach(d=>{
      const data = byD[d.id];
      const row = mk('div','dna-row');
      const lbl = mk('div','dna-lbl');
      lbl.style.cssText='display:flex;align-items:center;gap:6px;justify-content:flex-end';
      const nm = mk('span');nm.textContent=d.name;
      const dot = mk('span');dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0`;
      lbl.appendChild(nm);lbl.appendChild(dot);
      const track = mk('div','dna-track');
      const fill = mk('div','dna-fill');fill.style.width=(data.score/maxScore*100)+'%';fill.style.background=d.color;
      track.appendChild(fill);
      const num = mk('div','dna-num');num.style.minWidth='70px';
      num.innerHTML = data.recent>0?`${data.total} <span style="color:var(--red)">(${data.recent} recentes)</span>`:String(data.total);
      row.appendChild(lbl);row.appendChild(track);row.appendChild(num);
      discCard.appendChild(row);
    });
    if(discWithErr.length>5){
      const more = mk('p','txt3');more.style.cssText='margin:.5rem 0 0;text-align:right;font-size:11.5px';
      more.innerHTML = `<a href="#" id="mapLink">Ver mapa completo →</a>`;
      discCard.appendChild(more);
      setTimeout(()=>{const l=$('mapLink');if(l)l.addEventListener('click',e=>{e.preventDefault();ST.view='mapa';render();});},0);
    }
    wrap.appendChild(discCard);
  }

  // ===== CALIBRATION WARNING — sits compactly =====
  if(overconf!==null&&overconf>25){
    wrap.appendChild(errorBox(`⚠ <b>Atenção:</b> você erra ${overconf}% dos "tenho certeza". Esse padrão custa pontos. Treine Calibração.`));
  }

  // ===== SUMMARY NUMBERS — 4-up grid but more compact =====
  if(s.total>0||DATA.srs.cards.length>0||weekFocusMin>0){
    const sg = mk('div','summary-grid');
    const items = [
      {v:s.total?s.correct+'/'+s.total:'—',l:'Acertos',c:pct>=80?'var(--accent)':pct>=60?'var(--amber)':s.total?'var(--red)':'var(--text3)'},
      {v:s.total?pct+'%':'—',l:'Aproveit.',c:pct>=80?'var(--accent)':pct>=60?'var(--amber)':s.total?'var(--red)':'var(--text3)'},
      {v:DATA.srs.cards.length||'0',l:'Flashcards',c:DATA.srs.cards.length>0?'var(--accent)':'var(--text3)'},
      {v:weekFocusMin>0?Math.round(weekFocusMin/60*10)/10+'h':'—',l:'Foco 7d',c:weekFocusMin>0?'var(--blue-text)':'var(--text3)'}
    ];
    items.forEach(({v,l,c})=>{
      const sc = mk('div','scard');
      const sv = mk('div','scard-v');sv.style.color=c;sv.textContent=v;
      const sl = mk('div','scard-l');sl.textContent=l;
      sc.appendChild(sv);sc.appendChild(sl);sg.appendChild(sc);
    });
    wrap.appendChild(sg);
  }

  // ===== QUICK ACCESS — slim row, 3 primary actions =====
  const qaLbl = sLabel('Acesso rápido');qaLbl.style.marginTop='1.25rem';wrap.appendChild(qaLbl);
  const qg = mk('div','quick-row');
  [
    ['📝','Questões','practice'],
    ['🎴','Cards'+(dueSrs>0?` · ${dueSrs}`:''),'srs'],
    ['⏱','Pomodoro'+(todayFocusMin>0?` · ${todayFocusMin}m`:''),'pomodoro'],
    ['🗺️','Mapa','mapa']
  ].forEach(([icon,title,view])=>{
    const mc = mk('button','quick-card');
    mc.innerHTML = `<span class="qc-icon">${icon}</span><span class="qc-title">${title}</span>`;
    mc.addEventListener('click',()=>{ST.view=view;render();});
    qg.appendChild(mc);
  });
  wrap.appendChild(qg);

  return wrap;
}

// Build a single "next action" recommendation card — only 1 CTA, zero ambiguity
function buildNextActionCard(dueSrs,errorsNoCard,overconf,sess){
  // Priority order: SRS due > recent errors without card > calibration warning > practice
  let rec = null;
  const DAY = 24*60*60*1000;
  const recentErrCount = (DATA.errors||[]).filter(e=>(Date.now()-(e.date||0))<=DAY).length;

  if(dueSrs>=10){
    rec = {emoji:'🎴',title:`${dueSrs} flashcards pendentes de revisão`,desc:'Priorize antes de criar novos — cards acumulados perdem eficácia.',cta:'Revisar agora',action:()=>{ST.view='srs';ST.srsSubview='study';render();}};
  } else if(errorsNoCard>=5){
    rec = {emoji:'⚠️',title:`${errorsNoCard} erros ainda sem flashcard`,desc:'Erros viram pontos de revisão. Transforme agora para não esquecer.',cta:'Criar flashcards',action:()=>{ST.view='srs';ST.srsSubview='errors';render();}};
  } else if(recentErrCount>=3){
    rec = {emoji:'🔁',title:`Revisar ${recentErrCount} erros das últimas 24h`,desc:'Revisar erros recentes é 3× mais eficaz que estudar conteúdo novo.',cta:'Ir ao Histórico',action:()=>{ST.view='history';render();}};
  } else if(overconf!==null&&overconf>25){
    rec = {emoji:'🎯',title:'Falsa segurança detectada',desc:`Você erra ${overconf}% dos "tenho certeza". Treinar Calibração vale mais que questões soltas.`,cta:'Treinar Calibração',action:()=>{ST.view='calibration';render();}};
  } else if(dueSrs>0){
    rec = {emoji:'🎴',title:`${dueSrs} card${dueSrs>1?'s':''} aguardando revisão`,desc:'Revisão curta — poucos minutos.',cta:'Revisar',action:()=>{ST.view='srs';ST.srsSubview='study';render();}};
  } else if(sess.total===0&&hasContent()){
    rec = {emoji:'📝',title:'Comece a praticar',desc:'Questões Certo/Errado estilo Cebraspe geradas do seu material.',cta:'Abrir Practice',action:()=>{ST.view='practice';render();}};
  } else if(sess.total>0){
    rec = {emoji:'📝',title:'Continue resolvendo questões',desc:'O método mais eficaz de estudo é a prática ativa.',cta:'Continuar',action:()=>{ST.view='practice';render();}};
  }

  if(!rec)return null;
  const card = mk('div','next-action');
  const left = mk('div','next-action-body');
  const emoji = mk('span','next-action-emoji');emoji.textContent=rec.emoji;
  const texts = mk('div','next-action-texts');
  const t = mk('div','next-action-title');t.textContent=rec.title;
  const d = mk('div','next-action-desc');d.textContent=rec.desc;
  texts.appendChild(t);texts.appendChild(d);
  left.appendChild(emoji);left.appendChild(texts);
  card.appendChild(left);
  const btn = mkBtn(rec.cta+' →','btn btn-p btn-sm');
  btn.addEventListener('click',rec.action);
  card.appendChild(btn);
  return card;
}

/* SOURCES */
function renderSources(){
  const wrap = mk('div','fade');
  const h = mk('h1');h.textContent='Fontes de Estudo';
  const sub = mk('p','txt2');sub.style.marginBottom='1rem';
  sub.textContent='Cole materiais do NotebookLM. Organize por disciplina e ative/desative para focar em uma matéria por vez.';
  wrap.appendChild(h);wrap.appendChild(sub);

  const st = mk('div','sub-tabs');
  [['list','Minhas fontes'],['add','Adicionar'],['disc','Disciplinas']].forEach(([v,lbl])=>{
    const t = mkBtn(lbl,'sub-tab'+(ST.srcSubview===v?' on':''));
    t.addEventListener('click',()=>{ST.srcSubview=v;render();});
    st.appendChild(t);
  });
  wrap.appendChild(st);

  if(ST.srcSubview==='list')return renderSourceList(wrap);
  if(ST.srcSubview==='add')return renderSourceAdd(wrap);

function renderSourceList(wrap){
  wrap.appendChild(sLabel('Disciplinas ativas (clique para ativar/desativar)'));
  const chips = mk('div','disc-filter');
  DATA.disciplines.forEach(d=>{
    const count = DATA.sources.filter(s=>s.disciplineId===d.id).length;
    const chip = mk('button','disc-chip'+(d.active?' on':''));
    if(d.active){chip.style.background=d.color+'22';chip.style.color=d.color;}
    const dot = mk('span','dot');dot.style.background=d.color;
    const nm = mk('span');nm.textContent=d.name;
    const cn = mk('span','count');cn.textContent=count;
    chip.appendChild(dot);chip.appendChild(nm);chip.appendChild(cn);
    chip.addEventListener('click',()=>{d.active=!d.active;save();render();});
    chips.appendChild(chip);
  });
  wrap.appendChild(chips);

  const total = DATA.sources.length;
  if(total===0){
    const info = mk('div','alert alert-info');
    info.textContent='Nenhuma fonte ainda. Clique em "Adicionar" para começar.';
    wrap.appendChild(info);return wrap;
  }
  const activeCount = activeSources().length;
  const chars = activeSources().reduce((a,s)=>a+s.content.length,0);
  const stats = mk('div','flex');stats.style.gap='1rem';stats.style.marginBottom='.875rem';stats.style.fontSize='12.5px';
  stats.innerHTML=`<span class="txt3">Total:</span> <b>${total}</b> · <span class="txt3">Ativas:</span> <b>${activeCount}</b> (${(chars/1000).toFixed(1)}k chars)`;
  wrap.appendChild(stats);

  const list = mk('div','src-list');
  DATA.sources.forEach(src=>{
    const cfg = SRC_TYPES[src.type]||SRC_TYPES.outro;
    const disc = getDiscipline(src.disciplineId);
    const isActive = !disc||disc.active;
    const item = mk('div','src-item');
    if(!isActive)item.style.opacity='.45';
    const ic = mk('div','src-icon');ic.style.background=cfg.bg;ic.style.color=cfg.color;ic.textContent=cfg.icon;
    const info = mk('div','src-info');
    const name = mk('div','src-name');name.textContent=src.name;
    const meta = mk('div','src-meta');
    const mt1 = mk('span');mt1.textContent=`${cfg.label} · ${(src.content.length/1000).toFixed(1)}k chars`;
    meta.appendChild(mt1);
    if(disc){
      const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
      const dot = mk('span','disc-dot');dot.style.background=disc.color;
      const dn = mk('span');dn.textContent=disc.name;
      dTag.appendChild(dot);dTag.appendChild(dn);
      meta.appendChild(dTag);
    }
    info.appendChild(name);info.appendChild(meta);
    const actions = mk('div','flex');actions.style.gap='2px';
    const edit = mkBtn('✏️','icon-btn');
    edit.addEventListener('click',()=>showEditSourceModal(src));
    const del = mkBtn('×','icon-btn del');
    del.addEventListener('click',()=>{if(confirm('Remover "'+src.name+'"?')){DATA.sources=DATA.sources.filter(x=>x.id!==src.id);save();render();}});
    actions.appendChild(edit);actions.appendChild(del);
    item.appendChild(ic);item.appendChild(info);item.appendChild(actions);
    list.appendChild(item);
  });
  wrap.appendChild(list);
  return wrap;
}

function renderSourceAdd(wrap){
  // State for smart import pipeline (not in ST because it's transient)
  if(!ST.srcImportState)ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null,justSavedId:null,pdfProgress:null};
  const is = ST.srcImportState;

  // ---------- Stage 1: Post-import success panel (if just saved) ----------
  if(is.mode==='saved'&&is.justSavedId){
    const src = DATA.sources.find(s=>s.id===is.justSavedId);
    if(src){
      const successCard = mk('div','card');successCard.style.borderLeft='4px solid var(--accent)';
      const t = mk('h3');t.style.cssText='margin:0 0 .25rem';t.textContent='✓ Fonte adicionada';
      successCard.appendChild(t);
      const sub = mk('p','txt2');sub.style.cssText='margin:0 0 .875rem;font-size:13px';
      sub.textContent=`"${src.name}" foi adicionada ao material de estudo. Aproveite para aplicar logo:`;
      successCard.appendChild(sub);

      const actionsGrid = mk('div','quick-actions-grid');
      const mkAction = (icon,label,desc,onClick)=>{
        const b = mk('button','quick-action');
        b.innerHTML = `<div class="qa-icon">${icon}</div><div class="qa-body"><b>${label}</b><span>${desc}</span></div>`;
        b.addEventListener('click',onClick);
        return b;
      };
      actionsGrid.appendChild(mkAction('🎴','Gerar flashcards','Cards prontos para revisão em SRS',()=>{
        ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null};
        ST.view='srs';ST.srsSubview='generate';render();
      }));
      actionsGrid.appendChild(mkAction('📝','Praticar questões','Questões C/E no estilo da banca',()=>{
        ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null};
        ST.view='practice';render();
      }));
      actionsGrid.appendChild(mkAction('🗺️','Ver na matéria','Entender onde este conteúdo se encaixa',()=>{
        ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null};
        ST.view='mapa';ST.mapDiscipline=src.disciplineId;render();
      }));
      successCard.appendChild(actionsGrid);

      const skip = mkBtn('Adicionar outra fonte','btn btn-sm');skip.style.marginTop='.75rem';
      skip.addEventListener('click',()=>{
        ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null};
        render();
      });
      successCard.appendChild(skip);
      wrap.appendChild(successCard);
      return wrap;
    }
  }

  // ---------- Stage 2: Review organized result (before save) ----------
  if(is.mode==='review'&&is.organizedResult){
    const r = is.organizedResult;
    const reviewCard = mk('div','card');
    const rh = mk('h3');rh.style.cssText='margin:0 0 .25rem';rh.textContent='✨ Conteúdo organizado';
    reviewCard.appendChild(rh);
    const rsub = mk('p','txt2');rsub.style.cssText='margin:0 0 .875rem;font-size:13px';
    rsub.textContent='Revise os dados abaixo antes de salvar. Você pode editar tudo.';
    reviewCard.appendChild(rsub);

    // Topics found
    if(r.topics&&r.topics.length>0){
      const tLbl = mk('div','section-label');tLbl.textContent=`${r.topics.length} tópicos identificados`;tLbl.style.marginBottom='.375rem';
      reviewCard.appendChild(tLbl);
      const pills = mk('div');pills.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.875rem';
      r.topics.slice(0,15).forEach(t=>{
        const p = mk('span','topic-tag');p.textContent=t;p.style.marginBottom='0';
        pills.appendChild(p);
      });
      reviewCard.appendChild(pills);
    }

    // Classification — show if present
    if(r.classification){
      const c = r.classification;
      const classRow = mk('div','flex');classRow.style.cssText='gap:8px;flex-wrap:wrap;margin-bottom:.875rem';
      if(c.disciplineId){
        const disc = getDiscipline(c.disciplineId);
        if(disc){
          const dTag = mk('span','badge');dTag.style.cssText=`background:${disc.color}22;color:${disc.color}`;
          dTag.innerHTML = `💡 Sugerida: <b>${disc.name}</b>`;
          classRow.appendChild(dTag);
        }
      }
      if(c.contentType&&CONTENT_TYPES[c.contentType]){
        const ctTag = mk('span','badge b-info');
        ctTag.innerHTML = `💡 Tipo: <b>${CONTENT_TYPES[c.contentType].label}</b>`;
        classRow.appendChild(ctTag);
      }
      if(classRow.children.length>0)reviewCard.appendChild(classRow);
    }

    // Editable fields
    const fLbl = mk('label');fLbl.textContent='Nome da fonte';fLbl.style.marginTop='.5rem';
    const fInp = mk('input');fInp.type='text';fInp.value=ST.srcInput.name||'';
    fInp.addEventListener('input',e=>{ST.srcInput.name=e.target.value;});
    reviewCard.appendChild(fLbl);reviewCard.appendChild(fInp);

    const dLbl = mk('label');dLbl.textContent='Disciplina';dLbl.style.marginTop='.75rem';
    const dSel = mk('select');
    DATA.disciplines.forEach(d=>{
      const o = mk('option');o.value=d.id;o.textContent=d.name;
      if(ST.srcInput.disciplineId===d.id)o.selected=true;
      dSel.appendChild(o);
    });
    dSel.addEventListener('change',e=>{ST.srcInput.disciplineId=e.target.value;});
    reviewCard.appendChild(dLbl);reviewCard.appendChild(dSel);

    const ctLbl = mk('label');ctLbl.textContent='Tipo de conteúdo';ctLbl.style.marginTop='.75rem';
    const ctSel = mk('select');
    Object.entries(CONTENT_TYPES).forEach(([k,v])=>{
      const o = mk('option');o.value=k;o.textContent=v.label;
      if((ST.srcInput.contentType||'misto')===k)o.selected=true;
      ctSel.appendChild(o);
    });
    ctSel.addEventListener('change',e=>{ST.srcInput.contentType=e.target.value;});
    reviewCard.appendChild(ctLbl);reviewCard.appendChild(ctSel);

    const cLbl = mk('label');cLbl.textContent='Conteúdo organizado (edite se precisar)';cLbl.style.marginTop='.75rem';
    const cTa = mk('textarea');cTa.rows=14;cTa.style.fontFamily='ui-monospace,monospace';cTa.style.fontSize='12.5px';
    cTa.value=ST.srcInput.content||r.organized||'';
    cTa.addEventListener('input',e=>{ST.srcInput.content=e.target.value;});
    reviewCard.appendChild(cLbl);reviewCard.appendChild(cTa);

    const btnRow = mk('div','flex');btnRow.style.cssText='gap:8px;margin-top:1rem;flex-wrap:wrap';
    const confirmBtn = mkBtn('✓ Salvar fonte','btn btn-p');
    confirmBtn.addEventListener('click',()=>{
      const newSrc = {
        id:Date.now()+''+Math.random(),
        name:(ST.srcInput.name||'Nova fonte').trim(),
        type:ST.srcInput.type||'relatorio',
        contentType:ST.srcInput.contentType||'misto',
        disciplineId:ST.srcInput.disciplineId,
        content:(ST.srcInput.content||r.organized||'').trim(),
        topics:r.topics||[],
        createdAt:Date.now(),
        organized:true
      };
      DATA.sources.push(newSrc);
      save();
      ST.srcInput={name:'',type:'relatorio',contentType:'misto',content:'',disciplineId:ST.srcInput.disciplineId};
      ST.srcImportState = {mode:'saved',justSavedId:newSrc.id,organizing:false,pdfLoading:false,organizedResult:null};
      render();
    });
    btnRow.appendChild(confirmBtn);
    const cancel = mkBtn('Descartar','btn btn-sm');
    cancel.addEventListener('click',()=>{
      if(confirm('Descartar o conteúdo organizado?')){
        ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null};
        render();
      }
    });
    btnRow.appendChild(cancel);
    reviewCard.appendChild(btnRow);
    wrap.appendChild(reviewCard);
    return wrap;
  }

  // ---------- Stage 3: Main form ----------
  const addCard = mk('div','card');
  const addH = mk('h3');addH.textContent='Adicionar fonte';addH.style.marginBottom='.5rem';
  addCard.appendChild(addH);
  const help = mk('p','txt3');help.style.cssText='margin:0 0 1rem;font-size:12px;line-height:1.5';
  help.textContent='Cole texto, carregue um PDF, ou deixe a IA organizar tudo para você.';
  addCard.appendChild(help);

  // Quick import actions row
  const quickRow = mk('div','smart-import-row');
  // PDF upload
  const pdfLbl = mk('label','smart-import-btn');
  pdfLbl.innerHTML = '<span class="sib-icon">📄</span><span class="sib-body"><b>PDF</b><span>Extrai o texto automaticamente</span></span>';
  const pdfInp = mk('input');pdfInp.type='file';pdfInp.accept='.pdf,application/pdf';pdfInp.style.display='none';
  pdfInp.addEventListener('change',async e=>{
    const file = e.target.files[0];if(!file)return;
    ST.srcImportState.pdfLoading = true;
    ST.srcImportState.pdfProgress = {current:0,total:0};
    render();
    try{
      const text = await extractPdfText(file,(curr,total)=>{
        ST.srcImportState.pdfProgress = {current:curr,total};
        // Don't full-render per page (would reset input). Update ref if visible.
        const prog = document.getElementById('pdf-progress-txt');
        if(prog)prog.textContent = `Extraindo página ${curr}/${total}...`;
      });
      ST.srcInput.content = text;
      if(!ST.srcInput.name)ST.srcInput.name = file.name.replace(/\.pdf$/i,'');
      ST.srcInput.type = 'relatorio';
      ST.srcImportState.pdfLoading = false;
      ST.srcImportState.pdfProgress = null;
      showToast('✓ PDF carregado. '+text.length+' caracteres extraídos.');
      render();
    }catch(err){
      ST.srcImportState.pdfLoading = false;
      ST.srcImportState.pdfProgress = null;
      alert('Erro ao processar PDF: '+(err.message||err));
      render();
    }
  });
  pdfLbl.appendChild(pdfInp);
  pdfLbl.addEventListener('click',()=>pdfInp.click());
  if(is.pdfLoading)pdfLbl.classList.add('loading');
  quickRow.appendChild(pdfLbl);

  // Smart organize (enabled only when there's content)
  const hasContent = (ST.srcInput.content||'').trim().length>100;
  const smartBtn = mk('button','smart-import-btn'+(hasContent?'':' disabled'));
  smartBtn.innerHTML = '<span class="sib-icon">📚</span><span class="sib-body"><b>Organizar com IA</b><span>Estrutura em tópicos + classifica disciplina</span></span>';
  if(hasContent){
    smartBtn.addEventListener('click',async()=>{
      ST.srcImportState.organizing = true;render();
      try{
        const res = await smartOrganizeContent(ST.srcInput.content,{classify:true});
        // Apply classification if provided
        if(res.classification){
          if(res.classification.disciplineId&&DATA.disciplines.find(d=>d.id===res.classification.disciplineId)){
            ST.srcInput.disciplineId = res.classification.disciplineId;

function handleErr(e,container){
  console.error('NEXUS error:',e);
  const msg = e.message||String(e);
  let text = 'Erro ao conectar com a IA.';
  if(msg.includes('no-content'))text='⚠ Adicione fontes em "Fontes" e ative ao menos uma disciplina.';
  else if(msg.includes('no-key'))text='⚠ Chave API não configurada. Vá em "Config" e cole sua chave.';
  else if(msg.includes('network'))text='⚠ Falha de rede ou CORS. Veja o console do navegador (F12) para detalhes.';
  else if(msg.includes('api-401')||msg.includes('api-403'))text='⚠ Chave API inválida ou sem crédito. Confira em console.anthropic.com.';
  else if(msg.includes('api-404'))text='⚠ Modelo não encontrado. Vá em Config e selecione outro modelo (sugestão: claude-haiku-4-5-20251001).';
  else if(msg.includes('api-429'))text='⚠ Limite de requisições atingido. Aguarde alguns segundos.';
  else if(msg.includes('api-'))text='⚠ Erro da API: '+msg.replace('api-','').slice(0,200);
  else if(msg.includes('JSON')||msg.includes('parse'))text='⚠ A IA retornou resposta inválida. Tente novamente.';
  else text='⚠ '+msg.slice(0,250);

  // Always log to DOM if container provided, and also store as last error for persistent banner
  ST.lastError = {text, at: Date.now()};
  if(container&&container.appendChild){
    container.appendChild(errorBox(text));
  } else {
    alert(text);
  }
}
