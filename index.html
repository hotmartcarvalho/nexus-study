<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gralia · Plataforma de estudos com IA</title>
<style>
:root{
  /* ===== LIGHT theme (padrão) ===== */
  /* Base — cinzas frios neutros, branco puro pra cards (sensação "premium") */
  --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;--surface3:#e9ecef;
  --border:rgba(16,20,24,.08);--border2:rgba(16,20,24,.14);
  /* Text — hierarquia clara com contraste WCAG AA+ */
  --text:#111418;--text2:#525a62;--text3:#8a919a;
  /* Accent verde — tom mais moderno e saturado */
  --accent:#0E9F6E;--accent-light:#E6F7F0;--accent-mid:#16C088;--accent-text:#075A3E;
  /* Red — tom mais quente e acessível */
  --red:#E14A4A;--red-light:#FDECEC;--red-text:#8A1D1D;
  /* Amber — menos berrante */
  --amber:#C2810F;--amber-light:#FDF2D3;--amber-text:#6A4206;
  /* Purple — alinhado com identidade Gralia */
  --purple:#7c5cff;--purple-light:#EEEAFC;--purple-text:#3C2A9E;
  /* Blue — mais suave, puxando cyan */
  --blue:#1E6CB4;--blue-light:#E7F0FA;--blue-text:#0A3E77;
  /* Gralia brand colors — usar com moderação em superfícies de marca */
  --gralia-blue:#1a2a52;--gralia-purple:#7c5cff;--gralia-purple-soft:#9a7fff;
  --gralia-gradient:linear-gradient(135deg,#1a2a52 0%,#7c5cff 100%);
  /* Border radius */
  --r:10px;--rs:6px;
  /* Shadows — sutis pra dar profundidade */
  --shadow-sm:0 1px 2px rgba(16,20,24,.04);
  --shadow-md:0 4px 12px rgba(16,20,24,.06);
  --shadow-lg:0 8px 24px rgba(16,20,24,.08);
}
/* ===== DARK theme ===== */
:root[data-theme="dark"]{
  /* Base — cinzas neutros frios (inspiração GitHub/Linear dark) */
  --bg:#0e0f11;--surface:#17191c;--surface2:#1f2126;--surface3:#292c32;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  /* Text — off-white sem tom amarelado */
  --text:#e8eaed;--text2:#a0a7b0;--text3:#626770;
  /* Accent — verde mais suave que claro pra não cansar */
  --accent:#22B683;--accent-light:#0D2B1F;--accent-mid:#2FD199;--accent-text:#6FD4A8;
  /* Red — saturação reduzida */
  --red:#E86868;--red-light:#2A1515;--red-text:#F4A5A5;
  /* Amber */
  --amber:#E8A43C;--amber-light:#2A1E08;--amber-text:#F4C679;
  /* Purple — alinhado com identidade Gralia */
  --purple:#9a7fff;--purple-light:#1E1A3B;--purple-text:#C4AEFF;
  /* Blue */
  --blue:#4A92E0;--blue-light:#0D1F36;--blue-text:#8FB9EB;
  /* Gralia brand colors */
  --gralia-blue:#9aa7d8;--gralia-purple:#9a7fff;--gralia-purple-soft:#c4aeff;
  --gralia-gradient:linear-gradient(135deg,#3a4a82 0%,#9a7fff 100%);
  /* Shadows — mais opacas pra aparecer em fundo escuro */
  --shadow-sm:0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 12px rgba(0,0,0,.3);
  --shadow-lg:0 8px 24px rgba(0,0,0,.4);
}
/* Fallback: se por algum motivo data-theme não foi setado, herda os valores light do :root */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
button,textarea,input,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;transition:background .15s,border-color .15s,color .15s,opacity .15s}
a{color:var(--accent)}

.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0;gap:0}
.topbar-inner{max-width:740px;width:100%;margin:0 auto;padding:0 1.25rem;height:100%;display:flex;align-items:center;gap:1rem}
.brand{display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:700;letter-spacing:-.5px}
.brand-bird{height:40px;width:auto;display:block;flex-shrink:0;margin-right:-4px}
.brand-bird-dark{display:none}
:root[data-theme="dark"] .brand-bird-light{display:none}
:root[data-theme="dark"] .brand-bird-dark{display:block}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-.6px;background:linear-gradient(90deg,#1a2a52 0%,#1a2a52 55%,#7c5cff 80%,#9a7fff 100%);background-clip:text;-webkit-background-clip:text;color:transparent}
:root[data-theme="dark"] .brand-name{background:linear-gradient(90deg,#e6e9f5 0%,#e6e9f5 55%,#a98aff 80%,#c4aeff 100%);background-clip:text;-webkit-background-clip:text;color:transparent}
.mobile-nav-overlay{display:none}
.brand em{color:var(--accent);font-style:normal}

/* Tabs container */
.tabs{display:flex;gap:4px;flex:1;align-items:center;position:relative}

/* Aba simples + trigger de grupo */
.tab{padding:7px 12px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);border-radius:var(--rs);white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.on{background:var(--accent-light);color:var(--accent-text);font-weight:600}
.tab-icon{font-size:14px;line-height:1}
.tab-lbl{line-height:1}
.tab-caret{font-size:10px;opacity:.6;margin-left:2px;transition:transform .15s}
.tab-group.open .tab-caret{transform:rotate(180deg)}
.tab-group.open > .tab{background:var(--surface2);color:var(--text)}
.tab-group{position:relative}

/* Dropdown panel */
.tab-dd{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px;min-width:280px;box-shadow:var(--shadow-lg);display:none;z-index:250;animation:dd-in .18s ease}
.tab-group.open .tab-dd{display:block}
@keyframes dd-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.tab-dd-item{display:flex;align-items:flex-start;gap:10px;width:100%;padding:.625rem .75rem;background:transparent;border:none;border-radius:var(--rs);cursor:pointer;text-align:left;font-family:inherit;transition:background .12s;color:var(--text)}
.tab-dd-item:hover{background:var(--surface2)}
.tab-dd-item.on{background:var(--accent-light)}
.tab-dd-item.on .ddi-body b{color:var(--accent-text)}
.ddi-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.ddi-body{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.ddi-body b{font-size:13px;font-weight:600;line-height:1.25}
.ddi-body span{font-size:11.5px;color:var(--text3);line-height:1.4}

/* Mobile hamburger (hidden on desktop) */
.mobile-hamb{display:none;background:transparent;border:none;font-size:20px;width:34px;height:34px;align-items:center;justify-content:center;color:var(--text);cursor:pointer;padding:0;flex-shrink:0}

.countdown-pill{background:var(--red-light);color:var(--red-text);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
.theme-toggle-btn{background:transparent;border:1px solid var(--border);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;padding:0;flex-shrink:0;transition:all .15s}
.theme-toggle-btn:hover{background:var(--surface2);border-color:var(--border2);transform:rotate(-12deg)}

/* ===== Mobile responsive: slide-out menu ===== */
@media (max-width:820px){
  .topbar-inner{padding:0 .875rem;gap:.625rem}
  .mobile-hamb{display:inline-flex}
  .tabs{
    position:fixed;top:54px;left:0;right:0;bottom:0;
    background:var(--surface);
    flex-direction:column;
    align-items:stretch;
    padding:1rem .75rem;
    gap:4px;
    overflow-y:auto;
    transform:translateX(-100%);
    transition:transform .22s ease;
    z-index:300;
    border-right:1px solid var(--border);
  }
  body.mobile-nav-open .tabs{transform:translateX(0)}
  .mobile-nav-overlay{
    display:none;
    position:fixed;
    inset:54px 0 0 0;
    background:rgba(0,0,0,.4);
    z-index:280;
    animation:fade-in .18s ease;
  }
  body.mobile-nav-open .mobile-nav-overlay{display:block}
  @keyframes fade-in{from{opacity:0}to{opacity:1}}
  .tab{padding:10px 12px;font-size:14px;justify-content:flex-start;width:100%}
  .tab-caret{margin-left:auto}
  .tab-group{width:100%}
  .tab-dd{position:static;display:none;box-shadow:none;padding:4px 4px 4px 28px;min-width:0;border:none;background:transparent;margin-top:0}
  .tab-group.open .tab-dd{display:flex;flex-direction:column}
  .tab-dd-item{padding:.5rem .625rem}
  .ddi-body span{font-size:11px}
  /* Mobile: brand + hamb + theme/credits ficam na barra. Resto esconde */
  .countdown-pill{font-size:11px;padding:3px 8px}
  .sync-dot{display:none}
  .credits-chip{font-size:10.5px;padding:3px 7px}
}

/* Breadcrumb contextual — mostra trilha de navegação */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:10px 0 18px;font-size:12.5px;flex-wrap:wrap;animation:bc-in .25s ease}
@keyframes bc-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.bc-back{background:var(--accent-light);color:var(--accent-text);border:1px solid var(--accent);border-radius:999px;padding:5px 12px 5px 10px;font-family:inherit;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:all .15s}
.bc-back:hover{background:var(--accent);color:#fff;transform:translateX(-2px)}
.bc-back:hover .bc-arrow{transform:translateX(-2px)}
.bc-arrow{font-size:13px;line-height:1;transition:transform .15s}
.bc-lbl{line-height:1.3}
.bc-lbl b{font-weight:700}
.bc-here{display:inline-flex;align-items:center;gap:4px;color:var(--text3);font-size:11.5px;font-weight:500}
.bc-sep{opacity:.5}

/* Link-to-entity chips — shown when a record has related entities */
.entity-link{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:var(--purple-light);color:var(--purple-text);border:1px solid transparent;font-size:10.5px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.entity-link:hover{background:var(--purple);color:#fff;border-color:var(--purple);transform:translateY(-1px)}
.entity-link .el-icon{font-size:11px}

/* Route transition — fade suave no conteúdo da página ao trocar */
.route-fade{animation:route-in .28s ease}
@keyframes route-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Skeleton loaders — pro estado de carregamento */
.skel{background:var(--surface2);border-radius:var(--rs);position:relative;overflow:hidden}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0,rgba(255,255,255,.06) 50%,transparent 100%);animation:skel-shim 1.4s ease-in-out infinite}
:root[data-theme="dark"] .skel::after{background:linear-gradient(90deg,transparent 0,rgba(255,255,255,.035) 50%,transparent 100%)}
@keyframes skel-shim{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.skel-line{height:14px;margin-bottom:10px}
.skel-line.sm{height:11px;width:60%}
.skel-line.lg{height:22px;width:45%;margin-bottom:14px}
.skel-card{padding:1.125rem 1.25rem;border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;background:var(--surface)}

/* Micro-animações extras em clickables */
.btn:active:not(:disabled){transform:scale(.97)}
.entity-link:active{transform:scale(.95)}
.tab:active{transform:scale(.95)}
.sub-tab:active{transform:scale(.97)}

/* Highlighted card — shown after navigating to it from another place */
.card-highlighted,.history-card-highlighted{animation:highlight-pulse 2.5s ease-out 1;border-color:var(--accent) !important;box-shadow:0 0 0 2px var(--accent-light),0 4px 16px rgba(0,0,0,.06) !important}
@keyframes highlight-pulse{0%{box-shadow:0 0 0 8px var(--accent-light)}100%{box-shadow:0 0 0 2px var(--accent-light),0 4px 16px rgba(0,0,0,.06)}}

/* ===== TIMELINE V2 — Linha do tempo premium ===== */
.activity-card-v2{padding:1.25rem;margin-bottom:1.25rem;background:linear-gradient(180deg,var(--surface) 0%,var(--surface) 70%,var(--surface2) 200%);position:relative;overflow:hidden}
.activity-card-v2::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--purple) 50%,var(--blue) 100%);opacity:.7}

.activity-v2-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:1.25rem;padding-bottom:.875rem;border-bottom:1px solid var(--border)}
.activity-v2-title{margin:0 0 2px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text);letter-spacing:.01em}
.av2-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-light);animation:av2-dot-pulse 1.4s ease-out 3 forwards}
@keyframes av2-dot-pulse{0%{box-shadow:0 0 0 3px var(--accent-light);transform:scale(1)}40%{box-shadow:0 0 0 7px transparent;transform:scale(1.18)}100%{box-shadow:0 0 0 3px var(--accent-light);transform:scale(1)}}
.activity-v2-sub{margin:0;font-size:11.5px;color:var(--text3);font-weight:500}

.activity-v2-body{display:flex;flex-direction:column;gap:2px}

.av2-group-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:.75rem 0 .5rem;margin-top:.5rem}
.av2-group-lbl:first-child{margin-top:0;padding-top:0}

.av2-item{display:flex;gap:12px;padding:.75rem 0;position:relative;animation:av2-slide-in .35s cubic-bezier(.2,.8,.2,1) backwards;transition:all .18s ease}
@keyframes av2-slide-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

.av2-gutter{flex-shrink:0;width:32px;display:flex;flex-direction:column;align-items:center;position:relative}
/* Connector line entre items */
.av2-gutter::after{content:'';position:absolute;top:32px;bottom:-18px;left:50%;transform:translateX(-50%);width:2px;background:var(--border);z-index:0}
.av2-item:last-child .av2-gutter::after{display:none}

.av2-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--surface);border:2px solid var(--border);z-index:1;position:relative;transition:all .2s}
.av2-item.tone-err .av2-icon{background:var(--red-light);border-color:var(--red);color:var(--red-text)}
.av2-item.tone-ok .av2-icon{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.av2-item.tone-info .av2-icon{background:var(--blue-light);border-color:var(--blue);color:var(--blue-text)}
.av2-item.tone-purple .av2-icon{background:var(--purple-light);border-color:var(--purple);color:var(--purple-text)}

/* Filtros da timeline */
.av2-filters{display:flex;gap:4px;margin:0 0 1rem;flex-wrap:wrap;padding-bottom:.875rem;border-bottom:1px solid var(--border)}
.av2-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:transparent;border:1px solid transparent;border-radius:999px;font-size:11.5px;font-weight:600;color:var(--text2);font-family:inherit;cursor:pointer;transition:all .15s}
.av2-filter-pill:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.av2-filter-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 3px rgba(14,159,110,.2)}
.av2-filter-pill.active:hover{background:var(--accent-mid);color:#fff;border-color:var(--accent-mid)}

/* Empty state quando filtro não devolve nada */
.av2-empty{display:flex;align-items:center;gap:10px;padding:1.5rem 1rem;color:var(--text3);font-size:12.5px;justify-content:center;text-align:center}
.av2e-emoji{font-size:20px}

.av2-body{flex:1;min-width:0;padding-top:2px;padding-bottom:6px}
.av2-row1{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px}
.av2-title-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.av2-title{font-size:12.5px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.av2-disc{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;letter-spacing:.02em;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.av2-when{font-size:10.5px;font-weight:500;color:var(--text3);white-space:nowrap;flex-shrink:0}

.av2-subject{font-size:12.5px;color:var(--text2);font-weight:500;margin-bottom:4px;line-height:1.4}
.av2-detail{font-size:11.5px;color:var(--text3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;max-height:2.9em}

/* Hover: ícone dá feedback visual sem mexer layout dos demais */
.av2-clickable{cursor:pointer;border-radius:var(--rs);margin:0 -8px;padding-left:8px;padding-right:8px}
.av2-clickable:hover{background:var(--surface2)}
.av2-clickable:hover .av2-icon{transform:scale(1.1) rotate(-5deg)}

/* Chain — quando erro virou flashcard */
.av2-chain{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;background:var(--accent-light);border-radius:var(--rs);font-size:11px;color:var(--accent-text);width:fit-content;animation:av2-chain-in .4s ease .15s backwards}
@keyframes av2-chain-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.av2-chain-icon{font-size:13px;line-height:1;opacity:.7}
.av2-chain-text{font-weight:500}
.av2-chain-link{background:none;border:none;color:var(--accent-text);font-weight:700;cursor:pointer;padding:0;font-family:inherit;font-size:11px;text-decoration:underline;text-underline-offset:2px}
.av2-chain-link:hover{opacity:.75}

/* Empty state */
.activity-empty{text-align:center;padding:2.5rem 1.5rem;margin-bottom:1.25rem;background:linear-gradient(180deg,var(--surface) 0%,var(--accent-light) 100%);border:1px dashed var(--border2)}
.ae-emoji{font-size:42px;margin-bottom:.75rem;line-height:1;animation:ae-bob 3s ease-in-out infinite}
@keyframes ae-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.ae-title{margin:0 0 .5rem;font-size:15px;font-weight:700}
.ae-desc{margin:0 auto;font-size:12.5px;color:var(--text2);max-width:380px;line-height:1.55}

@media (max-width:500px){
  .activity-card-v2{padding:1rem}
  .av2-row1{flex-direction:column;align-items:flex-start;gap:2px}
  .av2-when{font-size:10px}
}

.page{max-width:740px;margin:0 auto;padding:1.75rem 1.25rem}

/* Map merged topic tag — aparece em tópicos deduplicados */
.map-merged-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;background:var(--purple-light);color:var(--purple-text);border:1px solid var(--purple);margin-left:6px;cursor:help;letter-spacing:.3px;line-height:1}
.map-merged-tag:hover{background:var(--purple);color:#fff}

/* Map topic order number — aparece quando modo "Ordem do material" */
.map-order-num{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;padding:0 6px;font-size:10.5px;font-weight:700;background:var(--accent-light);color:var(--accent-text);border:1px solid var(--accent);border-radius:6px;cursor:help;letter-spacing:.2px;line-height:1;flex-shrink:0}
.map-order-num.missing{background:var(--surface2);color:var(--text3);border-color:var(--border)}

/* Feedback modal */
.fb-cat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}

/* Banner de filtro ativo (ex: Histórico filtrado por tópico vindo do Mapa) */
.filter-active-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:.625rem .875rem;background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%);border:1px solid var(--accent);border-left:3px solid var(--accent);border-radius:var(--rs);margin-bottom:1rem;font-size:13px;color:var(--text);animation:route-in .3s ease}
.filter-active-banner b{color:var(--accent-text);font-weight:700}

/* Credits bar (não-admin) */
.usage-credits-bar{padding:.5rem .75rem;background:var(--surface2);border-radius:var(--rs);margin-top:6px}
.usage-credits-lbl{font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.usage-credits-lbl b{color:var(--accent-text);font-weight:700;font-size:13.5px}

/* Topic profile section in map */
.profile-section{background:linear-gradient(135deg,var(--purple-light) 0%,var(--surface) 100%);border-left:4px solid var(--purple) !important;padding:1rem 1.125rem !important;margin-top:.875rem;border-radius:var(--rs)}
.profile-section .section-label{margin-bottom:.625rem !important;font-weight:700;color:var(--purple-text)}
.profile-preview{font-size:13px;line-height:1.55;color:var(--text);padding:.625rem .875rem;background:var(--surface);border-radius:var(--rs);max-height:84px;overflow:hidden;position:relative;border:1px solid var(--border)}
.profile-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(to bottom,transparent,var(--surface))}
.profile-preview p{margin:0}
.profile-preview p + p{margin-top:.4rem}

/* Cost hint badge inside button */
.btn-cost-hint{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;margin-left:6px;background:rgba(255,255,255,.25);color:inherit;letter-spacing:.2px;opacity:.95}
.btn-cost-hint.premium{background:rgba(109,92,232,.4)}

/* Profile body — render do markdown completo */
.profile-body{max-height:60vh;overflow-y:auto;padding:0 .25rem;font-size:13.5px;line-height:1.65;color:var(--text)}
.profile-body h2{font-size:15px;color:var(--accent-text);margin:1.25rem 0 .5rem;padding-bottom:.25rem;border-bottom:2px solid var(--accent-light);font-weight:700}
.profile-body h2:first-child{margin-top:.25rem}
.profile-body p{margin:.5rem 0 .75rem}
.profile-body ul,.profile-body ol{margin:.25rem 0 .75rem;padding-left:1.4rem}
.profile-body li{margin-bottom:.35rem}
.profile-body b{color:var(--accent-text);font-weight:700}
.profile-body code{background:var(--surface2);padding:1px 6px;border-radius:3px;font-size:12px;color:var(--red-text)}

/* Markdown tables */
.md-table{width:100%;border-collapse:collapse;margin:.625rem 0 1rem;font-size:12.5px;background:var(--surface);border-radius:var(--rs);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.md-table th,.md-table td{padding:.55rem .75rem;text-align:left;border:1px solid var(--border);vertical-align:top}
.md-table th{background:var(--accent-light);color:var(--accent-text);font-weight:700;font-size:12px}
.md-table tr:nth-child(even) td{background:var(--surface2)}

/* Profile editor — Fase 2 */
.version-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:.625rem .875rem;background:linear-gradient(135deg,var(--amber-light) 0%,var(--surface) 100%);border:1px solid var(--amber);border-left:3px solid var(--amber);border-radius:var(--rs);margin-bottom:.875rem;font-size:12.5px;color:var(--amber-text);animation:route-in .3s ease}
.version-banner span{flex:1}
.edit-note,.improve-note{padding:.75rem .875rem;background:var(--surface2);border-radius:var(--rs);font-size:12.5px;line-height:1.55;color:var(--text2);margin-bottom:.875rem}
.improve-note .improve-cost{display:inline-block;font-size:11px;padding:2px 8px;background:var(--purple-light);color:var(--purple-text);border-radius:4px;margin-top:4px;font-weight:600}
.profile-edit-ta{width:100%;min-height:400px;font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:12.5px;line-height:1.6;padding:.875rem 1rem;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);resize:vertical}
.profile-edit-ta:focus{border-color:var(--accent);outline:none}
.suggest-chip{font-size:11px;padding:4px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.suggest-chip:hover{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent)}

/* Pomodoro flutuante — visível em todas as páginas durante sessão ativa */
.pomo-float{position:fixed;bottom:20px;left:20px;z-index:850;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.18);overflow:hidden;animation:pomo-float-in .25s ease;min-width:230px}
@keyframes pomo-float-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.pomo-float .pf-progress{height:3px;background:var(--surface2);position:relative;overflow:hidden}
.pomo-float .pf-progress-fill{height:100%;background:var(--accent);transition:width 1s linear,background-color .3s}
.pomo-float.sbreak .pf-progress-fill{background:var(--blue)}
.pomo-float.lbreak .pf-progress-fill{background:var(--purple)}
.pomo-float .pf-row{display:flex;align-items:center;gap:10px;padding:10px 12px}
.pomo-float .pf-emoji{font-size:20px;line-height:1;flex-shrink:0}
.pomo-float .pf-info{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.pomo-float .pf-time{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.5px;line-height:1}
.pomo-float .pf-phase{font-size:10.5px;color:var(--text3);font-weight:500;line-height:1.2;text-transform:uppercase;letter-spacing:.4px}
.pomo-float .pf-btn{background:transparent;border:none;width:28px;height:28px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit}
.pomo-float .pf-btn:hover{background:var(--surface2);color:var(--text)}
.pomo-float .pf-toggle{font-size:14px}
.pomo-float .pf-hide{font-size:18px;color:var(--text3)}
.pomo-float.paused{opacity:.85}
.pomo-float.paused::before{content:'PAUSADO';position:absolute;top:6px;right:8px;font-size:9px;font-weight:700;color:var(--amber-text);background:var(--amber-light);padding:1px 5px;border-radius:3px;letter-spacing:.6px}
@media (max-width:600px){
  .pomo-float{bottom:14px;left:14px;right:14px;min-width:0}
}
/* Modo foco esconde o widget também (zen total) */
html.focus-mode .pomo-float{display:none}

/* Map profile badge — 🧠 ao lado do nome do tópico */
.map-profile-tag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:20px;font-size:13px;background:var(--purple-light);border:1px solid var(--purple);border-radius:5px;margin-left:6px;cursor:pointer;line-height:1;padding:0;transition:transform .15s}
.map-profile-tag:hover{transform:scale(1.15);background:var(--purple);color:#fff}

/* Compare modal — lado a lado */
.revgen-compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:.75rem}
.revgen-compare-col{display:flex;flex-direction:column;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem}
.revgen-compare-col.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-light)}
.revgen-compare-body{flex:1;max-height:480px;overflow-y:auto;padding:.5rem;background:var(--surface);border-radius:var(--rs);font-size:12.5px;line-height:1.55}
.revgen-compare-body h2{font-size:13.5px;color:var(--accent);margin:.875rem 0 .375rem;padding-bottom:.25rem;border-bottom:1px solid var(--accent-light)}
.revgen-compare-body h2:first-child{margin-top:0}
.revgen-compare-body h3{font-size:12.5px;margin:.625rem 0 .25rem}
.revgen-compare-body p{margin:.25rem 0 .375rem}
.revgen-compare-body ul,.revgen-compare-body ol{margin:.125rem 0 .375rem;padding-left:1.125rem}
.revgen-compare-body li{margin-bottom:.2rem;font-size:12px}
.revgen-compare-body b{color:var(--accent-text);font-weight:700}
.rcc-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:999px;margin-bottom:.5rem;width:fit-content;background:var(--surface);border:1px solid var(--border)}
.rcc-tag.premium{background:var(--purple-light);color:var(--purple-text);border-color:var(--purple)}
.rcc-tag.econ{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent)}
.rcc-tag .rmt-icon{font-size:12px}
@media (max-width:760px){
  .revgen-compare-grid{grid-template-columns:1fr}
}

/* Tag indicador de modelo no resultado do revgen */
.revgen-model-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:4px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);margin-bottom:.75rem;color:var(--text2);font-weight:500;width:fit-content}
.revgen-model-tag.premium{background:var(--purple-light);color:var(--purple-text);border-color:var(--purple)}
.revgen-model-tag.econ{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent)}
.revgen-model-tag b{font-weight:700}
.revgen-model-tag .rmt-icon{font-size:13px}

/* Dashboard greeting — saudação personalizada */
.dash-greeting{margin-bottom:1.25rem;animation:route-in .35s ease}
.dash-greeting .dg-time{font-size:22px;font-weight:400;color:var(--text2);letter-spacing:-.5px}
.dash-greeting b{font-size:24px;font-weight:700;letter-spacing:-.5px;background:var(--gralia-gradient);background-clip:text;-webkit-background-clip:text;color:transparent}
.dash-greeting .dg-prompt{font-size:13px;color:var(--text3);font-weight:400;margin-left:6px}
.dash-greeting .dg-link{color:var(--accent);text-decoration:underline;font-weight:600}
.dash-greeting-sub{margin-top:6px;font-size:12.5px;color:var(--text2);line-height:1.5}
.dash-greeting-sub b{font-size:12.5px;color:var(--text);font-weight:600}

/* Batch flashcard card no resultado do simulado */
.sim-batch-card{display:flex;align-items:center;gap:14px;padding:1rem 1.125rem;background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%);border:1px solid var(--accent);border-left:4px solid var(--accent);border-radius:var(--r);margin-bottom:1rem;animation:route-in .3s ease}

/* Revision generator (revgen) */
.revgen-mode-row,.revgen-scope-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
@media (max-width:560px){.revgen-mode-row,.revgen-scope-row{grid-template-columns:1fr}}
.revgen-mode-btn,.revgen-scope-btn{display:flex;align-items:flex-start;gap:10px;padding:.875rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.revgen-mode-btn:hover,.revgen-scope-btn:hover{border-color:var(--border2);background:var(--surface2)}
.revgen-mode-btn.active,.revgen-scope-btn.active{background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%);border-color:var(--accent);box-shadow:0 1px 4px rgba(14,159,110,.12)}
.rgm-icon,.rgs-icon{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px}
.rgm-body,.rgs-body{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.rgm-body b,.rgs-body b{font-size:13px;color:var(--text);line-height:1.2}
.rgm-body span,.rgs-body span{font-size:11.5px;color:var(--text3);line-height:1.4}
.revgen-mode-btn.active b,.revgen-scope-btn.active b{color:var(--accent-text)}
.revgen-preview{margin:0 0 1rem;padding:.625rem .875rem;background:var(--surface2);border-radius:var(--rs);font-size:12px;color:var(--text2);text-align:center}
.revgen-output{background:var(--surface2);border-radius:var(--rs);padding:1.25rem 1.375rem;max-height:520px;overflow-y:auto;font-size:13.5px;line-height:1.7}
.revgen-output h2{color:var(--accent);font-size:17px;margin:1.5rem 0 .5rem;padding-bottom:.375rem;border-bottom:2px solid var(--accent-light)}
.revgen-output h2:first-child{margin-top:0}
.revgen-output h3{font-size:14.5px;margin:1rem 0 .375rem}
.revgen-output h4{font-size:13px;color:var(--text2);margin:.75rem 0 .3rem}
.revgen-output ul{margin:.25rem 0 .625rem;padding-left:1.25rem}
.revgen-output li{margin-bottom:.25rem}
.revgen-output p{margin:.5rem 0 .625rem}
.revgen-output b{color:var(--accent-text)}
.revgen-output code{background:var(--surface);padding:1px 5px;border-radius:3px;font-size:12.5px;color:var(--red-text)}

/* Review hub — novo card do gerador */
.rev-hub-gen{border-color:var(--purple);background:linear-gradient(135deg,var(--purple-light) 0%,var(--surface) 60%)}
.rev-hub-gen:hover{border-color:var(--purple);box-shadow:0 4px 12px rgba(109,92,232,.15)}.fb-cat-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:.625rem .5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;transition:all .15s}
.fb-cat-btn:hover{background:var(--surface2);border-color:var(--border2)}
.fb-cat-btn.active{background:var(--accent-light);border-color:var(--accent);box-shadow:0 1px 3px rgba(14,159,110,.15)}
.fbc-icon{font-size:18px;line-height:1}
.fbc-lbl{font-size:11px;font-weight:600;color:var(--text)}
.fb-cat-btn.active .fbc-lbl{color:var(--accent-text)}
@keyframes pop{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
@media (max-width:440px){
  .fb-cat-row{grid-template-columns:repeat(2,1fr)}
}

/* Model picker — versão enriquecida com tier visual */
.model-picker-row{margin-bottom:.75rem}
.mp-lbl{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px}
.mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mp-option{display:flex;align-items:flex-start;gap:10px;padding:.625rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.mp-option:hover{border-color:var(--border2);background:var(--surface2)}
.mp-option.on{border-color:var(--accent);background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%);box-shadow:0 1px 4px rgba(14,159,110,.1)}
.mp-option.tier-premium.on{border-color:var(--purple);background:linear-gradient(135deg,var(--purple-light) 0%,var(--surface) 100%);box-shadow:0 1px 4px rgba(109,92,232,.12)}
.mp-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.mp-body{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.mp-name{font-size:12.5px;font-weight:700;color:var(--text);line-height:1.2}
.mp-option.on .mp-name{color:var(--accent-text)}
.mp-option.tier-premium.on .mp-name{color:var(--purple-text)}
.mp-desc{font-size:11px;color:var(--text3);line-height:1.35}
@media (max-width:500px){
  .mp-grid{grid-template-columns:1fr}
}
.map-scope-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.mst-btn{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:.875rem 1.125rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;position:relative;overflow:hidden}
.mst-btn:hover{border-color:var(--border2);background:var(--surface2)}
.mst-btn.active{background:linear-gradient(135deg,var(--accent-light) 0%,var(--surface) 100%);border-color:var(--accent);box-shadow:0 2px 8px rgba(14,159,110,.12)}
.mst-btn.active::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.mst-icon{font-size:18px;line-height:1}
.mst-lbl{font-size:13px;font-weight:700;color:var(--text)}
.mst-btn.active .mst-lbl{color:var(--accent-text)}
.mst-desc{font-size:11px;color:var(--text3);line-height:1.3}
@media (max-width:500px){
  .map-scope-toggle{grid-template-columns:1fr}
}

/* No-source marker in Tudo mode */
.map-nosource-tag{display:inline-flex;align-items:center;font-size:10px;padding:1px 5px;border-radius:4px;background:var(--amber-light);color:var(--amber-text);border:1px solid var(--amber);margin-left:6px;cursor:help;line-height:1}

/* Source metadata tags */
.src-meta-tag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:999px;background:var(--surface2);color:var(--text2);white-space:nowrap}

/* Source filters row */
.src-filters{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;padding:.5rem .625rem;background:var(--surface2);border-radius:var(--rs);align-items:center}

/* Source excerpt preview — quando usuário chega do Mapa via "Ver na fonte" */
.src-excerpt{margin-top:.75rem;padding:.75rem .875rem;background:linear-gradient(180deg, var(--accent-light) 0%, var(--surface2) 100%);border:1px solid var(--accent);border-left:4px solid var(--accent);border-radius:var(--rs);animation:excerpt-in .4s ease}
@keyframes excerpt-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.src-excerpt-lbl{display:block;font-size:11px;font-weight:700;color:var(--accent-text);margin-bottom:.375rem;letter-spacing:.2px}
.src-excerpt-text{font-size:12.5px;line-height:1.55;color:var(--text);font-family:Georgia,'Times New Roman',serif;font-style:italic}
.src-excerpt-text mark{background:var(--amber-light);color:var(--amber-text);padding:1px 4px;border-radius:3px;font-weight:700;font-style:normal}

/* Theoretical flow — linha tracejada conectando tópicos na ordem */
.map-topics.theoretical-flow{position:relative}
.map-topics.theoretical-flow::before{
  content:'';
  position:absolute;
  top:22px;
  bottom:22px;
  left:16px;
  width:2px;
  background-image:linear-gradient(to bottom, var(--accent) 50%, transparent 50%);
  background-size:2px 8px;
  background-repeat:repeat-y;
  opacity:.4;
  z-index:0;
  animation:flow-in .5s ease;
}
@keyframes flow-in{from{opacity:0;transform:scaleY(0);transform-origin:top}to{opacity:.4;transform:scaleY(1)}}
.map-topics.theoretical-flow .map-topic{position:relative;z-index:1}
.map-topics.theoretical-flow .map-topic-dot{box-shadow:0 0 0 3px var(--surface)}

/* ===== SORT CONTROL — Toolbar de classificação ===== */
.sort-control{display:flex;align-items:center;gap:12px;padding:.625rem .875rem;background:linear-gradient(180deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;flex-wrap:wrap;animation:route-in .3s ease}
.sort-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);flex-shrink:0}
.sort-icon-main{font-size:14px;color:var(--accent);font-weight:900}
.sort-pills{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.sort-pill{background:transparent;border:1px solid transparent;color:var(--text2);font-family:inherit;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.sort-pill:hover{background:var(--surface);color:var(--text);border-color:var(--border2)}
.sort-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 4px rgba(14,159,110,.25)}
.sort-pill.active:hover{background:var(--accent-mid);color:#fff;border-color:var(--accent-mid)}
.sort-pill .sp-icon{font-size:12px;line-height:1}
.sort-pill .sp-lbl{line-height:1}
@media (max-width:500px){
  .sort-control{padding:.5rem .625rem;gap:8px}
  .sort-label .sp-lbl,.sort-label span:not(.sort-icon-main){display:none}
}
h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin-bottom:4px}
h3{font-size:15px;font-weight:600}

.setup-wrap{max-width:520px;margin:3rem auto;padding:0 1.25rem}
.setup-logo{font-size:36px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px}
.setup-logo em{color:var(--accent);font-style:normal}
.setup-eyebrow{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:1.75rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem}
.card+.card{margin-top:.75rem}
.card-pad{padding:1.1rem 1.25rem}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;font-size:13.5px;font-weight:500;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--text)}
.btn:hover:not(:disabled){background:var(--surface2)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover:not(:disabled){opacity:.9;background:var(--accent)}
.btn-lg{padding:12px 22px;font-size:14.5px;border-radius:var(--r)}
/* Botão grande primário ganha gradient brand pra hierarquia visual */
.btn-p.btn-lg{background:var(--gralia-gradient);border-color:transparent;box-shadow:0 2px 8px rgba(124,92,255,.25)}
.btn-p.btn-lg:hover:not(:disabled){opacity:1;background:var(--gralia-gradient);transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,92,255,.35)}
.btn-danger{color:var(--red-text);border-color:var(--red-light)}
.btn-danger:hover:not(:disabled){background:var(--red-light)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ans{flex:1;padding:13px;font-size:15px;font-weight:500;border-radius:var(--r)}
.btn-c:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.btn-e:hover:not(:disabled){background:var(--red-light);border-color:var(--red);color:var(--red-text)}

input[type=text],input[type=password],input[type=number],input[type=date],input[type=email],input[type=url],textarea,select{
  width:100%;padding:10px 12px;font-size:14px;line-height:1.55;
  border:1px solid var(--border2);border-radius:var(--rs);
  background:var(--surface);color:var(--text);outline:none;
  font-family:inherit
}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}
:root[data-theme="dark"] input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.65}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}

.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}

.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;text-align:center}
.scard-v{font-size:22px;font-weight:700;line-height:1.1}
.scard-l{font-size:11.5px;color:var(--text2);margin-top:3px}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.b-ok{background:var(--accent-light);color:var(--accent-text)}
.b-err{background:var(--red-light);color:var(--red-text)}
.b-warn{background:var(--amber-light);color:var(--amber-text)}
.b-info{background:var(--blue-light);color:var(--blue-text)}

.topic-tag{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);display:inline-block;margin-bottom:.875rem}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent-mid);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.flex{display:flex;gap:10px;align-items:center}
.flex-col{display:flex;flex-direction:column;gap:10px}
.mt{margin-top:.875rem}.mt-lg{margin-top:1.5rem}
.mb{margin-bottom:.875rem}.mb-lg{margin-bottom:1.5rem}
.txt{font-size:14px;line-height:1.75}
.txt2{font-size:13px;color:var(--text2);line-height:1.65}
.txt3{font-size:12px;color:var(--text3)}
.hint{font-size:12px;color:var(--text3);line-height:1.6;margin-top:6px}

.section-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:.7rem}

.countdown{background:linear-gradient(135deg,var(--accent) 0%,#0a5141 100%);color:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem;margin-bottom:1.25rem}
.countdown-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px}
.countdown-body{flex:1}
.countdown-lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.85;margin-bottom:2px}
.countdown-sub{font-size:13.5px;opacity:.95;margin-top:3px}

.dna-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.dna-lbl{font-size:12px;color:var(--text2);min-width:190px;text-align:right;flex-shrink:0}
.dna-track{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.dna-fill{height:100%;border-radius:4px;transition:width .5s ease}
.dna-num{font-size:12px;color:var(--text3);min-width:20px}

.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem;cursor:pointer;text-align:left;transition:all .15s;position:relative}
.mcard:hover{border-color:var(--accent);background:var(--accent-light)}
.mcard:hover .mcard-title{color:var(--accent-text)}
.mcard-icon{font-size:22px;margin-bottom:7px;display:block}
.mcard-title{font-size:13.5px;font-weight:600;margin-bottom:3px}
.mcard-desc{font-size:12px;color:var(--text2);line-height:1.5}
.mcard-tag{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:999px;text-transform:uppercase}

.conf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.conf-btn{padding:11px 6px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);text-align:center;font-size:12.5px;font-weight:500;color:var(--text)}
.conf-btn:hover{border-color:var(--border2);background:var(--surface2)}
.conf-btn.sel-c{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.conf-btn.sel-t{border-color:var(--amber);background:var(--amber-light);color:var(--amber-text)}
.conf-btn.sel-g{border-color:var(--red);background:var(--red-light);color:var(--red-text)}
.conf-icon{font-size:18px;display:block;margin-bottom:4px}

.fb-card{margin-top:.875rem;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);padding:1.25rem 1.5rem}
.fb-card.ok{border-color:var(--accent)}
.fb-card.err{border-color:var(--red)}
.meta-box{background:var(--surface2);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--text2);display:flex;flex-direction:column;gap:5px;margin-bottom:.875rem}
.meta-box strong{color:var(--text);font-weight:600}
.warn-box{background:var(--red-light);border:1px solid rgba(217,75,74,.2);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--red-text);margin-bottom:.875rem;line-height:1.6}
.warn-box b{font-weight:700}

.srs-flip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem 1.5rem;min-height:160px;display:flex;flex-direction:column;justify-content:center;margin-bottom:1rem}
.srs-front,.srs-back{font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.srs-front{font-weight:500}
.srs-divider{border-top:1px dashed var(--border2);margin:1rem 0}
.srs-rating{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rating-btn{padding:10px 6px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);text-align:center;font-size:12px;font-weight:500}
.rating-btn:hover{background:var(--surface2)}
.rating-btn b{display:block;font-size:14px;margin-bottom:2px}
.rating-hint{font-size:10.5px;color:var(--text3);margin-top:2px}

.pomo-main{text-align:center;padding:2rem 1rem}
.pomo-phase{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:.75rem}
.pomo-phase.focus{color:var(--accent)}
.pomo-phase.sbreak{color:var(--blue)}
.pomo-phase.lbreak{color:var(--purple)}
.pomo-time{font-size:84px;font-weight:800;letter-spacing:-4px;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:1rem;color:var(--text)}
.pomo-cycles{display:flex;justify-content:center;gap:8px;margin:1rem 0}
.cycle-dot{width:10px;height:10px;border-radius:50%;background:var(--surface3);border:1px solid var(--border)}
.cycle-dot.done{background:var(--accent);border-color:var(--accent)}
.pomo-controls{display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}

.src-list{display:flex;flex-direction:column;gap:8px}
.src-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.125rem;display:flex;align-items:flex-start;gap:14px}
.src-icon{width:36px;height:36px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:2px}
.src-info{flex:1;min-width:0}
.src-name{font-size:14px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-meta{font-size:11.5px;color:var(--text3);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.src-meta > span:first-child{margin-right:2px}
.src-del{background:transparent;border:none;padding:6px;border-radius:var(--rs);color:var(--text3);font-size:16px}
.src-del:hover{background:var(--red-light);color:var(--red-text)}

/* Date picker (input type="month") padronizado */
input[type="month"]{
  font-family:inherit;
  font-size:13.5px;
  padding:.5rem .75rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rs);
  color:var(--text);
  width:100%;
  max-width:240px;
  cursor:pointer;
  transition:border-color .15s;
}
input[type="month"]:focus{border-color:var(--accent);outline:none}
input[type="month"]::-webkit-calendar-picker-indicator{
  opacity:.65;
  cursor:pointer;
  filter:invert(0.35);
}
:root[data-theme="dark"] input[type="month"]::-webkit-calendar-picker-indicator{filter:invert(0.85)}

.loading-row{display:flex;align-items:center;gap:10px;padding:.875rem 0;color:var(--text2);font-size:14px}
.pbar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:1.25rem}
.pbar{height:100%;border-radius:2px;transition:width .4s ease}

.drill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;cursor:pointer;position:relative;text-align:left}
.drill-card:hover{border-color:var(--border2);background:var(--surface2)}
.err-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700}
.drill-count{font-size:12px;color:var(--text2);margin-top:4px}

.alert{padding:11px 14px;border-radius:var(--rs);font-size:13px;line-height:1.6;margin-bottom:1rem;border:1px solid}
.alert-err{background:var(--red-light);color:var(--red-text);border-color:rgba(217,75,74,.25)}
.alert-warn{background:var(--amber-light);color:var(--amber-text);border-color:rgba(176,115,22,.25)}
.alert-info{background:var(--blue-light);color:var(--blue-text);border-color:rgba(24,95,165,.25)}
.alert a{color:inherit;text-decoration:underline}

.concept-box{background:var(--surface2);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem}
.stars{font-size:17px;letter-spacing:1px}

.back-btn{background:transparent;border:none;color:var(--text2);font-size:13px;padding:4px 0;margin-bottom:1rem;display:inline-flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--text)}

.sub-tabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:8px;flex-wrap:wrap}
.sub-tab{padding:5px 12px;font-size:12.5px;font-weight:500;border:none;background:transparent;color:var(--text2);border-radius:var(--rs)}
.sub-tab:hover{color:var(--text)}
.sub-tab.on{background:var(--surface2);color:var(--text)}

/* Discipline chips + filters */
.disc-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;margin-right:4px}
.disc-dot{width:7px;height:7px;border-radius:50%}
.disc-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.disc-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.disc-chip.on{border-color:transparent;color:var(--text)}
.disc-chip:hover{border-color:var(--border2)}
.disc-chip .dot{width:8px;height:8px;border-radius:50%}
.disc-chip .count{font-size:11px;color:var(--text3);margin-left:2px}
.disc-edit{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;display:flex;align-items:center;gap:10px;margin-bottom:6px}

/* Icon button */
.icon-btn{background:transparent;border:none;padding:6px;border-radius:var(--rs);color:var(--text3);font-size:14px;cursor:pointer}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.del:hover{background:var(--red-light);color:var(--red-text)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fd .15s ease}
.modal{background:var(--surface);border-radius:var(--r);max-width:560px;width:auto;min-width:280px;max-height:90vh;overflow-y:auto;padding:1.25rem 1.25rem}
.modal > *:first-child{margin-top:0}
.modal > *:last-child{margin-bottom:0}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-close{background:transparent;border:none;font-size:22px;color:var(--text2);cursor:pointer;line-height:1}

/* Card type selector */
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:.875rem}
.type-btn{padding:8px 4px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface);text-align:center;font-size:11px;font-weight:500;cursor:pointer}
.type-btn:hover{background:var(--surface2)}
.type-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.type-btn .emoji{font-size:18px;display:block;margin-bottom:3px}

/* Flashcard list item */
.flash-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;position:relative;margin-bottom:6px}
.flash-front{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.5;padding-right:32px;white-space:pre-wrap;word-break:break-word}
.flash-back{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.flash-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.flash-actions{position:absolute;top:8px;right:8px;display:flex;gap:2px}

@media(max-width:620px){.type-grid{grid-template-columns:repeat(3,1fr)}}

/* Review entry point on dashboard */
/* Feedback top row — badge + quality seal inline */
.fb-top-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* Quality seal — discreet badge explaining the review system */
.quality-seal{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:11px;background:var(--surface2);color:var(--text3);font-size:10.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-left:auto;font-family:inherit;line-height:1.3}
.quality-seal .qs-icon{color:var(--accent);font-weight:700;font-size:11px}
.quality-seal:hover{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent);transform:translateY(-1px)}
/* First-time variant — subtle pulse to draw attention once */
.quality-seal.first-time{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent);animation:seal-pulse 2s ease-out 1}
@keyframes seal-pulse{0%{box-shadow:0 0 0 0 var(--accent)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* ====== IMPORTAR QUESTÕES — howto + PDF upload ====== */
.import-howto{background:var(--blue-light);border:1px solid var(--blue);border-radius:var(--rs);overflow:hidden;margin-bottom:1rem}
.import-howto-head{width:100%;display:flex;justify-content:space-between;align-items:center;padding:.625rem .875rem;background:transparent;border:none;cursor:pointer;font-family:inherit;color:var(--blue-text);font-weight:600;font-size:12.5px;text-align:left}
.import-howto-head:hover{background:rgba(0,0,0,.04)}
.howto-caret{font-size:10px;opacity:.7}
.import-howto-body{padding:.25rem 1rem 1rem;font-size:12.5px;line-height:1.6;color:var(--text)}
.import-howto-body p{margin:.5rem 0}
.import-howto-body ol{margin:.5rem 0 .5rem 1.25rem;padding:0}
.import-howto-body ol > li{margin:4px 0}
.import-howto-body ul{margin:4px 0 4px 1.25rem;padding:0}
.import-howto-body ul li{margin:2px 0;font-size:12px}
.import-howto-body .muted{color:var(--text3);font-size:11.5px;margin-top:.75rem}

.pdf-import-area{background:var(--surface2);border-radius:var(--rs);padding:1rem;margin-bottom:.5rem}
.pdf-upload-btn{display:flex;align-items:center;gap:12px;padding:.875rem 1rem;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--rs);cursor:pointer;width:100%;transition:all .15s}
.pdf-upload-btn:hover{background:var(--accent-light);border-color:var(--accent);border-style:solid}

/* ====== PAINEL refinado (novo) ====== */
/* Hero — countdown + today stats */
.dash-hero{display:flex;gap:12px;margin-bottom:1rem;align-items:stretch;flex-wrap:wrap}
.dash-hero-left{flex:1;min-width:200px;background:var(--gralia-gradient);color:#fff;border-radius:var(--r);padding:1.125rem 1.25rem;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(124,92,255,.18)}
.dash-hero-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px}
.dhl-main{font-size:11px;font-weight:700;letter-spacing:1px;opacity:.92}
.dhl-sub{font-size:12.5px;opacity:.85;margin-top:3px}
.dash-hero-right{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch}
.dash-hero-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.625rem .875rem;min-width:95px;display:flex;flex-direction:column;justify-content:center}
.dhs-val{font-size:16px;font-weight:700;color:var(--text);line-height:1}
.dhs-lbl{font-size:10.5px;color:var(--text3);margin-top:3px}
@media(max-width:540px){
  .dash-hero{flex-direction:column}
  .dash-hero-right{width:100%;justify-content:space-between}
  .dash-hero-stat{flex:1;min-width:0;text-align:center;align-items:center}
}

/* Next action — single clear recommendation */
.next-action{background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.next-action-body{flex:1;min-width:240px;display:flex;align-items:center;gap:10px}
.next-action-emoji{font-size:22px;flex-shrink:0}
.next-action-texts{min-width:0}
.next-action-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:2px}
.next-action-desc{font-size:12px;color:var(--text2);line-height:1.5}
.next-action .btn{flex-shrink:0}

/* Compact summary grid */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:540px){.summary-grid{grid-template-columns:repeat(2,1fr)}}

/* Quick access row — slim buttons */
.quick-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:640px){.quick-row{grid-template-columns:repeat(2,1fr)}}
.quick-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:.75rem .5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;min-height:62px}
.quick-card:hover{background:var(--accent-light);border-color:var(--accent);transform:translateY(-1px)}
.qc-icon{font-size:18px}
.qc-title{font-size:12.5px;font-weight:500;line-height:1.2;text-align:center}

/* ====== USO DA API (card + detalhes) ====== */
.usage-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue-text,#185FA5);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:1.25rem;transition:border-color .2s}
.usage-card.warn{border-left-color:var(--amber)}
.usage-card.over{border-left-color:var(--red)}
.usage-card-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.usage-card-compact{flex:1;font-size:12px;color:var(--text2);min-width:200px}
.usage-card-compact b{color:var(--text);font-weight:600}
.usage-card-toggle{background:transparent;border:none;color:var(--text3);font-size:11px;padding:4px 8px;cursor:pointer;border-radius:var(--rs)}
.usage-card-toggle:hover{background:var(--surface2);color:var(--text)}

.usage-budget-bar-wrap{margin-top:.625rem}
.usage-budget-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.usage-budget-fill{height:100%;background:var(--accent);transition:width .4s}
.usage-budget-fill.warn{background:var(--amber)}
.usage-budget-fill.over{background:var(--red)}
.usage-budget-lbl{display:block;font-size:11px;color:var(--text3);margin-top:4px}
.usage-budget-lbl b{color:var(--text2);font-weight:600}

.usage-card-detail{margin-top:.875rem;padding-top:.75rem;border-top:1px dashed var(--border)}
.usage-card-sublbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-bottom:6px;margin-top:.75rem}
.usage-card-sublbl:first-child{margin-top:0}

.usage-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
@media(max-width:540px){.usage-mini-grid{grid-template-columns:repeat(2,1fr)}}
.usage-mini-cell{background:var(--surface2);border-radius:var(--rs);padding:.5rem;display:flex;flex-direction:column;gap:2px;text-align:center}
.mi-icon{font-size:16px}
.mi-label{font-size:10.5px;color:var(--text3);line-height:1.3}
.mi-cost{font-size:12px;font-weight:600;color:var(--text)}
.mi-cost.big{font-size:15px}
.mi-count{font-size:10px;color:var(--text3)}

/* Full usage view */
.usage-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.5rem}
@media(max-width:540px){.usage-stats-grid{grid-template-columns:1fr 1fr}}
.usage-stat{background:var(--surface2);border-radius:var(--rs);padding:.625rem;text-align:center}
.usage-stat .v{font-size:16px;font-weight:700;color:var(--text)}
.usage-stat .l{font-size:10.5px;color:var(--text3);margin-top:2px}

.usage-brk{display:flex;flex-direction:column;gap:4px}
.usage-brk-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:var(--rs);font-size:12.5px}
.usage-brk-left{display:flex;align-items:center;gap:8px}
.k-icon{font-size:14px}
.k-label{color:var(--text);font-weight:500}
.k-count{color:var(--text3);font-size:11px}
.usage-brk-cost{color:var(--text2);font-weight:600;font-size:12.5px}

.usage-proj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:.5rem}
@media(max-width:720px){.usage-proj-grid{grid-template-columns:repeat(2,1fr)}}
.usage-proj-cell{background:var(--surface2);border-radius:var(--rs);padding:.75rem;display:flex;flex-direction:column;gap:3px;text-align:center;align-items:center}
.usage-proj-cell.dim{opacity:.55}
.p-icon{font-size:18px}
.p-label{font-size:11px;color:var(--text2);line-height:1.3}
.p-cost{font-size:12.5px;font-weight:600;color:var(--text);margin-top:2px}
.p-cost.big{font-size:18px;font-weight:700}
.p-cost .brl{font-size:10.5px;color:var(--text3);font-weight:400}
.p-hint{font-size:10px;color:var(--text3);margin-top:2px}

/* ====== FONTES — importação inteligente ====== */
.smart-import-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.25rem}
@media(max-width:540px){.smart-import-row{grid-template-columns:1fr}}
.smart-import-btn{display:flex;align-items:center;gap:10px;padding:.75rem;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;color:inherit;position:relative;min-height:58px}
.smart-import-btn:not(.disabled):hover{background:var(--accent-light);border-color:var(--accent)}
.smart-import-btn.disabled{opacity:.5;cursor:not-allowed}
.smart-import-btn.loading{opacity:.6;cursor:wait}
.sib-icon{font-size:22px;flex-shrink:0}
.sib-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.sib-body b{font-size:13px;color:var(--text);font-weight:600}
.sib-body span{font-size:11px;color:var(--text3);line-height:1.4}

.quick-actions-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:540px){.quick-actions-grid{grid-template-columns:1fr}}
.quick-action{display:flex;align-items:center;gap:10px;padding:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;color:inherit}
.quick-action:hover{background:var(--accent-light);border-color:var(--accent);transform:translateY(-1px)}
.qa-icon{font-size:22px;flex-shrink:0}
.qa-body{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.qa-body b{font-size:13px;color:var(--text);font-weight:600}
.qa-body span{font-size:11px;color:var(--text3);line-height:1.4}

/* ====== MAPA DA MATÉRIA ====== */
.map-filters{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.875rem;padding:.75rem;background:var(--surface2);border-radius:var(--rs)}
.map-legend{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);margin-bottom:1rem;padding:.5rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);flex-wrap:wrap;line-height:1.6}
.map-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.map-legend .dot.high,.map-topic-dot.high{background:var(--accent-mid)}
.map-legend .dot.med,.map-topic-dot.med{background:var(--amber)}
.map-legend .dot.low,.map-topic-dot.low{background:var(--red)}
.map-legend .dot.none,.map-topic-dot.none{background:var(--text3);opacity:.5}
.map-tree{display:flex;flex-direction:column;gap:8px}
.map-disc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.map-disc-head{width:100%;background:transparent;border:none;padding:.75rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;font-family:inherit;color:inherit}
.map-disc-head:hover{background:var(--surface2)}
.map-caret{color:var(--text3);font-size:10px;width:12px;flex-shrink:0}
.map-disc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-disc-name{flex:1;font-weight:600;font-size:14px;color:var(--text)}
.map-disc-stats{color:var(--text3);font-size:11.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.map-mast-pill{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.map-mast-pill.high{background:var(--accent-light);color:var(--accent-text)}
.map-mast-pill.med{background:var(--amber-light);color:var(--amber-text)}
.map-mast-pill.low{background:var(--red-light);color:var(--red-text)}
.map-mast-pill.none{background:var(--surface2);color:var(--text3)}
.map-mast-pill.big{font-size:12px;padding:4px 10px}
.map-topics{display:flex;flex-direction:column;border-top:1px solid var(--border)}
.map-topic{width:100%;background:transparent;border:none;padding:.625rem .875rem .625rem 2.25rem;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;font-family:inherit;color:inherit;border-bottom:1px solid var(--border);transition:background .12s}
.map-topic:last-child{border-bottom:none}
.map-topic:hover{background:var(--surface2)}
.map-topic.selected{background:var(--accent-light);border-left:3px solid var(--accent);padding-left:calc(2.25rem - 3px)}
.map-topic-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.map-topic-name{font-size:13.5px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-topic-stats{font-size:11px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-shrink:0}
.map-topic-stats .err{color:var(--red-text)}
.map-topic-stats .crd{color:var(--purple-text)}
.map-topic-stats .qs{color:var(--blue-text)}
.map-topic-stats .mast.high{color:var(--accent-text)}
.map-topic-stats .mast.med{color:var(--amber-text)}
.map-topic-stats .mast.low{color:var(--red-text)}
.map-topic-detail{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--r);padding:1.125rem;margin-bottom:1.25rem}
.map-detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:.75rem}
.map-detail-stats{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:.75rem;border-bottom:1px dashed var(--border);margin-bottom:.875rem}
.map-stat-chip{font-size:11.5px;color:var(--text2);padding:3px 8px;background:var(--surface2);border-radius:10px}
.map-stat-chip.red{background:var(--red-light);color:var(--red-text)}
.map-stat-chip.amber{background:var(--amber-light);color:var(--amber-text)}
.map-section{margin-bottom:1rem}
.map-summary{margin:0 0 .5rem;font-size:13.5px;line-height:1.65;color:var(--text)}
.map-sublbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-top:.5rem;margin-bottom:4px}
.map-kp{margin:0 0 .5rem;padding-left:1.25rem;font-size:12.5px;line-height:1.6;color:var(--text2)}
.map-kp li{margin:2px 0}
.map-watch{margin:.5rem 0 0;padding:.625rem .75rem;background:var(--amber-light);border-left:3px solid var(--amber);border-radius:var(--rs);font-size:12.5px;line-height:1.55;color:var(--text)}
.map-card-item{padding:.5rem .75rem;background:var(--surface2);border-radius:var(--rs);margin-bottom:4px}
.map-card-front{margin:0;font-size:13px;line-height:1.5;color:var(--text)}
.map-card-meta{margin:3px 0 0;font-size:10.5px;color:var(--text3)}
.map-card-meta .tag-err{background:var(--red-light);color:var(--red-text);padding:1px 5px;border-radius:6px;margin-right:4px}
.map-card-meta .tag-hard{background:var(--amber-light);color:var(--amber-text);padding:1px 5px;border-radius:6px;margin-right:4px}
.map-err-item{padding:.5rem .75rem;background:var(--surface2);border-radius:var(--rs);margin-bottom:4px}
.map-err-q{margin:0;font-size:13px;line-height:1.5;color:var(--text)}
.map-err-meta{margin:3px 0 0;font-size:10.5px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ====== HISTÓRICO — cards ativos e interativos ====== */
.history-insight{background:var(--amber-light);border-left:3px solid var(--amber);padding:.7rem .875rem;border-radius:var(--rs);font-size:13px;line-height:1.5;color:var(--text);margin-bottom:1rem}

.quick-review-btn{width:100%;background:linear-gradient(135deg,var(--red),#b23030);color:#fff;border:none;border-radius:var(--r);padding:.875rem 1rem;display:flex;flex-direction:column;gap:2px;cursor:pointer;text-align:left;transition:transform .15s,filter .15s}
.quick-review-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.quick-review-btn span:first-child{font-size:14px}
.quick-review-btn span:last-child{font-size:11.5px;opacity:.85}

/* History cards — redesigned for better readability */
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.125rem 1.25rem;position:relative;transition:all .15s;margin-bottom:.875rem}
.history-card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.04)}
.history-card.recent-24h{border-left:3px solid var(--red)}
.history-card.recurring{box-shadow:0 0 0 1px var(--amber) inset;background:linear-gradient(to right,var(--amber-light) 0%,var(--surface) 8%)}
.history-card.fixed{opacity:.72;border-left:3px solid var(--accent)}
.history-card.fixed:hover{opacity:.95}
/* Meta row — tighter, more breathable */
.history-card-meta{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.history-card-meta .txt3{font-size:11px;color:var(--text3);font-weight:500}
.history-card-meta .badge{font-size:10.5px;padding:2px 8px;font-weight:600}
.history-card-meta .disc-tag{font-size:10.5px;padding:2px 8px}
/* Topic line — subtle, secondary */
.history-card > p.txt3{font-size:11.5px;color:var(--text3);margin:0 0 .5rem;font-weight:500;letter-spacing:.2px}
/* Question text — clearly the focal point */
.history-question{font-size:14px;line-height:1.65;margin:.25rem 0 .875rem;color:var(--text);font-weight:400}
/* Answer label */
.history-answer{font-size:12px;color:var(--text3);margin:.875rem 0 .375rem;display:flex;align-items:center;gap:6px}
.history-answer b{color:var(--text);font-size:13.5px;font-weight:600;background:var(--surface2);padding:2px 8px;border-radius:6px}
/* Actions row — generous spacing */
.history-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;align-items:center;padding-top:.875rem;border-top:1px dashed var(--border)}

.kw-hl{background:var(--amber-light);color:var(--amber-text);padding:1px 4px;border-radius:3px;font-weight:600}

.exp-toggle-btn{background:transparent;border:none;color:var(--text3);font-size:11.5px;padding:6px 0;cursor:pointer;margin:0;font-weight:500;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:color .15s}
.exp-toggle-btn:hover{color:var(--accent)}

.history-expl-box{background:var(--surface2);border-radius:var(--rs);padding:.875rem 1rem;margin-top:.5rem;margin-bottom:.25rem;border-left:3px solid var(--accent)}

.retry-box{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--rs);padding:.875rem 1rem;margin:.75rem 0}
.retry-result{padding:.75rem .875rem;border-radius:var(--rs);font-size:13px}
.retry-result.ok{background:var(--accent-light);color:var(--accent-text)}
.retry-result.err{background:var(--red-light);color:var(--red-text)}
.retry-expl{margin-top:.625rem;font-size:12.5px;line-height:1.55;color:var(--text2)}

.trap-group-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:.75rem 1rem;background:var(--surface2);border-radius:var(--rs);margin-bottom:.75rem;flex-wrap:wrap;margin-top:1.5rem}
.trap-group-title{font-size:14px;font-weight:600;color:var(--text)}
.trap-group-count{font-size:11.5px;color:var(--text2);margin-left:6px}

.qr-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}

.b-warn{background:var(--amber-light);color:var(--amber-text)}

/* ====== MODO FOCO (zen mode) ====== */
html.focus-mode .topbar{display:none}
html.focus-mode .container{padding-top:1rem}
html.focus-mode .back-btn{opacity:.5}
html.focus-mode .back-btn:hover{opacity:1}
html.focus-mode .method-info{display:none}
html.focus-mode .scard,html.focus-mode .dna-row,html.focus-mode .insight-card{display:none}

/* Focus mode toggle button (always visible in bottom-right) */
.focus-toggle{position:fixed;bottom:18px;right:18px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:all .15s}
.focus-toggle:hover{background:var(--accent-light);color:var(--accent-text);transform:scale(1.05)}
html.focus-mode .focus-toggle{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ====== TOAST ====== */
.ux-toast{position:fixed;bottom:-60px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,.2);z-index:1000;opacity:0;transition:bottom .3s,opacity .3s;max-width:80vw;text-align:center}
.ux-toast.visible{bottom:24px;opacity:1}

/* ====== SHORTCUTS OVERLAY ====== */
.shortcuts-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
.shortcuts-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;max-width:400px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.sk-row{display:flex;align-items:center;gap:12px;padding:6px 0;font-size:13px;color:var(--text2)}
.sk-row kbd{background:var(--surface2);border:1px solid var(--border2);border-bottom-width:2px;border-radius:4px;padding:2px 8px;font-size:11px;font-family:ui-monospace,monospace;color:var(--text);min-width:22px;text-align:center;font-weight:600}

/* ====== MICRO INTERAÇÕES ====== */
@keyframes flashGreen{0%{background:transparent}20%{background:var(--accent-light)}100%{background:transparent}}
@keyframes flashRed{0%{background:transparent}20%{background:var(--red-light)}100%{background:transparent}}
.flash-ok{animation:flashGreen .6s ease-out}
.flash-err{animation:flashRed .6s ease-out}

/* Enhanced fade for question transitions */
@keyframes gentleFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:gentleFadeIn .22s ease-out}

/* Softer loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ====== LEGIBILIDADE ====== */
/* Question enunciado — prioridade visual */
.question-card{font-size:15px;line-height:1.65}
.qcard-enun{font-size:15.5px;line-height:1.65;font-weight:500;color:var(--text)}

/* Feedback card — explicação com destaque sem ser pesada */
.fb-card .meta-box p,.fb-card > p{line-height:1.65}

/* Mobile comfort — slightly bigger touch targets */
@media(max-width:520px){
  .question-card,.qcard-enun{font-size:15px;line-height:1.7}
  .btn-ans{min-height:44px;font-size:15px}
  .btn{min-height:40px}
  .sub-tab{min-height:36px}
}

/* Shortcut hint chip (small, top-right on method screens) */
.sk-hint{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text3);padding:3px 7px;background:var(--surface2);border-radius:10px;margin-left:8px}
.sk-hint kbd{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:9.5px;font-family:ui-monospace,monospace;color:var(--text2)}
.txt3 kbd,p kbd{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:ui-monospace,monospace;font-size:10.5px;color:var(--text2);margin:0 1px}

/* Daily insight card */
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.125rem;margin-bottom:1.25rem;border-left:4px solid var(--blue-text,#185FA5)}
.insight-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.insight-stats{display:flex;gap:14px;padding:.5rem 0;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);margin-top:.5rem;flex-wrap:wrap}
.insight-stat{font-size:12px;color:var(--text2)}
.insight-stat b{font-size:15px;color:var(--text);font-weight:700;margin-right:2px}
.insight-stat span{color:var(--text3);font-size:11px}
.insight-sug{display:flex;gap:10px;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:var(--rs);margin-bottom:6px}
.insight-diag{margin:0 0 .5rem;font-size:13px;line-height:1.55;color:var(--text)}
.insight-sublbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-top:.5rem;margin-bottom:2px}
.insight-adj{margin:0 0 .5rem;font-size:12.5px;line-height:1.55;color:var(--text2)}

/* Method info panel — expandable explanation above each method */
.method-info{margin-bottom:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.method-info-head{width:100%;background:transparent;border:none;padding:.75rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;font-family:inherit;color:inherit;border-left:3px solid var(--accent)}
.method-info-head:hover{background:var(--surface2)}
.method-info-short{flex:1;margin:0;font-size:13.5px;color:var(--text);line-height:1.5;font-weight:500}
.method-info-toggle{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .15s}
.method-info-body{padding:.25rem 1rem 1rem;border-top:1px solid var(--border);font-size:13px;line-height:1.6;color:var(--text2)}
.method-info-body p{margin:0}
.method-info-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:.75rem;margin-bottom:4px}
.method-info-trust{background:var(--accent-light);padding:.625rem .875rem;border-radius:var(--rs);border-left:3px solid var(--accent);color:var(--text);font-size:12.5px;line-height:1.55}

/* Score badge shown after quality-gated generation */
.score-badge{padding:6px 10px;background:var(--surface2);border-radius:var(--rs);font-size:11.5px;color:var(--text2);line-height:1.5}

/* Bank filters */
