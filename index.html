.bank-filters{margin-bottom:1rem;padding:.75rem;background:var(--surface2);border-radius:var(--rs)}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-row-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);min-width:80px;flex-shrink:0}
.filter-chip{padding:4px 9px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .12s}
.filter-chip:hover{background:var(--surface2)}
.filter-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-chip .count{font-size:10px;opacity:.75;margin-left:2px}
.filter-chip.on .count{opacity:.85}

/* Notebook (caderno) cards */
.notebook-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;border-left:4px solid var(--purple,#6C5CE7)}
.notebook-card:hover{border-left-color:var(--accent)}
.notebook-head{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
.notebook-name{font-size:15px;font-weight:600;color:var(--text)}

/* Pomodoro session history */
.pomo-session{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs)}

/* Comparison rows on Welcome */
.cmp-row{margin-bottom:.875rem}
.cmp-area{font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);margin-bottom:.4rem;padding-left:2px}
.cmp-cells{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cmp-cell{padding:.7rem .85rem;border-radius:var(--rs);border:1px solid var(--border)}
.cmp-trad{background:var(--surface2);opacity:.92}
.cmp-nexus{background:var(--accent-light);border-color:rgba(15,110,86,.25)}
.cmp-cell-head{font-size:11.5px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.cmp-trad .cmp-cell-head{color:var(--text2)}
.cmp-nexus .cmp-cell-head{color:var(--accent-text)}
.cmp-icon{font-size:13px}
@media(max-width:520px){.cmp-cells{grid-template-columns:1fr}}

/* Welcome / onboarding */
/* Account card in Settings */
.account-info{background:var(--surface2);border-radius:var(--rs);padding:.75rem 1rem;margin-top:.25rem}
.account-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:6px 0;font-size:13px;flex-wrap:wrap}
.account-row + .account-row{border-top:1px dashed var(--border)}
.account-lbl{color:var(--text3);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.account-val{color:var(--text);font-weight:500;word-break:break-all;text-align:right}
.account-row.error .account-val{color:var(--red-text)}
.account-row.warn .account-val{color:var(--amber)}

/* ====== AUTENTICAÇÃO (Supabase) ====== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg)}
.auth-card{max-width:420px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2.25rem 1.75rem;box-shadow:0 4px 24px rgba(0,0,0,.04)}
/* .auth-logo definido no bloco Welcome V3 com identidade Gralia */
.auth-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);text-align:center;margin-bottom:1.75rem}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--surface2);border-radius:var(--rs);padding:4px;margin-bottom:1.5rem}
.auth-tab{background:transparent;border:none;padding:.625rem;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-radius:var(--rs);font-family:inherit;transition:all .15s}
.auth-tab.on{background:var(--surface);color:var(--gralia-purple);box-shadow:0 1px 3px rgba(124,92,255,.18);border-bottom:2px solid var(--gralia-purple)}
.auth-form label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px}
.auth-form input{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text)}
.auth-form input:focus{outline:none;border-color:var(--accent)}
.auth-submit{width:100%;justify-content:center;margin-top:1.25rem}
.auth-error{background:var(--red-light);color:var(--red-text);padding:.625rem .75rem;border-radius:var(--rs);font-size:12.5px;margin-top:.875rem;border:1px solid var(--red)}
.auth-ok{background:var(--accent-light);color:var(--accent-text);padding:.625rem .75rem;border-radius:var(--rs);font-size:12.5px;margin-top:.875rem;border:1px solid var(--accent)}
.auth-note{font-size:11.5px;color:var(--text3);text-align:center;margin:1.25rem 0 0;line-height:1.5}
.auth-back-link{display:block;text-align:center;margin-top:.875rem;font-size:12px;color:var(--text3);text-decoration:none;padding:6px}
.auth-back-link:hover{color:var(--gralia-purple);text-decoration:underline}
.auth-loading{text-align:center;padding:1.5rem 0;color:var(--text2)}
.auth-loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.auth-loading p{margin-top:.75rem;font-size:13px}

/* Sync indicator — small dot in topbar */
.sync-dot{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);padding:4px 8px;border-radius:10px;background:var(--surface2);cursor:default}
.sync-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent)}
.sync-dot.syncing::before{background:var(--amber);animation:pulse 1.2s ease-in-out infinite}
.sync-dot.error::before{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Credits chip — shows remaining API quota in topbar */
.credits-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--accent-text);padding:4px 10px;border-radius:10px;background:var(--accent-light);border:1px solid var(--accent);cursor:default;transition:all .15s}
.credits-chip::before{content:'⚡';font-size:10px}
.credits-chip.low{color:var(--amber);background:rgba(245,158,11,.12);border-color:var(--amber)}
.credits-chip.empty{color:var(--red-text);background:var(--red-light);border-color:var(--red);animation:credit-pulse 2s ease-in-out infinite}
@keyframes credit-pulse{0%,100%{opacity:1}50%{opacity:.65}}

/* ====== WELCOME v2 — landing page enxuta e impactante ====== */
/* ===== WELCOME V3 — identidade Gralia ===== */
.welcome-v3{max-width:1100px !important;margin:0 auto;padding:0 1.25rem 4rem}

/* Hero */
.wel-hero-v3{display:grid;grid-template-columns:1.2fr 1fr;gap:3rem;align-items:center;padding:3.5rem 0 2.5rem;position:relative}

.wel-final-cta{text-align:center;padding:3rem 1.25rem;background:linear-gradient(135deg,var(--accent),var(--accent-mid));color:#fff;border-radius:var(--r);margin-top:1rem}
.wel-final-title{font-size:28px;font-weight:700;letter-spacing:-0.8px;color:#fff;margin:0 0 .625rem;line-height:1.2}
.wel-final-sub{font-size:14.5px;opacity:.92;color:#fff;margin:0 0 1.5rem;line-height:1.55}
.wel-final-btn{background:#fff !important;color:var(--accent-text) !important;font-size:15px !important;padding:14px 30px !important;font-weight:700;border:none !important}
.wel-final-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.15)}
@media(max-width:640px){
  .wel-final-title{font-size:22px}
  .wel-final-cta{padding:2.25rem 1rem}
}

.welcome-wrap{max-width:600px;margin:2rem auto;padding:0 1.25rem 3rem}
.wel-grid{display:grid;grid-template-columns:1fr;gap:10px}
.wel-step{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem}
.wel-step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.wel-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.wel-list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.75rem .875rem;display:flex;gap:10px;align-items:flex-start}
.wel-list-icon{font-size:18px;line-height:1.2;flex-shrink:0;margin-top:1px}

/* Model picker chips */
.model-chip{padding:5px 10px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:11.5px;cursor:pointer;line-height:1.3;text-align:left;display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px}
.model-chip b{font-size:12px;font-weight:600;color:var(--text)}
.model-chip span{font-size:10px;color:var(--text3)}
.model-chip:hover{background:var(--surface2);border-color:var(--border2)}
.model-chip.on{border-color:var(--accent);background:var(--accent-light)}
.model-chip.on b{color:var(--accent-text)}
.model-chip.on span{color:var(--accent-text);opacity:.8}

/* Last generation telemetry */
.last-gen-badge{margin-top:.5rem;padding:6px 10px;background:var(--surface2);border-radius:var(--rs);font-size:11.5px;color:var(--text2);display:inline-block}
.last-gen-badge b{color:var(--text);font-weight:600}

/* Review entry point on dashboard */
.review-entry-btn{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;text-align:left}
.review-entry-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.review-entry-emoji{font-size:22px;flex-shrink:0}
.review-entry-body{flex:1;display:flex;flex-direction:column;gap:2px}
.review-entry-body b{font-size:14.5px;font-weight:600;color:var(--text)}
.review-entry-body span{font-size:12.5px;color:var(--text2);line-height:1.45}
.review-entry-arrow{color:var(--text3);font-size:16px;flex-shrink:0}
.review-entry-btn:hover .review-entry-body b{color:var(--accent-text)}

/* Review hub cards */
.rev-hub-card{border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem;cursor:pointer;transition:all .15s;background:var(--surface);text-align:left;width:100%;display:block;color:inherit;font-family:inherit}
.rev-hub-card:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.08)}
.rev-hub-turbo{border-left:4px solid var(--red)}
.rev-hub-turbo:hover{border-color:var(--red);background:var(--red-light)}
.rev-hub-eve{border-left:4px solid var(--blue)}
.rev-hub-eve:hover{border-color:var(--blue);background:var(--blue-light)}
.rev-hub-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rev-hub-emoji{font-size:24px}
.rev-hub-title{font-size:17px;font-weight:700;color:var(--text)}
.rev-hub-tagline{font-size:13px;color:var(--text2);margin-bottom:.75rem;line-height:1.5}
.rev-hub-bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px}
.rev-hub-bullets li{font-size:12.5px;color:var(--text2);padding-left:16px;position:relative;line-height:1.55}
.rev-hub-bullets li::before{content:'•';position:absolute;left:4px;color:var(--text3)}
.rev-hub-when{margin-top:.875rem;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:5px 10px;border-radius:var(--rs);display:inline-block}
.rev-hub-turbo .rev-hub-when{background:var(--red-light);color:var(--red-text)}
.rev-hub-eve .rev-hub-when{background:var(--blue-light);color:var(--blue-text)}

/* Turbo review button */
.turbo-btn-wrap{margin-bottom:.75rem}
.turbo-btn{width:100%;background:linear-gradient(135deg,#D94B4A 0%,#B03B3A 100%);color:#fff;border:none;border-radius:var(--r);padding:1rem 1.25rem;text-align:left;font-size:15px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 2px 8px rgba(217,75,74,.25)}
.turbo-btn:hover{opacity:.95}
.turbo-btn:active{transform:translateY(1px)}
.turbo-btn b{font-size:16px;font-weight:700}
.turbo-btn span{font-size:12.5px;opacity:.9;font-weight:400;line-height:1.4}

/* Eve review button */
.eve-btn-wrap{margin-bottom:1.25rem}
.eve-btn{width:100%;background:linear-gradient(135deg,#185FA5 0%,#0C447C 100%);color:#fff;border:none;border-radius:var(--r);padding:1rem 1.25rem;text-align:left;font-size:15px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 2px 8px rgba(24,95,165,.22)}
.eve-btn:hover{opacity:.95}
.eve-btn:active{transform:translateY(1px)}
.eve-btn b{font-size:16px;font-weight:700}
.eve-btn span{font-size:12.5px;opacity:.9;font-weight:400;line-height:1.4}

/* Continue card */
.continue-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem}
.continue-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem}
.continue-items{display:flex;flex-direction:column;gap:8px}
.continue-item{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s;text-align:left;width:100%}
.continue-item:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.continue-emoji{font-size:16px;flex-shrink:0}
.continue-text{flex:1;font-size:13px}
.continue-arrow{color:var(--text3);font-size:14px}

@media(max-width:620px){
  .topbar{padding:0 1rem;gap:.75rem}
  .tabs{gap:0}.tab{padding:6px 8px;font-size:12px}
  .countdown{flex-direction:column;align-items:flex-start;gap:.25rem;padding:1rem 1.25rem}
  .countdown-big{font-size:38px}
  .g4{grid-template-columns:1fr 1fr}
  .mode-grid{grid-template-columns:1fr}
  .pomo-time{font-size:60px}
  .dna-lbl{min-width:140px;font-size:11px}
  .srs-rating{grid-template-columns:repeat(2,1fr)}
}

function activeDisciplines(){return DATA.disciplines.filter(d=>d.active)}
function activeSources(){
  const ids = new Set(activeDisciplines().map(d=>d.id));
  return DATA.sources.filter(s=>!s.disciplineId||ids.has(s.disciplineId));
}
function getDiscipline(id){return DATA.disciplines.find(d=>d.id===id)}
function inferDiscipline(topic){
  const t = (topic||'').toLowerCase();
  const active = activeDisciplines();
  if(active.length===0)return null;
  const map = {d1:['inteligência','contrainteligência','contra-inteligência','abin','sisbin','operação','fonte'],
    d2:['criminologia','criminoso','vítima','escola','delito','prevenção'],
    d3:['criminalística','perícia','balística','dna','local de crime','papiloscopia']};
  for(const d of active){
    const keys = map[d.id];
    if(keys&&keys.some(k=>t.includes(k)))return d.id;
  }
  return active[0].id;
}
function buildContent(){
  const srcs = activeSources();
  if(srcs.length===0)return '';
  // Detect dominant content type for directive injection
  const typeCount = {};
  srcs.forEach(s=>{const t=s.contentType||'misto';typeCount[t]=(typeCount[t]||0)+1;});
  const dominant = Object.entries(typeCount).sort((a,b)=>b[1]-a[1])[0][0];
  let directive = '';
  if(dominant==='lei_seca'){
    directive = '\n\n--- DIRETRIZ DE ESTILO ---\nConteúdo é majoritariamente LEI SECA. Priorize: (a) armadilhas por INVERSÃO de texto legal, (b) TERMO ABSOLUTO onde há exceções na lei, (c) OMISSÃO de prazos/percentuais/requisitos, (d) palavras-chave exatas ("somente", "exclusivamente", "em regra"). Evite questões sobre doutrina ou jurisprudência que não esteja no conteúdo.\n';
  } else if(dominant==='jurisprudencia'){
    directive = '\n\n--- DIRETRIZ DE ESTILO ---\nConteúdo é majoritariamente JURISPRUDÊNCIA. Priorize: (a) cenários APLICADOS ao caso concreto, (b) variação de contexto para testar se o candidato entendeu a tese, (c) diferenciação entre o que a Súmula/STF decidiu e o que é o texto legal puro. Evite literalidade de lei que não esteja explícita no conteúdo.\n';
  } else if(dominant==='doutrina'){
    directive = '\n\n--- DIRETRIZ DE ESTILO ---\nConteúdo é majoritariamente DOUTRINA. Priorize: (a) CLASSIFICAÇÕES e distinções conceituais, (b) comparações entre correntes/autores, (c) aplicação do conceito a situações práticas.\n';
  }
  return srcs.map(s=>{
    const disc = getDiscipline(s.disciplineId);
    const dLbl = disc?` (disciplina: ${disc.name})`:'';
    const tLbl = s.contentType&&s.contentType!=='misto' ? ` [${(CONTENT_TYPES[s.contentType]||{}).label||s.contentType}]` : '';
    return `[${SRC_TYPES[s.type].label.toUpperCase()}${dLbl}${tLbl}: ${s.name}]\n${s.content}`;
  }).join('\n\n---\n\n') + directive;
}
function hasContent(){return activeSources().length>0&&buildContent().length>50}

// Quota state — populated by /api/generate responses (header X-Credits-Remaining)
const QUOTA = {
  remaining: null,    // integer, null if not fetched yet
  plan: 'trial',
  lastFetchedAt: null
};

// Fetch initial quota state (called after login)
async function fetchQuota(){
  if(!isAuthed())return;
  try{
    const {data,error} = await supa.from('user_quota')
      .select('credits_remaining, plan, credits_used_total')
      .eq('user_id',AUTH.user.id)
      .maybeSingle();
    if(error)throw error;
    if(data){
      QUOTA.remaining = data.credits_remaining;
      QUOTA.plan = data.plan;
      QUOTA.lastFetchedAt = Date.now();
    }
  }catch(e){
    console.warn('[NEXUS] Falha ao buscar quota:',e.message);
  }
}

// Central helper for /api/generate calls.
// Adds Bearer token from current Supabase session, handles quota errors.
async function apiGenerate(body){
  const headers = {'Content-Type':'application/json'};
  if(isAuthed()&&AUTH.session?.access_token){
    headers['Authorization'] = 'Bearer '+AUTH.session.access_token;
  }
  const r = await fetch('/api/generate',{
    method:'POST',
    headers,
    body:JSON.stringify(body)
  });
  // Update quota from response header (backend sends after successful call)
  const remaining = r.headers.get('X-Credits-Remaining');
  if(remaining!==null){
    QUOTA.remaining = parseInt(remaining,10);
    QUOTA.lastFetchedAt = Date.now();
    const chip = document.getElementById('credits-chip');
    if(chip)updateCreditsChip(chip);
  }
  // Detect quota exhaustion (HTTP 402 Payment Required)
  if(r.status===402){
    // Clone the response so we can both peek and return
    try{
      const clone = r.clone();
      const d = await clone.json();
      if(d.code==='NO_CREDITS'){
        handleNoCreditsError();
      }
    }catch(_){}
  }
  return r;
}

// Update the credits chip in the topbar based on QUOTA state
function updateCreditsChip(chip){
  if(!chip)return;
  if(QUOTA.remaining===null){
    chip.textContent='...';
    chip.className='credits-chip';
    return;
  }
  const r = QUOTA.remaining;
  chip.textContent = r+' créd.';
  chip.className = 'credits-chip';
  if(r===0)chip.classList.add('empty');
  else if(r<=5)chip.classList.add('low');
  chip.title = `Plano ${QUOTA.plan} · ${r} créditos restantes`;
}

/* API */
// Chamadas passam pelo proxy /api/generate (Vercel) que adiciona a chave Anthropic
// no servidor. Assim a chave nunca é exposta ao cliente.
async function callAPI(system, msgs, opts){
  const content = buildContent();
  if(!content)throw new Error('no-content');
  // Build system as array with cache_control on the content block.
  // The system instructions change between methods but the content block is reused
  // between chat turns of the same method — so caching it saves ~90% on repeated calls.
  const systemArr = [
    {type:'text',text:system},
    {type:'text',text:'CONTEÚDO DO CANDIDATO:\n\n'+content,cache_control:{type:'ephemeral'}}
  ];
  const finalMsgs = msgs; // user messages ficam limpos, sem conteúdo duplicado
  const modelOverride = opts&&opts.model;
  const body = {model:modelOverride||DATA.config.model,max_tokens:2500,system:systemArr,messages:finalMsgs};
  let r;
  try{
    r = await apiGenerate(body);
  }catch(netErr){
    console.error('Network error:',netErr);
    throw new Error('network: '+(netErr.message||'falha de rede'));
  }
  if(!r.ok){
    let errText = '';
    try{errText = await r.text();}catch(e){}
    console.error('API error', r.status, errText);
    throw new Error('api-'+r.status+': '+errText.slice(0,300));
  }
  let d;
  try{d = await r.json();}catch(e){throw new Error('resposta não é JSON válido');}
  const txt = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!txt)throw new Error('resposta vazia da IA');
  // Capture usage metrics (for cache ratio visibility)
  if(d.usage){
    ST._lastUsage = {
      input:d.usage.input_tokens||0,
      output:d.usage.output_tokens||0,
      cacheCreation:d.usage.cache_creation_input_tokens||0,
      cacheRead:d.usage.cache_read_input_tokens||0
    };
  }
  // Robust JSON extraction. The model sometimes wraps output in ```json ... ``` and
  // adds trailing narration after the block. We try, in order:
  // 1. Stripped backticks around the whole thing (happy path)
  // 2. Content between the first ```json ... ``` fence (if present)
  // 3. First balanced {...} object in the text (fallback)
  function extractJSON(raw){
    if(!raw||typeof raw!=='string')throw new Error('empty');
    // Strategy 1: strip fences and trim
    let s = raw.trim();
    const fence = s.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
    if(fence){s = fence[1].trim();}
    // Strategy 2: try direct parse
    try{return JSON.parse(s);}catch(_){}
    // Strategy 3: find first balanced JSON object in raw text.
    // Walks character by character tracking brace depth, respecting strings/escapes.
    const findBalanced = str=>{
      const start = str.indexOf('{');
      if(start<0)return null;
      let depth=0, inStr=false, esc=false;
      for(let i=start;i<str.length;i++){
        const ch = str[i];
        if(esc){esc=false;continue;}
        if(ch==='\\'){esc=true;continue;}
        if(ch==='"'){inStr=!inStr;continue;}
        if(inStr)continue;
        if(ch==='{')depth++;
        else if(ch==='}'){depth--;if(depth===0)return str.slice(start,i+1);}
      }
      return null;
    };
    const found = findBalanced(raw);
    if(found){
      try{return JSON.parse(found);}catch(_){}
    }
    throw new Error('no valid JSON found');
  }
  try{
    return extractJSON(txt);
  }catch(e){
    console.error('Parse error. Raw text:',txt);
    throw new Error('JSON inválido da IA: '+txt.slice(0,150));
  }
}

// Wraps an async callAPI invocation and records duration
async function timedCallAPI(methodKey,kind,system,msgs,opts){
  const t0 = performance.now();
  try{
    const res = await callAPI(system,msgs,opts);
    const dur = performance.now()-t0;
    const u = ST._lastUsage||{};
    const model = (opts&&opts.model)||DATA.config.model;
    ST.lastGen[methodKey] = {
      model,durationMs:dur,kind,
      cacheRead:u.cacheRead||0,
      input:u.input||0,
      output:u.output||0
    };
    // Log for usage tracking
    logUsage({
      model,
      kind,
      action:methodKey,
      input:u.input||0,
      output:u.output||0,
      cacheRead:u.cacheRead||0,
      cacheCreation:u.cacheCreation||0
    });
    return res;
  }catch(e){
    throw e;
  }
}

/* Quality-gated call: accept if score>=75, retry once, then accept best result.
   Used for flashcards (SRS_GEN, CARD_FROM_ERROR) which have SYS_COMPLETE_EVAL prompts.
   Returns {result, attempts, finalScore, regenerated, discarded}. */
async function callAPIWithScore(methodKey,kind,system,msgs,opts,minScore){
  const threshold = minScore||75;
  let best = null;let bestScore = -1;
  const attempts = [];
  for(let i=0;i<3;i++){
    try{
      const res = await timedCallAPI(methodKey,kind,system,msgs,opts);
      // Extract score — handle single card or array of cards
      let score = 100;
      if(res.score!==undefined)score=Number(res.score)||0;
      else if(Array.isArray(res.cards)&&res.cards.length>0){
        // Average scores from all cards
        const scores = res.cards.map(c=>Number(c.score)||100).filter(s=>s>0);
        if(scores.length>0)score = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
      }
      attempts.push({score,res});
      if(score>bestScore){best=res;bestScore=score;}
      if(score>=threshold)break; // ótimo, aceita
      // Se score<75 e ainda não tentou todas, vai tentar de novo (regenerar)
    }catch(e){
      // Se primeira tentativa falha, propaga. Se tentativas seguintes falham,
      // retorna o melhor resultado anterior (se houver).
      if(i===0)throw e;
      break;
    }
  }
  return {
    result:best,
    finalScore:bestScore,
    attempts:attempts.length,
    regenerated:attempts.length>1,
    discarded:bestScore>0&&bestScore<threshold
  };
}

// Creates a loading element with rotating text. Returns the DOM element;
// rotation stops automatically when the element is removed from DOM.
function dynamicLoading(kind,initialMsg){
  const msgs = LOADING_MSGS[kind]||[initialMsg||'Gerando...'];
  const d = mk('div','loading-row');
  const sp = mk('span','spinner');
  const txt = mk('span');txt.style.marginLeft='6px';
  txt.textContent = initialMsg||msgs[0];
  d.appendChild(sp);d.appendChild(txt);
  let i = 0;
  const interval = setInterval(()=>{
    if(!d.isConnected){clearInterval(interval);return;}
    i = (i+1)%msgs.length;
    // Fade out/in effect via opacity
    txt.style.transition='opacity .25s';
    txt.style.opacity='0';
    setTimeout(()=>{if(d.isConnected){txt.textContent=msgs[i];txt.style.opacity='1';}},260);
  },2500);
  return d;
}

/* MODAL */
function showModal(content){
  ST.modal=content;
  const root=$('modal-root');root.innerHTML='';
  const bg=mk('div','modal-bg');
  // Track where mousedown started - only close if BOTH down and up were on backdrop
  let downOnBg = false;
  bg.addEventListener('mousedown',e=>{downOnBg = (e.target===bg);});
  bg.addEventListener('mouseup',e=>{if(downOnBg&&e.target===bg)closeModal();downOnBg=false;});
  const mod=mk('div','modal');
  mod.appendChild(content);
  bg.appendChild(mod);root.appendChild(bg);
}
function closeModal(){ST.modal=null;$('modal-root').innerHTML='';}

}

/* RENDER */
const APP = $('app');
function render(){
  APP.innerHTML='';
  // Loading state while we restore session on first boot
  if(AUTH.loading){
    const load = mk('div','auth-wrap fade');
    const card = mk('div','auth-card');
    const spin = mk('div','auth-loading');spin.innerHTML='<span class="spinner"></span><p>Carregando...</p>';
    card.appendChild(spin);
    load.appendChild(card);
    APP.appendChild(load);
    return;
  }
  // Flow order: welcome (landing) → auth (when user clicks CTA) → setup → app
  // Welcome is ALWAYS shown to new visitors so they understand the product first.
  // Authenticated users skip welcome (they already know it).
  if(!isAuthed() && !ST.showAuth && !DATA.welcomeShown){
    APP.appendChild(renderWelcome());
    return;
  }
  // Auth screen — only shown after user clicks a welcome CTA (ST.showAuth=true)
  // or if they're returning and Supabase is configured but session expired.
  if(supabaseConfigured() && !isAuthed()){
    APP.appendChild(renderAuthScreen());
    return;
  }
  // Returning non-authed users (when Supabase not configured locally): show welcome if not shown
  if(!DATA.welcomeShown){APP.appendChild(renderWelcome());return;}
  if(needsSetup()){APP.appendChild(renderSetup());return;}
  APP.appendChild(renderTopbar());
  const pg = mk('div','page route-fade');
  const views = {
    dashboard:renderDashboard,sources:renderSources,methods:renderMethods,
    pomodoro:renderPomodoro,settings:renderSettings,history:renderHistory,turbo:renderTurbo,eve:renderEve,imported:renderImported,review:renderReview,revgen:renderRevgen,
    calibration:renderCalibration,examiner:renderExaminer,drill:renderDrill,
    elaborative:renderElaborative,practice:renderPractice,simulado:renderSimulado,
    interleaving:renderInterleaving,srs:renderSRS,mapa:renderMapa,usage:renderUsage
  };
  // Contextual breadcrumb — shows where user came from
  if(ST.navStack.length>0){
    pg.appendChild(renderBreadcrumb());
  }
  pg.appendChild((views[ST.view]||renderDashboard)());
  APP.appendChild(pg);
  // Floating focus-mode toggle (always present)
  const focusBtn = mk('button','focus-toggle');
  focusBtn.title = isFocusMode()?'Sair do modo foco (F)':'Entrar no modo foco (F)';
  focusBtn.innerHTML = isFocusMode()?'✕':'🧘';
  focusBtn.addEventListener('click',()=>{toggleFocusMode();render();});
  APP.appendChild(focusBtn);
  // Reset hidden state quando navega — pomo float reaparece se rodando
  if(ST.view==='pomodoro')ST.pomoFloatHidden = false;
  renderPomoFloat();
}

/* TOPBAR */
function renderTopbar(){
  const bar = mk('div','topbar');
  const inner = mk('div','topbar-inner');
  const brand = mk('div','brand');
  brand.innerHTML = `<img src="${BRAND.birdLogo}" alt="" class="brand-bird brand-bird-light"><img src="${BRAND.birdLogoDark}" alt="" class="brand-bird brand-bird-dark"><span class="brand-name">Gralia</span>`;

  // Estrutura: grupos + abas soltas
  const NAV_STRUCTURE = [
    {type:'tab',view:'dashboard',label:'Painel',icon:'🏠'},
    {type:'group',key:'study',label:'Estudar',icon:'📘',children:[
      {view:'methods',label:'Métodos de Estudo',icon:'🎯',desc:'8 técnicas de prática adaptativa'},
      {view:'imported',label:'Banco de Questões',icon:'📝',desc:'Questões importadas do TEC'}
    ]},
    {type:'group',key:'review',label:'Revisar',icon:'🔄',children:[
      {view:'srs',label:'Flashcards',icon:'🎴',desc:'Revisão espaçada (SRS)'},
      {view:'review',label:'Revisão Turbo / Véspera',icon:'⚡',desc:'Ciclos adaptativos e gerador de material'},
      {view:'history',label:'Histórico de Erros',icon:'📜',desc:'Todos os erros registrados'},
      {view:'pomodoro',label:'Pomodoro',icon:'⏱',desc:'Timer de foco'}
    ]},
    {type:'group',key:'plan',label:'Planejar',icon:'🗺',children:[
      {view:'mapa',label:'Mapa da Matéria',icon:'🗺️',desc:'Visão integrada por tópico'},
      {view:'sources',label:'Fontes de Estudo',icon:'📚',desc:'Materiais e disciplinas'}
    ]},
    {type:'tab',view:'settings',label:'Config',icon:'⚙'}
  ];

  const tabs = mk('div','tabs');
  // Helper pra decidir se uma view pertence a um grupo
  const groupContainsView = (group)=>group.children.some(c=>c.view===ST.view);

  NAV_STRUCTURE.forEach(entry=>{
    if(entry.type==='tab'){
      const t = mk('button','tab'+(ST.view===entry.view?' on':''));
      t.innerHTML = `<span class="tab-icon">${entry.icon}</span><span class="tab-lbl">${entry.label}</span>`;
      t.addEventListener('click',()=>{clearNavStack();ST.view=entry.view;document.body.classList.remove('mobile-nav-open');document.body.style.overflow='';render();});
      tabs.appendChild(t);
    } else if(entry.type==='group'){
      const isActive = groupContainsView(entry);
      const grp = mk('div','tab-group'+(isActive?' on':''));
      const trigger = mk('button','tab'+(isActive?' on':''));
      trigger.innerHTML = `<span class="tab-icon">${entry.icon}</span><span class="tab-lbl">${entry.label}</span><span class="tab-caret">▾</span>`;
      trigger.addEventListener('click',(ev)=>{
        ev.stopPropagation();
        document.querySelectorAll('.tab-group.open').forEach(el=>{if(el!==grp)el.classList.remove('open');});
        grp.classList.toggle('open');
      });
      grp.appendChild(trigger);
      // Dropdown
      const dd = mk('div','tab-dd');
      entry.children.forEach(child=>{
        const item = mk('button','tab-dd-item'+(ST.view===child.view?' on':''));
        item.innerHTML = `<span class="ddi-icon">${child.icon}</span><span class="ddi-body"><b>${child.label}</b><span>${child.desc}</span></span>`;
        item.addEventListener('click',()=>{
          clearNavStack();
          ST.view=child.view;
          grp.classList.remove('open');
          document.body.classList.remove('mobile-nav-open');
          document.body.style.overflow='';
          render();
        });
        dd.appendChild(item);
      });
      grp.appendChild(dd);
      tabs.appendChild(grp);
    }
  });
  // Fecha dropdowns quando clica fora
  setTimeout(()=>{
    document.addEventListener('click',()=>{
      document.querySelectorAll('.tab-group.open').forEach(el=>el.classList.remove('open'));
    },{once:true});
  },10);

  // Mobile hamburger — aparece em CSS media query
  const hamb = mk('button','mobile-hamb');
  hamb.innerHTML='☰';
  hamb.setAttribute('aria-label','Abrir menu');
  hamb.addEventListener('click',(ev)=>{
    ev.stopPropagation();
    const willOpen = !document.body.classList.contains('mobile-nav-open');
    document.body.classList.toggle('mobile-nav-open');
    // Trava/destrava scroll do body
    document.body.style.overflow = willOpen ? 'hidden' : '';
  });

  // Overlay clicável pra fechar menu (substitui ::after)
  const overlay = mk('div','mobile-nav-overlay');
  overlay.addEventListener('click',()=>{
    document.body.classList.remove('mobile-nav-open');
    document.body.style.overflow = '';
  });

  const days = Math.ceil((examDate()-new Date())/(1000*60*60*24));
  const pill = mk('div','countdown-pill');
  pill.textContent=days>0?(days===1?'1 dia':days+' dias'):(days===0?'Prova hoje':'Pós-prova');
  inner.appendChild(brand);inner.appendChild(hamb);inner.appendChild(tabs);inner.appendChild(overlay);
  // Sync indicator — only when auth is active
  if(isAuthed()){
    // Credits chip — visible when quota is known
    if(QUOTA.remaining!==null){
      const chip = mk('span','credits-chip');
      chip.id='credits-chip';
      updateCreditsChip(chip);
      inner.appendChild(chip);
    }
    const sync = mk('span','sync-dot');
    sync.id='sync-indicator';
    sync.textContent='Sincronizado';
    if(AUTH.syncing){sync.classList.add('syncing');sync.textContent='Sincronizando...';}
    else if(AUTH.syncError){sync.classList.add('error');sync.textContent='Erro';}
    inner.appendChild(sync);
  }
  inner.appendChild(pill);

  // Theme toggle — ☀/🌙 button in top right
  const currentTheme = localStorage.getItem('nexus_theme')||'light';
  const themeBtn = mk('button','theme-toggle-btn');
  themeBtn.type='button';
  themeBtn.setAttribute('aria-label','Alternar tema claro/escuro');
  themeBtn.title = currentTheme==='dark'?'Mudar para modo claro':'Mudar para modo escuro';
  themeBtn.innerHTML = currentTheme==='dark'?'☀':'🌙';
  themeBtn.addEventListener('click',()=>{toggleTheme();render();});
  inner.appendChild(themeBtn);

  bar.appendChild(inner);
  return bar;
}

/* DASHBOARD */
function renderDashboard(){
  const wrap = mk('div','fade');
  const s = DATA.session;
  const pct = s.total?Math.round(s.correct/s.total*100):0;
  const overconf = s.calibration.certain.t>0?Math.round((s.calibration.certain.t-s.calibration.certain.c)/s.calibration.certain.t*100):null;
  const dueSrs = DATA.srs.cards.filter(c=>(c.nextReview||0)<=Date.now()).length;
  const errorsNoCard = DATA.errors.filter(e=>!e.hasCard).length;
  const days = Math.ceil((examDate()-new Date())/(1000*60*60*24));

  // Today's focus time (Pomodoro sessions today)
  const todayStart = new Date();todayStart.setHours(0,0,0,0);
  const todaySessions = ((DATA.pomo||{}).sessions||[]).filter(s=>s.date>=todayStart.getTime());
  const todayFocusSec = todaySessions.reduce((a,s)=>a+(s.durationSec||0),0);
  const todayFocusMin = Math.round(todayFocusSec/60);
  // Week's focus time
  const weekAgo = Date.now()-7*24*60*60*1000;
  const weekSessions = ((DATA.pomo||{}).sessions||[]).filter(s=>s.date>=weekAgo);
  const weekFocusMin = Math.round(weekSessions.reduce((a,s)=>a+(s.durationSec||0),0)/60);

  // ===== GREETING — saudação personalizada =====
  const userName = (DATA.config.userName||'').trim();
  const hour = new Date().getHours();
  let timeGreeting = 'Olá';
  if(hour<5)timeGreeting='Boa madrugada';
  else if(hour<12)timeGreeting='Bom dia';
  else if(hour<18)timeGreeting='Boa tarde';
  else timeGreeting='Boa noite';
  const greeting = mk('div','dash-greeting');
  if(userName){
    greeting.innerHTML = `<span class="dg-time">${timeGreeting},</span> <b>${escapeHTML(userName)}</b>`;
  } else {
    greeting.innerHTML = `<span class="dg-time">${timeGreeting}</span> <span class="dg-prompt">— defina seu nome em <a href="#" class="dg-link" data-go-settings="1">Config</a></span>`;
  }
  // Subtitle: cargo + banca quando ambos preenchidos
  const examBank = (DATA.config.examBank||'').trim();
  const examNm = (DATA.config.examName||'').trim();
  if(examNm || examBank){
    const sub = mk('div','dash-greeting-sub');
    const parts = [];
    if(examNm)parts.push(`📋 <b>${escapeHTML(examNm)}</b>`);
    if(examBank)parts.push(`🏛️ Banca <b>${escapeHTML(examBank)}</b>`);
    sub.innerHTML = parts.join(' · ');
    greeting.appendChild(sub);
  }
  // Hook pra link "Config"
  setTimeout(()=>{
    greeting.querySelectorAll('[data-go-settings]').forEach(a=>{
      a.addEventListener('click',(e)=>{
        e.preventDefault();
        ST.view='settings';render();
      });
    });
  },10);
  wrap.appendChild(greeting);

  // ===== HERO — countdown + exam info =====
  const hero = mk('div','dash-hero');
  const heroLeft = mk('div','dash-hero-left');
  const big = mk('div','dash-hero-big');big.textContent=days>0?days:'0';
  heroLeft.appendChild(big);
  const heroLabel = mk('div','dash-hero-label');
  heroLabel.innerHTML = `<div class="dhl-main">${days===1?'DIA':'DIAS'} ATÉ A PROVA</div><div class="dhl-sub">${examName()} · ${formatExamDate()}</div>`;
  heroLeft.appendChild(heroLabel);
  hero.appendChild(heroLeft);

  // Hero right: today stats strip (focus time + questions + cards)
  const heroRight = mk('div','dash-hero-right');
  if(todayFocusMin>0||s.total>0||dueSrs>0){
    const stats = [];
    if(todayFocusMin>0){
      const h = Math.floor(todayFocusMin/60),m = todayFocusMin%60;
      const val = h>0?`${h}h${m>0?' '+m+'m':''}`:`${m}min`;
      stats.push({val,lbl:'hoje focado',icon:'⏱'});
    }
    if(s.total>0)stats.push({val:s.total,lbl:'questões hoje',icon:'📝'});
    if(dueSrs>0)stats.push({val:dueSrs,lbl:'cards pendentes',icon:'🎴'});
    stats.slice(0,3).forEach(st=>{
      const cell = mk('div','dash-hero-stat');
      cell.innerHTML = `<div class="dhs-val">${st.val}</div><div class="dhs-lbl">${st.icon} ${st.lbl}</div>`;
      heroRight.appendChild(cell);
    });
  }
  hero.appendChild(heroRight);
  wrap.appendChild(hero);

  // ===== WARNINGS — empty state or missing config =====
  if(!hasContent()){
    const w = warnBox('⚠ <b>Nenhum conteúdo foi adicionado ainda.</b> Vá para <a href="#" id="goSrc">Fontes</a> e cole seu material para ativar os métodos.');
    wrap.appendChild(w);
    setTimeout(()=>{const l=$('goSrc');if(l)l.addEventListener('click',e=>{e.preventDefault();ST.view='sources';render();});},0);
  }
  if(needsAPIKey()){
    const w = errorBox('⚠ <b>Chave API não configurada.</b> Os métodos com IA não funcionarão sem ela. <a href="#" id="goConf">Configurar agora</a>');
    wrap.appendChild(w);
    setTimeout(()=>{const l=$('goConf');if(l)l.addEventListener('click',e=>{e.preventDefault();ST.view='settings';render();});},0);
  }

  // ===== NEXT ACTION — single clear recommendation =====
  const nextAction = buildNextActionCard(dueSrs,errorsNoCard,overconf,s);
  if(nextAction)wrap.appendChild(nextAction);

  // ===== INSIGHT =====
  wrap.appendChild(buildInsightCard());

  // ===== TIMELINE — atividade recente =====
  const tl = buildActivityTimeline();
  if(tl)wrap.appendChild(tl);

  // ===== USAGE =====
  const uc = buildUsageCard();
  if(uc)wrap.appendChild(uc);

  // ===== PROGRESS BY DISCIPLINE — only if there's data =====
  const byD = {};
  DATA.disciplines.forEach(d=>{byD[d.id]={total:0,recent:0,score:0}});
  const DAY_MS = 24*60*60*1000;
  DATA.errors.forEach(e=>{
    if(e.disciplineId&&byD[e.disciplineId]){
      byD[e.disciplineId].total+=1;
      byD[e.disciplineId].score+=errorWeight(e);
      if(Date.now()-(e.date||0)<=DAY_MS)byD[e.disciplineId].recent+=1;
    }
  });
  const discWithErr = DATA.disciplines.filter(d=>byD[d.id].total>0)
    .sort((a,b)=>byD[b.id].score-byD[a.id].score);

  if(discWithErr.length>0){
    const discCard = mk('div','card');discCard.style.cssText='margin-bottom:1.25rem';

    const t = mk('h3');t.style.cssText='margin:0;font-size:14px';t.textContent='📊 Erros por disciplina';
    head.appendChild(t);
    const hint = mk('span','txt3');hint.style.fontSize='10.5px';hint.textContent='mais recentes pesam mais';
    head.appendChild(hint);
    discCard.appendChild(head);
    const maxScore = Math.max(...discWithErr.map(d=>byD[d.id].score),1);
    discWithErr.slice(0,5).forEach(d=>{
      const data = byD[d.id];
      const row = mk('div','dna-row');
      const lbl = mk('div','dna-lbl');
      lbl.style.cssText='display:flex;align-items:center;gap:6px;justify-content:flex-end';
      const nm = mk('span');nm.textContent=d.name;
      const dot = mk('span');dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0`;
      lbl.appendChild(nm);lbl.appendChild(dot);
      const track = mk('div','dna-track');
      const fill = mk('div','dna-fill');fill.style.width=(data.score/maxScore*100)+'%';fill.style.background=d.color;
      track.appendChild(fill);
      const num = mk('div','dna-num');num.style.minWidth='70px';
      num.innerHTML = data.recent>0?`${data.total} <span style="color:var(--red)">(${data.recent} recentes)</span>`:String(data.total);
      row.appendChild(lbl);row.appendChild(track);row.appendChild(num);
      discCard.appendChild(row);
    });
    if(discWithErr.length>5){
      const more = mk('p','txt3');more.style.cssText='margin:.5rem 0 0;text-align:right;font-size:11.5px';
      more.innerHTML = `<a href="#" id="mapLink">Ver mapa completo →</a>`;
      discCard.appendChild(more);
      setTimeout(()=>{const l=$('mapLink');if(l)l.addEventListener('click',e=>{e.preventDefault();ST.view='mapa';render();});},0);
    }
    wrap.appendChild(discCard);
  }

  // ===== CALIBRATION WARNING — sits compactly =====
  if(overconf!==null&&overconf>25){
    wrap.appendChild(errorBox(`⚠ <b>Atenção:</b> você erra ${overconf}% dos "tenho certeza". Esse padrão custa pontos. Treine Calibração.`));
  }

  // ===== SUMMARY NUMBERS — 4-up grid but more compact =====
  if(s.total>0||DATA.srs.cards.length>0||weekFocusMin>0){
    const sg = mk('div','summary-grid');
    const items = [
      {v:s.total?s.correct+'/'+s.total:'—',l:'Acertos',c:pct>=80?'var(--accent)':pct>=60?'var(--amber)':s.total?'var(--red)':'var(--text3)'},
      {v:s.total?pct+'%':'—',l:'Aproveit.',c:pct>=80?'var(--accent)':pct>=60?'var(--amber)':s.total?'var(--red)':'var(--text3)'},
      {v:DATA.srs.cards.length||'0',l:'Flashcards',c:DATA.srs.cards.length>0?'var(--accent)':'var(--text3)'},
      {v:weekFocusMin>0?Math.round(weekFocusMin/60*10)/10+'h':'—',l:'Foco 7d',c:weekFocusMin>0?'var(--blue-text)':'var(--text3)'}
    ];
    items.forEach(({v,l,c})=>{
      const sc = mk('div','scard');
      const sv = mk('div','scard-v');sv.style.color=c;sv.textContent=v;
      const sl = mk('div','scard-l');sl.textContent=l;
      sc.appendChild(sv);sc.appendChild(sl);sg.appendChild(sc);
    });
    wrap.appendChild(sg);
  }

  // ===== QUICK ACCESS — slim row, 3 primary actions =====
  const qaLbl = sLabel('Acesso rápido');qaLbl.style.marginTop='1.25rem';wrap.appendChild(qaLbl);
  const qg = mk('div','quick-row');
  [
    ['📝','Questões','practice'],
    ['🎴','Cards'+(dueSrs>0?` · ${dueSrs}`:''),'srs'],
    ['⏱','Pomodoro'+(todayFocusMin>0?` · ${todayFocusMin}m`:''),'pomodoro'],
    ['🗺️','Mapa','mapa']
  ].forEach(([icon,title,view])=>{
    const mc = mk('button','quick-card');
    mc.innerHTML = `<span class="qc-icon">${icon}</span><span class="qc-title">${title}</span>`;
    mc.addEventListener('click',()=>{ST.view=view;render();});
    qg.appendChild(mc);
  });
  wrap.appendChild(qg);

  return wrap;
}

// Build a single "next action" recommendation card — only 1 CTA, zero ambiguity
function buildNextActionCard(dueSrs,errorsNoCard,overconf,sess){
  // Priority order: SRS due > recent errors without card > calibration warning > practice
  let rec = null;
  const DAY = 24*60*60*1000;
  const recentErrCount = (DATA.errors||[]).filter(e=>(Date.now()-(e.date||0))<=DAY).length;

/* Activity timeline on dashboard — mostra eventos recentes de forma visual e navegável.
   Reúne: erros, flashcards criados, sessões de pomodoro, questões importadas. */
function buildActivityTimeline(){
  const events = [];
  const now = Date.now();
  const DAY = 24*60*60*1000;
  const TWO_DAYS = 2*DAY;

  // Erros recentes
  (DATA.errors||[]).forEach(e=>{
    if(!e.date||(now-e.date)>TWO_DAYS)return;
    const card = findCardFromError(e.id);
    events.push({
      type:'error', at:e.date, errorId:e.id,
      tone:'err',
      title:'Errou questão',
      subject:e.topic||(getDiscipline(e.disciplineId)?.name)||'Sem tópico',
      detail:e.question?e.question.replace(/\s+/g,' ').slice(0,140):'',
      chainedCard:card || null,
      disc:getDiscipline(e.disciplineId)
    });
  });

  // Flashcards criados — só se NÃO vieram de erro (senão duplicaria com o evento de erro acima)
  (DATA.srs?.cards||[]).forEach(c=>{
    if(!c.createdAt||(now-c.createdAt)>TWO_DAYS)return;
    if(c.sourceErrorId||c.fromErrorId)return;
    events.push({
      type:'card', at:c.createdAt, cardId:c.id,
      tone:'ok',
      title:'Novo flashcard',
      subject:(c.tags&&c.tags[0])||'Flashcard manual',
      detail:(c.front||'').replace(/\s+/g,' ').slice(0,140),
      disc:getDiscipline(c.disciplineId)
    });
  });

  // Sessões de pomodoro >= 5min
  ((DATA.pomo||{}).sessions||[]).forEach(s=>{
    if(!s.date||(now-s.date)>TWO_DAYS)return;
    if(!s.durationSec||s.durationSec<300)return;
    const mins = Math.round(s.durationSec/60);
    events.push({
      type:'pomo', at:s.date,
      tone:'info',
      title:'Sessão de foco',
      subject:(s.name||'Pomodoro')+' · '+mins+' min',
      detail:'',
      disc:null
    });
  });

  // NOVO: Fontes adicionadas recentemente
  (DATA.sources||[]).forEach(src=>{
    if(!src.createdAt||(now-src.createdAt)>TWO_DAYS)return;
    const cfg = (typeof SRC_TYPES!=='undefined'&&SRC_TYPES[src.type])||{label:'fonte',icon:'📚'};
    events.push({
      type:'source', at:src.createdAt,
      tone:'info',
      title:'Fonte adicionada',
      subject:`${cfg.icon||'📚'} ${src.name||'Sem nome'}`,
      detail:`${cfg.label||'fonte'} · ${(src.content?.length||0).toLocaleString('pt-BR')} caracteres`,
      disc:getDiscipline(src.disciplineId)
    });
  });

  // NOVO: Questões importadas (em lote) — agrupa por bloco temporal próximo
  // Aceita createdAt como fallback se importedAt não existir
  const recentImported = (DATA.importedQuestions||[]).filter(q=>{
    const t = q.importedAt || q.createdAt;
    return t && (now-t)<=TWO_DAYS && q.source!=='ai';
  });
  if(recentImported.length>0){
    const getT = q=>q.importedAt||q.createdAt||0;
    const byTimestamp = recentImported.slice().sort((a,b)=>getT(a)-getT(b));
    let currentGroup = null;
    const groups = [];
    byTimestamp.forEach(q=>{
      const t = getT(q);
      if(!currentGroup || (t - currentGroup.endTime) > 5*60*1000){
        currentGroup = {startTime:t, endTime:t, items:[q], discId:q.disciplineId};
        groups.push(currentGroup);
      } else {
        currentGroup.endTime = t;
        currentGroup.items.push(q);
      }
    });
    groups.forEach(g=>{
      events.push({
        type:'import', at:g.endTime,
        tone:'info',
        title:`${g.items.length} questão${g.items.length===1?'':'es'} importada${g.items.length===1?'':'s'}`,
        subject:'Banco de Questões',
        detail:'Importadas do TEC, prontas pra praticar',
        disc:getDiscipline(g.discId)
      });
    });
  }

  // NOVO: Geração de IA (questões/flashcards/análises a partir do usageLog)
  // Resumo único: "X conteúdos gerados pela IA hoje"
  const recentUsage = (DATA.usageLog||[]).filter(u=>u.at && (now-u.at)<=TWO_DAYS && u.kind);
  if(recentUsage.length>=5){
    const todayStart = new Date();todayStart.setHours(0,0,0,0);
    const todayUsage = recentUsage.filter(u=>u.at>=todayStart.getTime());
    if(todayUsage.length>=3){
      events.push({
        type:'ai-burst', at:todayUsage[todayUsage.length-1].at,
        tone:'purple',
        title:`${todayUsage.length} conteúdos gerados pela IA`,
        subject:'Atividade resumida',
        detail:`Questões, flashcards, análises e mais — tudo em ${todayUsage.length} chamadas hoje`,
        disc:null
      });
    }
  }

  // ===== FILTRO ATIVO =====
  if(!DATA.uiPrefs)DATA.uiPrefs = {};
  const filter = DATA.uiPrefs.timelineFilter || 'all';
  const filtered = filter==='all' ? events : events.filter(ev=>{
    if(filter==='errors')return ev.type==='error';
    if(filter==='cards')return ev.type==='card' || (ev.type==='error' && ev.chainedCard);
    if(filter==='study')return ev.type==='pomo' || ev.type==='source' || ev.type==='import';
    if(filter==='ai')return ev.type==='ai-burst';
    return true;
  });

  if(events.length===0){
    // Estado vazio elegante — convite a começar
    const emptyCard = mk('div','card activity-empty');
    const em = mk('div','ae-emoji');em.textContent='🌱';
    const t = mk('h3','ae-title');t.textContent='Sua linha do tempo aparece aqui';
    const d = mk('p','ae-desc');d.textContent='Conforme você pratica, erra, cria flashcards e foca — tudo é registrado aqui em ordem cronológica. Clique em qualquer evento pra voltar até ele.';
    emptyCard.appendChild(em);emptyCard.appendChild(t);emptyCard.appendChild(d);
    return emptyCard;
  }

  // Ordena mais recente primeiro
  filtered.sort((a,b)=>b.at-a.at);
  const shown = filtered.slice(0,10);

  // Agrupa em "Hoje" / "Ontem" / "Antes"
  const today = new Date();today.setHours(0,0,0,0);
  const yesterday = today.getTime() - DAY;
  const groups = {hoje:[], ontem:[], antes:[]};
  shown.forEach(ev=>{
    if(ev.at>=today.getTime())groups.hoje.push(ev);
    else if(ev.at>=yesterday)groups.ontem.push(ev);
    else groups.antes.push(ev);
  });

  // Monta card
  const card = mk('div','card activity-card-v2');
  const head = mk('div','activity-v2-head');
  const hLeft = mk('div');
  const hTitle = mk('h3','activity-v2-title');
  hTitle.innerHTML='<span class="av2-dot"></span>Linha do tempo';
  hLeft.appendChild(hTitle);
  const hSub = mk('p','activity-v2-sub');
  if(filter==='all'){
    hSub.textContent = shown.length+' evento'+(shown.length===1?'':'s')+' nas últimas 48h';
  } else {
    hSub.textContent = shown.length+' de '+events.length+' (filtrado)';
  }
  hLeft.appendChild(hSub);
  head.appendChild(hLeft);
  card.appendChild(head);

  // Filtros — pills compactos
  const filterRow = mk('div','av2-filters');
  const filterOptions = [
    {value:'all',label:'Tudo',icon:'🌐'},
    {value:'errors',label:'Erros',icon:'✗'},
    {value:'cards',label:'Flashcards',icon:'🎴'},
    {value:'study',label:'Estudo',icon:'📚'},
    {value:'ai',label:'IA',icon:'⚡'}
  ];
  filterOptions.forEach(opt=>{
    const pill = mk('button','av2-filter-pill'+(filter===opt.value?' active':''));
    pill.type='button';
    pill.innerHTML = `<span>${opt.icon}</span><span>${opt.label}</span>`;
    pill.addEventListener('click',()=>{
      DATA.uiPrefs.timelineFilter = opt.value;
      save();render();
    });
    filterRow.appendChild(pill);
  });
  card.appendChild(filterRow);

  const body = mk('div','activity-v2-body');

  if(shown.length===0){
    const empty = mk('div','av2-empty');
    empty.innerHTML = `<span class="av2e-emoji">🔍</span><span>Nenhum evento com este filtro nas últimas 48h.</span>`;
    body.appendChild(empty);
    card.appendChild(body);
    return card;
  }

  const groupLabels = {hoje:'Hoje', ontem:'Ontem', antes:'Antes'};
  let globalIdx = 0;
  ['hoje','ontem','antes'].forEach(g=>{
    if(groups[g].length===0)return;
    const groupLbl = mk('div','av2-group-lbl');groupLbl.textContent = groupLabels[g];
    body.appendChild(groupLbl);

    groups[g].forEach(ev=>{
      const item = buildTimelineItem(ev, globalIdx++);
      body.appendChild(item);
    });
  });

  card.appendChild(body);
  return card;
}

// Renderiza um item individual da timeline
function buildTimelineItem(ev, idx){
  const wrap = mk('div','av2-item tone-'+ev.tone);
  wrap.style.animationDelay = (idx*50)+'ms';

  // Gutter — ícone + linha conectora
  const gutter = mk('div','av2-gutter');
  const icon = mk('div','av2-icon');
  icon.textContent = ev.type==='error'?'✗':ev.type==='card'?'🎴':ev.type==='source'?'📚':ev.type==='import'?'📥':ev.type==='ai-burst'?'⚡':'⏱';
  gutter.appendChild(icon);
  wrap.appendChild(gutter);

  // Body do evento
  const body = mk('div','av2-body');

  // Linha superior: título + disciplina + tempo relativo
  const row1 = mk('div','av2-row1');
  const titleWrap = mk('div','av2-title-wrap');
  const title = mk('span','av2-title');title.textContent = ev.title;
  titleWrap.appendChild(title);
  if(ev.disc){
    const dTag = mk('span','av2-disc');
    dTag.style.cssText = 'background:'+ev.disc.color+'1f;color:'+ev.disc.color;
    dTag.textContent = ev.disc.name;
    titleWrap.appendChild(dTag);
  }
  row1.appendChild(titleWrap);
  const when = mk('span','av2-when');
  when.textContent = relativeTime(ev.at);
  when.title = new Date(ev.at).toLocaleString('pt-BR');
  row1.appendChild(when);
  body.appendChild(row1);

  // Subject (tópico/tema)
  if(ev.subject){
    const subj = mk('div','av2-subject');subj.textContent = ev.subject;
    body.appendChild(subj);
  }

  // Detail expansível (preview + expandir ao clicar)
  if(ev.detail){
    const det = mk('div','av2-detail');det.textContent = ev.detail;
    body.appendChild(det);
  }

  // Chain: se erro virou flashcard, mostra conexão visual embaixo
  if(ev.type==='error' && ev.chainedCard){
    const chain = mk('div','av2-chain');
    const chainIcon = mk('span','av2-chain-icon');chainIcon.textContent='↳';
    const chainText = mk('span','av2-chain-text');
    chainText.innerHTML = 'Virou flashcard · ';
    const chainLink = mk('button','av2-chain-link');
    chainLink.type='button';
    chainLink.textContent='ver card';
    chainLink.addEventListener('click',(e)=>{
      e.stopPropagation();
      navigateToCard(ev.chainedCard.id,{label:'Painel'});
    });
    chainText.appendChild(chainLink);
    chain.appendChild(chainIcon);
    chain.appendChild(chainText);
    body.appendChild(chain);
  }

  wrap.appendChild(body);

  // Clique no item todo = ir ao evento principal
  if(ev.type==='error' || ev.type==='card'){
    wrap.classList.add('av2-clickable');
    wrap.addEventListener('click',()=>{
      if(ev.type==='error')navigateToError(ev.errorId,{label:'Painel'});
      else navigateToCard(ev.cardId,{label:'Painel'});
    });
  }

  return wrap;
}

// Formatador de tempo relativo humano
function relativeTime(ts){
  const diff = Date.now() - ts;
  const sec = Math.floor(diff/1000);
  if(sec < 60)return 'agora';
  if(sec < 3600)return 'há '+Math.floor(sec/60)+' min';
  if(sec < 86400)return 'há '+Math.floor(sec/3600)+'h';
  const days = Math.floor(sec/86400);
  return 'há '+days+(days===1?' dia':' dias');
}

/* ==================================================
   SORT CONTROL — Toolbar de classificação reutilizável
   ==================================================
   Uso:
     buildSortControl({
       prefKey: 'historyOrder',           // chave em DATA.sortPrefs
       defaultValue: 'recent',
       options: [
         {value:'recent', label:'Mais recente', icon:'🕒'},
         {value:'oldest', label:'Mais antigo', icon:'⏳'},
         ...
       ],
       onChange: (newValue) => render()   // callback após escolha
     })
   Retorna um DOM element pronto pra adicionar.
*/
function buildSortControl(config){
  if(!DATA.sortPrefs)DATA.sortPrefs = {};
  const current = DATA.sortPrefs[config.prefKey] || config.defaultValue;
  const wrap = mk('div','sort-control');
  // Label do lado esquerdo
  const lbl = mk('span','sort-label');
  lbl.innerHTML = '<span class="sort-icon-main">⇅</span> <span>Ordenar</span>';
  wrap.appendChild(lbl);
  // Pills de opções
  const pills = mk('div','sort-pills');
  config.options.forEach(opt=>{
    const pill = mk('button','sort-pill'+(current===opt.value?' active':''));
    pill.type='button';
    pill.innerHTML = `<span class="sp-icon">${opt.icon||''}</span><span class="sp-lbl">${escapeHTML(opt.label)}</span>`;
    pill.title = opt.tip||opt.label;
    pill.addEventListener('click',()=>{
      DATA.sortPrefs[config.prefKey] = opt.value;
      save();
      if(typeof config.onChange==='function')config.onChange(opt.value);
      else render();
    });
    pills.appendChild(pill);
  });
  wrap.appendChild(pills);
  return wrap;
}

/* Aplica ordenação a um array. Retorna NOVO array (não muta original).
   `key` é o valor escolhido pelo usuário (ex: 'recent', 'discipline', 'recurrence').
   `getSortValue` é uma função que recebe (item, key) e retorna o valor para ordenar. */
function applySort(items, key, getSortValue){
  const arr = items.slice();
  // Cache values pra evitar recalcular durante sort
  const decorated = arr.map(it=>({it, val:getSortValue(it,key)}));
  decorated.sort((a,b)=>{
    const va=a.val, vb=b.val;
    if(va===vb)return 0;
    if(va===null||va===undefined)return 1;
    if(vb===null||vb===undefined)return -1;
    if(typeof va==='number'&&typeof vb==='number')return vb-va; // numérico desc
    return String(va).localeCompare(String(vb),'pt-BR'); // string asc
  });
  return decorated.map(d=>d.it);
}

  });
  wrap.appendChild(st);

  if(ST.srcSubview==='list')return renderSourceList(wrap);
  if(ST.srcSubview==='add')return renderSourceAdd(wrap);
  if(ST.srcSubview==='disc')return renderDisciplines(wrap);
  return wrap;
}

function renderSourceList(wrap){
  wrap.appendChild(sLabel('Disciplinas ativas (clique para ativar/desativar)'));
  const chips = mk('div','disc-filter');
  DATA.disciplines.forEach(d=>{
    const count = DATA.sources.filter(s=>s.disciplineId===d.id).length;
    const chip = mk('button','disc-chip'+(d.active?' on':''));
    if(d.active){chip.style.background=d.color+'22';chip.style.color=d.color;}
    const dot = mk('span','dot');dot.style.background=d.color;
    const nm = mk('span');nm.textContent=d.name;
    const cn = mk('span','count');cn.textContent=count;
    chip.appendChild(dot);chip.appendChild(nm);chip.appendChild(cn);
    chip.addEventListener('click',()=>{d.active=!d.active;save();render();});
    chips.appendChild(chip);
  });
  wrap.appendChild(chips);

  const total = DATA.sources.length;
  if(total===0){
    const info = mk('div','alert alert-info');
    info.textContent='Nenhuma fonte ainda. Clique em "Adicionar" para começar.';
    wrap.appendChild(info);return wrap;
  }
  const activeCount = activeSources().length;
  const chars = activeSources().reduce((a,s)=>a+s.content.length,0);
  const stats = mk('div','flex');stats.style.gap='1rem';stats.style.marginBottom='.875rem';stats.style.fontSize='12.5px';
  stats.innerHTML=`<span class="txt3">Total:</span> <b>${total}</b> · <span class="txt3">Ativas:</span> <b>${activeCount}</b> (${(chars/1000).toFixed(1)}k chars)`;
  wrap.appendChild(stats);

  // Filtros por metadata (só aparecem se houver diversidade)
  if(DATA.sources.length>=3){
    const filterRow = mk('div','src-filters');
    // Tipo de material
    const typesUsed = [...new Set(DATA.sources.map(s=>s.type).filter(Boolean))];
    if(typesUsed.length>1){
      const cf = ST.srcFilterType||'all';
      const sel1 = mk('select');sel1.style.cssText='font-size:12px;padding:4px 8px;max-width:180px';
      const oAll1 = mk('option');oAll1.value='all';oAll1.textContent='Todos os tipos';
      if(cf==='all')oAll1.selected=true;
      sel1.appendChild(oAll1);
      typesUsed.forEach(t=>{
        const o = mk('option');o.value=t;o.textContent=(SRC_TYPES[t]?.icon||'')+' '+(SRC_TYPES[t]?.label||t);
        if(cf===t)o.selected=true;
        sel1.appendChild(o);
      });
      sel1.addEventListener('change',e=>{ST.srcFilterType=e.target.value;render();});
      filterRow.appendChild(sel1);
    }
    // Tipo de conteúdo
    const ctsUsed = [...new Set(DATA.sources.map(s=>s.contentType||'misto').filter(Boolean))];
    if(ctsUsed.length>1){
      const cf2 = ST.srcFilterContent||'all';
      const sel2 = mk('select');sel2.style.cssText='font-size:12px;padding:4px 8px;max-width:180px';
      const oAll2 = mk('option');oAll2.value='all';oAll2.textContent='Todo conteúdo';
      if(cf2==='all')oAll2.selected=true;
      sel2.appendChild(oAll2);
      ctsUsed.forEach(ct=>{
        const o = mk('option');o.value=ct;o.textContent=CONTENT_TYPES[ct]?.label||ct;
        if(cf2===ct)o.selected=true;
        sel2.appendChild(o);
      });
      sel2.addEventListener('change',e=>{ST.srcFilterContent=e.target.value;render();});
      filterRow.appendChild(sel2);
    }
    wrap.appendChild(filterRow);
  }

  const list = mk('div','src-list');
  const srcFilterType = ST.srcFilterType||'all';
  const srcFilterContent = ST.srcFilterContent||'all';
  const filteredSources = DATA.sources.filter(s=>{
    if(srcFilterType!=='all' && s.type!==srcFilterType)return false;
    if(srcFilterContent!=='all' && (s.contentType||'misto')!==srcFilterContent)return false;
    return true;
  });
  filteredSources.forEach(src=>{
    const cfg = SRC_TYPES[src.type]||SRC_TYPES.outro;
    const ctCfg = CONTENT_TYPES[src.contentType||'misto']||CONTENT_TYPES.misto;
    const disc = getDiscipline(src.disciplineId);
    const isActive = !disc||disc.active;
    const item = mk('div','src-item');
    if(!isActive)item.style.opacity='.45';
    // Highlight se viemos do Mapa clicando em "Ver na fonte"
    const scrollTo = ST.sourceScrollTo;
    const isHighlighted = scrollTo && scrollTo.sourceId===src.id;
    if(isHighlighted){
      item.classList.add('card-highlighted');
      setTimeout(()=>{item.scrollIntoView({behavior:'smooth',block:'center'});},60);
    }
    const ic = mk('div','src-icon');ic.style.background=cfg.bg;ic.style.color=cfg.color;ic.textContent=cfg.icon;
    const info = mk('div','src-info');
    const name = mk('div','src-name');name.textContent=src.name;
    const meta = mk('div','src-meta');
    const mt1 = mk('span');mt1.textContent=`${cfg.label} · ${(src.content.length/1000).toFixed(1)}k chars`;
    meta.appendChild(mt1);
    // Tipo de conteúdo
    if(src.contentType && src.contentType!=='misto'){
      const ctTag = mk('span','src-meta-tag');
      ctTag.textContent = (ctCfg.icon||'') + ' ' + ctCfg.label.replace(/^[^\s]+\s/,'');
      ctTag.title='Tipo de conteúdo';
      meta.appendChild(ctTag);
    }
    // Data do material
    if(src.materialDate){
      const dt = mk('span','src-meta-tag');
      const [y,m] = src.materialDate.split('-');
      dt.textContent = '📅 '+(m?m+'/'+y:y);
      dt.title='Data do material';
      meta.appendChild(dt);
    }
    if(disc){
      const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
      const dot = mk('span','disc-dot');dot.style.background=disc.color;
      const dn = mk('span');dn.textContent=disc.name;
      dTag.appendChild(dot);dTag.appendChild(dn);
      meta.appendChild(dTag);
    }
    info.appendChild(name);info.appendChild(meta);
    // Preview do trecho quando navegou do Mapa
    if(isHighlighted && scrollTo.position !== undefined && scrollTo.position < Infinity){
      const excerpt = mk('div','src-excerpt');
      // Janela maior, ajustada pra início de frase quando possível
      let start = Math.max(0, scrollTo.position - 150);
      let end = Math.min(src.content.length, scrollTo.position + 600);
      // Tenta começar logo após uma quebra de linha ou ponto final próximo
      const beforeChunk = src.content.slice(start, scrollTo.position);
      const lastBreak = Math.max(beforeChunk.lastIndexOf('\n\n'), beforeChunk.lastIndexOf('. '));
      if(lastBreak > 30){
        start = start + lastBreak + 2;
      }
      // Tenta terminar no fim de uma frase
      const afterChunk = src.content.slice(scrollTo.position, end);
      const periodIdx = afterChunk.lastIndexOf('. ');
      if(periodIdx > 200){
        end = scrollTo.position + periodIdx + 1;
      }
      const textChunk = src.content.slice(start, end).trim();
      let highlighted = escapeHTML(textChunk);
      const variants = scrollTo.variants||[scrollTo.topicName];
      variants.forEach(v=>{
        if(!v || v.length<3)return;
        const re = new RegExp(v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
        highlighted = highlighted.replace(re, m=>`<mark>${escapeHTML(m)}</mark>`);
      });
      const prefix = start > 0 ? '...' : '';
      const suffix = end < src.content.length ? '...' : '';
      excerpt.innerHTML = `<span class="src-excerpt-lbl">📍 Trecho onde "${escapeHTML(scrollTo.topicName)}" aparece:</span><div class="src-excerpt-text">${prefix}${highlighted}${suffix}</div>`;
      info.appendChild(excerpt);
      setTimeout(()=>{delete ST.sourceScrollTo;},5000);
    }
    const actions = mk('div','flex');actions.style.gap='2px';
    const edit = mkBtn('✏️','icon-btn');
    edit.addEventListener('click',()=>showEditSourceModal(src));
    const del = mkBtn('×','icon-btn del');
    del.addEventListener('click',()=>{if(confirm('Remover "'+src.name+'"?')){DATA.sources=DATA.sources.filter(x=>x.id!==src.id);save();render();}});
    actions.appendChild(edit);actions.appendChild(del);
    item.appendChild(ic);item.appendChild(info);item.appendChild(actions);
    list.appendChild(item);
  });
  if(filteredSources.length===0 && DATA.sources.length>0){
    list.appendChild(infoBox('Nenhuma fonte corresponde aos filtros aplicados.'));
  }
  wrap.appendChild(list);
  return wrap;
}

function renderSourceAdd(wrap){

  if(!ST.srcImportState)ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null,justSavedId:null,pdfProgress:null};

  // ---------- Stage 1: Post-import success panel (if just saved) ----------

    if(src){
      const successCard = mk('div','card');successCard.style.borderLeft='4px solid var(--accent)';

      successCard.appendChild(t);

      sub.textContent=`"${src.name}" foi adicionada ao material de estudo. Aproveite para aplicar logo:`;
      successCard.appendChild(sub);

      const actionsGrid = mk('div','quick-actions-grid');
      const mkAction = (icon,label,desc,onClick)=>{
        const b = mk('button','quick-action');
        b.innerHTML = `<div class="qa-icon">${icon}</div><div class="qa-body"><b>${label}</b><span>${desc}</span></div>`;
        b.addEventListener('click',onClick);

      };
      actionsGrid.appendChild(mkAction('🎴','Gerar flashcards','Cards prontos para revisão em SRS',()=>{
        ST.srcImportState = {mode:'form',organizing:false,pdfLoading:false,organizedResult:null};

      actionsGrid.appendChild(mkAction('📝','Praticar questões','Questões C/E no estilo da banca',()=>{

        ST.view='practice';render();
      }));
      actionsGrid.appendChild(mkAction('🗺️','Ver na matéria','Entender onde este conteúdo se encaixa',()=>{

      const skip = mkBtn('Adicionar outra fonte','btn btn-sm');skip.style.marginTop='.75rem';

      successCard.appendChild(skip);

    reviewCard.appendChild(rsub);

    // Topics found
    if(r.topics&&r.topics.length>0){

      reviewCard.appendChild(tLbl);
      const pills = mk('div');pills.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.875rem';
      r.topics.slice(0,15).forEach(t=>{
        const p = mk('span','topic-tag');p.textContent=t;p.style.marginBottom='0';

    }

    // Classification — show if present
    if(r.classification){

        const disc = getDiscipline(c.disciplineId);
        if(disc){
          const dTag = mk('span','badge');dTag.style.cssText=`background:${disc.color}22;color:${disc.color}`;
          dTag.innerHTML = `💡 Sugerida: <b>${disc.name}</b>`;
          classRow.appendChild(dTag);
        }
      }
      if(c.contentType&&CONTENT_TYPES[c.contentType]){

        ctTag.innerHTML = `💡 Tipo: <b>${CONTENT_TYPES[c.contentType].label}</b>`;
        classRow.appendChild(ctTag);
      }
      if(classRow.children.length>0)reviewCard.appendChild(classRow);
    }

    // Editable fields
    const fLbl = mk('label');fLbl.textContent='Nome da fonte';fLbl.style.marginTop='.5rem';
    const fInp = mk('input');fInp.type='text';fInp.value=ST.srcInput.name||'';
    fInp.addEventListener('input',e=>{ST.srcInput.name=e.target.value;});
    reviewCard.appendChild(fLbl);reviewCard.appendChild(fInp);

    const dLbl = mk('label');dLbl.textContent='Disciplina';dLbl.style.marginTop='.75rem';
    const dSel = mk('select');
    DATA.disciplines.forEach(d=>{
      const o = mk('option');o.value=d.id;o.textContent=d.name;
      if(ST.srcInput.disciplineId===d.id)o.selected=true;
      dSel.appendChild(o);
    });
    dSel.addEventListener('change',e=>{ST.srcInput.disciplineId=e.target.value;});
    reviewCard.appendChild(dLbl);reviewCard.appendChild(dSel);

    const ctSel = mk('select');
    Object.entries(CONTENT_TYPES).forEach(([k,v])=>{
      const o = mk('option');o.value=k;o.textContent=v.label;
      if((ST.srcInput.contentType||'misto')===k)o.selected=true;

    const btnRow = mk('div','flex');btnRow.style.cssText='gap:8px;margin-top:1rem;flex-wrap:wrap';
    const confirmBtn = mkBtn('✓ Salvar fonte','btn btn-p');
    confirmBtn.addEventListener('click',()=>{
      const newSrc = {
        id:Date.now()+''+Math.random(),
        name:(ST.srcInput.name||'Nova fonte').trim(),
        type:ST.srcInput.type||'relatorio',
        contentType:ST.srcInput.contentType||'misto',
        materialDate:ST.srcInput.materialDate||null,
        disciplineId:ST.srcInput.disciplineId,
        content:(ST.srcInput.content||r.organized||'').trim(),
        topics:r.topics||[],
        createdAt:Date.now(),

      };
      DATA.sources.push(newSrc);
      save();
      ST.srcInput={name:'',type:'relatorio',contentType:'misto',content:'',disciplineId:ST.srcInput.disciplineId};
      ST.srcImportState = {mode:'saved',justSavedId:newSrc.id,organizing:false,pdfLoading:false,organizedResult:null};
      render();

    const file = e.target.files[0];if(!file)return;
    ST.srcImportState.pdfLoading = true;

    try{
      const text = await extractPdfText(file,(curr,total)=>{
        ST.srcImportState.pdfProgress = {current:curr,total};

  // Data do material — ajuda a identificar material desatualizado

  const lblC = mk('label');lblC.textContent='Conteúdo';lblC.style.marginTop='.75rem';
  const ta = mk('textarea');ta.rows=8;

function handleErr(e,container){
  console.error('NEXUS error:',e);
  const msg = e.message||String(e);
  let text = 'Erro ao conectar com a IA.';
  if(msg.includes('no-content'))text='⚠ Adicione fontes em "Fontes" e ative ao menos uma disciplina.';
  else if(msg.includes('no-key'))text='⚠ Chave API não configurada. Vá em "Config" e cole sua chave.';
  else if(msg.includes('network'))text='⚠ Falha de rede ou CORS. Veja o console do navegador (F12) para detalhes.';
  else if(msg.includes('api-401')||msg.includes('api-403'))text='⚠ Chave API inválida ou sem crédito. Confira em console.anthropic.com.';
  else if(msg.includes('api-404'))text='⚠ Modelo não encontrado. Vá em Config e selecione outro modelo (sugestão: claude-haiku-4-5-20251001).';
  else if(msg.includes('api-429'))text='⚠ Limite de requisições atingido. Aguarde alguns segundos.';
  else if(msg.includes('api-'))text='⚠ Erro da API: '+msg.replace('api-','').slice(0,200);
  else if(msg.includes('JSON')||msg.includes('parse'))text='⚠ A IA retornou resposta inválida. Tente novamente.';
  else text='⚠ '+msg.slice(0,250);

  // Always log to DOM if container provided, and also store as last error for persistent banner
  ST.lastError = {text, at: Date.now()};
  if(container&&container.appendChild){
    container.appendChild(errorBox(text));
  } else {
    alert(text);
  }
}
