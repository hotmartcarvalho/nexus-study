/* QUESTION BANK — unified across imported and AI-generated questions */
function questionBank(){return DATA.importedQuestions||[];}

/* Bank filtering — shared between Banco and "Adicionar do banco" no caderno */
// Filter state shape:
// { disc:'all'|id, source:'all'|'imported'|'ai', kind:'all'|'CE'|'MC',
//   banca:'all'|<nome>, cargo:'all'|<nome>, perf:'all'|'never'|'high'|'low', search:'' }

// Extract banca (e.g. "CEBRASPE (CESPE)") from TEC-style meta header
// Header format typical: "CEBRASPE (CESPE) - AJ (TJ PA)/TJ PA/Comunicação Social/2025"
function extractBanca(meta){
  if(!meta)return '';
  const firstPart = meta.split(/\s-\s/)[0].trim();
  return firstPart.replace(/\s+/g,' ');
}
// Extract cargo (everything after the first " - ")
function extractCargo(meta){
  if(!meta)return '';
  const dash = meta.indexOf(' - ');
  if(dash<0)return '';
  const rest = meta.slice(dash+3).trim();
  // Usually "CARGO (ORG)/ORG/Área/Ano"  — pick the first segment (cargo)
  const firstSeg = rest.split('/')[0].trim();
  return firstSeg;
}

function getBankFilters(stateKey){
  if(!ST[stateKey])ST[stateKey]={disc:'all',source:'all',kind:'all',banca:'all',cargo:'all',topic:'all',perf:'all',search:''};
  // migrate old shape with "meta" to new shape
  if(ST[stateKey].meta!==undefined){
    delete ST[stateKey].meta;
    if(!ST[stateKey].banca)ST[stateKey].banca='all';
    if(!ST[stateKey].cargo)ST[stateKey].cargo='all';
  }
  if(ST[stateKey].topic===undefined)ST[stateKey].topic='all';
  return ST[stateKey];
}
function applyBankFilters(bank,f){
  let r = bank;
  if(f.disc!=='all')r = r.filter(q=>q.disciplineId===f.disc);
  if(f.source!=='all')r = r.filter(q=>(q.source||'imported')===f.source);
  if(f.kind!=='all')r = r.filter(q=>(q.kind||'CE')===f.kind);
  if(f.banca&&f.banca!=='all')r = r.filter(q=>extractBanca(q.meta)===f.banca);
  if(f.cargo&&f.cargo!=='all')r = r.filter(q=>extractCargo(q.meta)===f.cargo);
  // Topic filter — matches against q.topic field (not enunciado)
  if(f.topic&&f.topic!=='all'){
    const target = normTopic(f.topic);
    r = r.filter(q=>normTopic(q.topic||'')===target);
  }
  if(f.perf==='never')r = r.filter(q=>!q.attempts);
  else if(f.perf==='high')r = r.filter(q=>q.attempts>0 && (q.correctCount||0)/q.attempts>=0.7);
  else if(f.perf==='low')r = r.filter(q=>q.attempts>0 && (q.correctCount||0)/q.attempts<0.5);
  if(f.search&&f.search.trim()){
    const t = f.search.toLowerCase().trim();
    r = r.filter(q=>(q.enunciado||'').toLowerCase().includes(t));
  }
  return r;
}
// Build the filter UI. Returns the element. Updates `f` and re-renders on change.
function renderBankFilters(stateKey,bank){
  const f = getBankFilters(stateKey);
  const wrap = mk('div','bank-filters');

  // Search box — debounced + focus preservation
  const searchRow = mk('div');searchRow.style.marginBottom='.5rem';
  const searchInp = mk('input');searchInp.type='text';
  searchInp.id='bank-search-'+stateKey;  // stable id to re-find after render
  searchInp.placeholder='🔎 Buscar no enunciado...';
  searchInp.value=f.search||'';
  searchInp.autocomplete='off';
  searchInp.addEventListener('input',e=>{
    f.search=e.target.value;
    if(ST._bankSearchTimer)clearTimeout(ST._bankSearchTimer);
    // Remember cursor + focus to restore after re-render
    ST._bankSearchFocus = {id:searchInp.id, selStart:e.target.selectionStart};
    ST._bankSearchTimer = setTimeout(()=>render(),500);
  });
  searchRow.appendChild(searchInp);
  wrap.appendChild(searchRow);
  // After DOM is placed, restore focus if this was the focused search input
  if(ST._bankSearchFocus&&ST._bankSearchFocus.id===searchInp.id){
    setTimeout(()=>{
      const el = document.getElementById(searchInp.id);
      if(el){
        el.focus();
        try{el.setSelectionRange(ST._bankSearchFocus.selStart,ST._bankSearchFocus.selStart);}catch(_){}
      }
      ST._bankSearchFocus = null;
    },0);
  }

  // Filter chips row
  const chipRows = mk('div');chipRows.style.cssText='display:flex;flex-direction:column;gap:.4rem';

  const buildChipGroup = (label,key,options) => {
    const row = mk('div','filter-row');
    const lbl = mk('span','filter-row-lbl');lbl.textContent=label;
    row.appendChild(lbl);
    options.forEach(([val,text,count])=>{
      const isOn = f[key]===val;
      const chip = mk('button','filter-chip'+(isOn?' on':''));
      chip.innerHTML = text + (count!==undefined?` <span class="count">${count}</span>`:'');
      chip.addEventListener('click',()=>{f[key]=val;render();});
      row.appendChild(chip);
    });
    return row;
  };

  // Source filter
  const aiCount = bank.filter(q=>q.source==='ai').length;
  const importedCount = bank.length - aiCount;
  chipRows.appendChild(buildChipGroup('Origem','source',[
    ['all','Todas',bank.length],
    ['imported','📋 TEC',importedCount],
    ['ai','🤖 IA',aiCount]
  ]));

  // Kind filter
  const ceCount = bank.filter(q=>(q.kind||'CE')==='CE').length;
  const mcCount = bank.length - ceCount;
  chipRows.appendChild(buildChipGroup('Tipo','kind',[
    ['all','Todos',bank.length],
    ['CE','C/E',ceCount],
    ['MC','Múltipla',mcCount]
  ]));

  // Discipline filter
  const actDiscs = activeDisciplines();
  const discsWithQ = actDiscs.filter(d=>bank.some(q=>q.disciplineId===d.id));
  if(discsWithQ.length>=2){
    const opts = [['all','Todas',bank.length]].concat(discsWithQ.map(d=>{
      const cnt = bank.filter(q=>q.disciplineId===d.id).length;
      return [d.id,d.name,cnt];
    }));
    chipRows.appendChild(buildChipGroup('Disciplina','disc',opts));
  }

  // Performance filter
  const neverCnt = bank.filter(q=>!q.attempts).length;
  const highCnt = bank.filter(q=>q.attempts>0&&(q.correctCount||0)/q.attempts>=0.7).length;
  const lowCnt = bank.filter(q=>q.attempts>0&&(q.correctCount||0)/q.attempts<0.5).length;
  chipRows.appendChild(buildChipGroup('Desempenho','perf',[
    ['all','Todas'],
    ['never','Nunca praticadas',neverCnt],
    ['high','Acerto ≥70%',highCnt],
    ['low','Acerto <50%',lowCnt]
  ]));

  // Banca filter (separate from cargo)
  const bancas = {};
  bank.forEach(q=>{const b=extractBanca(q.meta);if(b)bancas[b]=(bancas[b]||0)+1;});
  const bancasList = Object.entries(bancas).sort((a,b)=>b[1]-a[1]);
  if(bancasList.length>=2){
    const bRow = mk('div','filter-row');
    const lbl = mk('span','filter-row-lbl');lbl.textContent='Banca';
    bRow.appendChild(lbl);
    const sel = mk('select');sel.style.cssText='width:auto;flex:1;padding:5px 8px;font-size:11.5px;max-width:260px';
    const oAll = mk('option');oAll.value='all';oAll.textContent=`Todas (${bancasList.length})`;
    if(f.banca==='all')oAll.selected=true;
    sel.appendChild(oAll);
    bancasList.forEach(([b,cnt])=>{
      const o = mk('option');o.value=b;o.textContent=`${b} (${cnt})`;
      if(f.banca===b)o.selected=true;
      sel.appendChild(o);
    });
    sel.addEventListener('change',e=>{f.banca=e.target.value;render();});
    bRow.appendChild(sel);
    chipRows.appendChild(bRow);
  }

  // Cargo filter (separate)
  const cargos = {};
  const cargoSourceBank = f.banca&&f.banca!=='all' ? bank.filter(q=>extractBanca(q.meta)===f.banca) : bank;
  cargoSourceBank.forEach(q=>{const c=extractCargo(q.meta);if(c)cargos[c]=(cargos[c]||0)+1;});
  const cargosList = Object.entries(cargos).sort((a,b)=>b[1]-a[1]);
  if(cargosList.length>=2){
    const cRow = mk('div','filter-row');
    const lbl = mk('span','filter-row-lbl');lbl.textContent='Cargo';
    cRow.appendChild(lbl);
    const sel = mk('select');sel.style.cssText='width:auto;flex:1;padding:5px 8px;font-size:11.5px;max-width:260px';
    const oAll = mk('option');oAll.value='all';oAll.textContent=`Todos (${cargosList.length})`;
    if(f.cargo==='all')oAll.selected=true;
    sel.appendChild(oAll);
    cargosList.forEach(([c,cnt])=>{
      const o = mk('option');o.value=c;o.textContent=`${c.slice(0,48)}${c.length>48?'...':''} (${cnt})`;
      if(f.cargo===c)o.selected=true;
      sel.appendChild(o);
    });
    sel.addEventListener('change',e=>{f.cargo=e.target.value;render();});
    cRow.appendChild(sel);
    chipRows.appendChild(cRow);
  }

  // Active topic filter — show as removable chip above other filters
  if(f.topic&&f.topic!=='all'){
    const tRow = mk('div','filter-row');
    const tLbl = mk('span','filter-row-lbl');tLbl.textContent='Tópico';
    tRow.appendChild(tLbl);
    const chip = mk('span','filter-chip on');
    chip.innerHTML = `<b>${escapeHTML(f.topic)}</b> ✕`;
    chip.title = 'Remover filtro de tópico';
    chip.addEventListener('click',()=>{f.topic='all';render();});
    tRow.appendChild(chip);
    chipRows.insertBefore(tRow,chipRows.firstChild);
  }

  wrap.appendChild(chipRows);

  // Clear filters button (only if any filter is active)
  const anyActive = f.disc!=='all'||f.source!=='all'||f.kind!=='all'||f.banca!=='all'||f.cargo!=='all'||(f.topic&&f.topic!=='all')||f.perf!=='all'||(f.search||'').trim();
  if(anyActive){
    const clr = mkBtn('✕ Limpar filtros','btn btn-sm');clr.style.marginTop='.5rem';
    clr.addEventListener('click',()=>{ST[stateKey]={disc:'all',source:'all',kind:'all',banca:'all',cargo:'all',topic:'all',perf:'all',search:''};render();});
    wrap.appendChild(clr);
  }

  return wrap;
}

// Save AI-generated question to bank if not already there.
// Returns the bank record (with stable id). Used both for dedup detection later
// and for notebook organization.
function saveAIQuestion(method,q,modelId){
  if(!q||!q.question)return null;
  if(!DATA.importedQuestions)DATA.importedQuestions=[];
  // Detect duplicates by enunciado normalized (lowercase, collapsed spaces)
  const norm = s=>(s||'').toLowerCase().replace(/\s+/g,' ').trim();
  const target = norm(q.question);
  if(target.length<20)return null;
  const existing = DATA.importedQuestions.find(x=>norm(x.enunciado)===target);
  if(existing){
    // Increment seenCount so AI seeding can avoid repeat
    existing.seenCount = (existing.seenCount||1)+1;
    save();return existing;
  }
  const rec = {
    id:Date.now()+''+Math.random(),
    enunciado:q.question,
    answer:q.correct_answer,
    kind:'CE',
    disciplineId:inferDiscipline(q.topic||''),
    topic:q.topic||'',
    source:'ai',
    aiMethod:method,
    aiModel:modelId||DATA.config.model,
    explanation:q.explanation||'',
    trap:q.trap||'',
    keyword:q.keyword||'',
    trapType:q.trap_type||0,
    createdAt:Date.now(),
    seenCount:1,
    attempts:0,correctCount:0
  };
  DATA.importedQuestions.push(rec);
  if(DATA.importedQuestions.length>1500)DATA.importedQuestions=DATA.importedQuestions.slice(-1500);
  save();return rec;
}
// Returns short list of recent AI question enunciados for a method (for prompt seeding)
function recentAIQuestionsFor(method,limit){
  return (DATA.importedQuestions||[])
    .filter(q=>q.source==='ai'&&q.aiMethod===method)
    .slice(-(limit||10))
    .map(q=>q.enunciado.slice(0,160));
}
// Builds a "do not repeat" instruction for the AI based on recent generations
function avoidRepeatPrompt(method){
  const recent = recentAIQuestionsFor(method,12);
  if(recent.length===0)return '';
  return '\n\nIMPORTANTE — Não repita estas questões já feitas (parafraseie ou aborde outro ângulo):\n'+recent.map((t,i)=>`${i+1}. ${t}`).join('\n');
}

function logError(ctx){
  const err = {
    id:Date.now()+''+Math.random(),
    question:ctx.question,
    correctAnswer:ctx.correct_answer,
    explanation:ctx.explanation,
    trap:ctx.trap,
    keyword:ctx.keyword,
    trapType:ctx.trap_type,
    topic:ctx.topic,
    disciplineId:inferDiscipline(ctx.topic||''),
    method:ctx.method,
    date:Date.now(),
    hasCard:false
  };
  DATA.errors.push(err);
  if(DATA.errors.length>150)DATA.errors=DATA.errors.slice(-150);
  save();
  // Start prefetching flashcard in background (fires and forgets).
  // When user clicks "Criar flashcard", it'll be ready. If they don't click,
  // the cache entry is discarded on next error or page navigation.
  try{
    if(err.explanation&&err.correctAnswer){
      prefetchErrorCard(err);
    }
  }catch(e){/* swallow — prefetch is best-effort */}
  return err;
}

/* ERROR PRIORITIZATION — recência pesa mais que antiguidade */
// Weight decays by age in hours. Recent = higher score.
// 0-1h: 100, 1-6h: 80, 6-24h: 60, 1-3d: 40, 3-7d: 20, >7d: 10
function errorWeight(err){
  const age = Date.now()-(err.date||0);
  const H = 60*60*1000;
  if(age<=1*H)return 100;
  if(age<=6*H)return 80;
  if(age<=24*H)return 60;
  if(age<=3*24*H)return 40;
  if(age<=7*24*H)return 20;
  return 10;
}
// Sort errors most-recent-first (newest date first). Stable on date ties.
function sortByRecency(errors){
  return [...errors].sort((a,b)=>(b.date||0)-(a.date||0));
}
// Prioritize errors for review/card generation/question seeding.
// Returns most-recent-first, filtered by hasCard if onlyNoCard=true.
function prioritizedErrors(onlyNoCard){
  const src = onlyNoCard?(DATA.errors||[]).filter(e=>!e.hasCard):(DATA.errors||[]);
  return sortByRecency(src);
}

// Clean TEC Concursos PDF export artifacts.
// The PDF has: title line, QR code (appears as noisy chars), folder name, URL,
// "Ordenação: ..." line, then questions. Questions have URL prefix
// "www.tecconcursos.com.br/questoes/XXXX" — we anchor on that.
function cleanTecPdfText(text){
  if(!text)return '';
  let t = text;
  // Normalize whitespace — collapse weird unicode spaces and multiple blanks
  t = t.replace(/[\u00a0\u2000-\u200b\ufeff]/g,' ');
  // Remove lines that look like header noise (before the first question URL)
  const firstQIdx = t.search(/(?:www\.)?tecconcursos\.com\.br\/questoes\/\d+/i);
  let header = '', body = t;
  if(firstQIdx>0){
    header = t.slice(0,firstQIdx);
    body = t.slice(firstQIdx);
  }
  // Strip obvious header lines from the header region
  const headerKill = [
    /Crimin\.?\s*\|?.*$/gmi,          // folder name e.g. "Crimin. | Balística Forense"
    /https?:\/\/www\.tecconcursos\.com\.br\/s\/[A-Za-z0-9]+/gi,
    /Ordenação:.*$/gmi,
    /tecconcursos/gi,
    /^\s*[\|\u2502]+\s*$/gm,           // lone pipe chars
  ];
  headerKill.forEach(re=>{header=header.replace(re,'');});
  // Clean body: remove repeated TEC branding lines that sometimes appear between questions
  const bodyKill = [
    /Ordenação:\s*Por Matéria e Assunto/gi,
    /^\s*tecconcursos\s*$/gmi,
    /^\s*Página \d+ de \d+\s*$/gmi,
    /https?:\/\/www\.tecconcursos\.com\.br\/s\/[A-Za-z0-9]+/gi,
  ];
  bodyKill.forEach(re=>{body=body.replace(re,'');});
  // Collapse 3+ blank lines to 2
  let cleaned = (header + body).replace(/\n{3,}/g,'\n\n');
  // Trim spaces on each line
  cleaned = cleaned.split('\n').map(l=>l.replace(/[ \t]+/g,' ').trim()).join('\n');
  // Remove leading/trailing blank lines
  cleaned = cleaned.replace(/^\s+|\s+$/g,'');
  return cleaned;
}

function parseImportedQuestions(raw){
  if(!raw||!raw.trim())return [];
  const text = raw.replace(/\r\n/g,'\n').trim();

  // Detect TEC format: presence of tecconcursos.com.br URLs
  const hasTecUrls = /tecconcursos\.com\.br\/questoes\/\d+/i.test(text);

  if(hasTecUrls){
    return parseTecFormat(text);
  }
  return parseSimpleFormat(text);
}

function parseTecFormat(text){
  // Split by URLs — each URL starts a new question block
  const URL_RE = /(?:https?:\/\/)?(?:www\.)?tecconcursos\.com\.br\/questoes\/\d+/gi;
  // Find all URL positions
  const matches = [];
  let m;
  while((m = URL_RE.exec(text)) !== null){
    matches.push({start:m.index,end:m.index+m[0].length,url:m[0]});
  }
  if(matches.length===0)return parseSimpleFormat(text);

  const out = [];
  for(let i=0;i<matches.length;i++){
    const blockStart = matches[i].end;
    const blockEnd = i<matches.length-1 ? matches[i+1].start : text.length;
    const block = text.slice(blockStart,blockEnd).trim();
    const parsed = parseTecBlock(block, matches[i].url);
    if(parsed)out.push(parsed);
  }
  return out;
}

function parseTecBlock(block, sourceUrl){
  const lines = block.split('\n').map(l=>l.trim());
  // Line 0 (or first non-empty): banca/cabeçalho tipo "CEBRASPE (CESPE) - AJ (TJ PA)/..."
  // Line 1: Matéria/tópico
  // Line 2: Número da questão como "1) " ou "33) "
  // Linhas seguintes: enunciado (até alternativas ou "Certo/Errado")
  // Alternativas: "a) ..." até "e) ..."
  // Ou: "Certo\nErrado"
  // Última linha: "Gabarito: X"

  // Extract metadata
  const metaHeader = lines.find(l=>l&&/[A-Z]{3,}/.test(l)&&(l.includes('-')||l.includes('/'))) || '';
  const metaTopic = lines[lines.indexOf(metaHeader)+1] || '';

  // Find "Gabarito:" line
  const gabLineIdx = lines.findIndex(l=>/^gabarito\s*[:=]/i.test(l));
  if(gabLineIdx===-1)return null;
  const gabLine = lines[gabLineIdx];
  const gabMatch = gabLine.match(/gabarito\s*[:=]\s*(.+)$/i);
  if(!gabMatch)return null;
  const gabRaw = gabMatch[1].trim().toLowerCase();

  // Determine question type: C/E or multiple choice
  const hasCertoErrado = lines.slice(0,gabLineIdx).some(l=>/^certo$/i.test(l)) &&
                         lines.slice(0,gabLineIdx).some(l=>/^errado$/i.test(l));
  const ALT_RE = /^([a-e])\s*\)/i;
  const altLineIdxs = [];
  for(let i=0;i<gabLineIdx;i++){
    if(ALT_RE.test(lines[i]))altLineIdxs.push(i);
  }

  // Find "N)" question number line to locate enunciado start
  const numLineIdx = lines.findIndex(l=>/^\d+\s*\)\s*$/.test(l)||/^\d+\s*\)/.test(l));
  const enunStart = numLineIdx!==-1 ? numLineIdx+1 : 0;

  if(hasCertoErrado && altLineIdxs.length===0){
    // C/E question
    const certoIdx = lines.findIndex((l,i)=>i>=enunStart&&/^certo$/i.test(l));
    const enunEnd = certoIdx!==-1 ? certoIdx : gabLineIdx;
    const enunciado = lines.slice(enunStart,enunEnd).filter(Boolean).join('\n').trim();
    const answer = gabRaw.startsWith('c')||gabRaw.startsWith('v')?'C':'E';
    if(enunciado.length<20)return null;
    return {
      enunciado,
      answer,
      kind:'CE',
      meta:metaHeader,
      topic:metaTopic,
      source:sourceUrl
    };
  }

  if(altLineIdxs.length>=2){
    // Multiple choice
    const firstAltIdx = altLineIdxs[0];
    const enunciado = lines.slice(enunStart,firstAltIdx).filter(Boolean).join('\n').trim();
    // Extract alternatives
    const alts = [];
    for(let i=0;i<altLineIdxs.length;i++){
      const idx = altLineIdxs[i];
      const next = i<altLineIdxs.length-1 ? altLineIdxs[i+1] : gabLineIdx;
      const altText = lines.slice(idx,next).filter(Boolean).join(' ').trim();
      const letterMatch = altText.match(/^([a-e])\s*\)\s*(.+)$/i);
      if(letterMatch){
        alts.push({letter:letterMatch[1].toUpperCase(),text:letterMatch[2].trim()});
      }
    }
    const answerLetter = gabRaw.charAt(0).toUpperCase();
    if(enunciado.length<20||alts.length<2)return null;
    return {
      enunciado,
      answer:answerLetter,
      kind:'MC',
      alternatives:alts,
      meta:metaHeader,
      topic:metaTopic,
      source:sourceUrl
    };
  }

  return null;
}

function parseSimpleFormat(raw){
  const blocks = raw.split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  const out = [];
  const GAB_REGEX = /(?:gabarito|resposta)\s*[:=\-–—]?\s*\(?\s*(c|e|certo|errado|verdadeiro|falso|v|f)\s*\)?\s*\.?\s*$/i;
  const ANSWER_LINE_REGEX = /^\s*\(?\s*(c|e|certo|errado|verdadeiro|falso|v|f)\s*\)?\s*\.?\s*$/i;
  const normAnswer = s => {
    const v = (s||'').toLowerCase().trim();
    if(v==='c'||v==='certo'||v==='verdadeiro'||v==='v')return 'C';
    if(v==='e'||v==='errado'||v==='falso'||v==='f')return 'E';
    return null;
  };
  blocks.forEach(block=>{
    let enun = block, answer = null;
    const lines = block.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length>=2){
      const last = lines[lines.length-1];
      const m2 = last.match(ANSWER_LINE_REGEX);
      if(m2){answer = normAnswer(m2[1]);enun = lines.slice(0,-1).join(' ').trim();}
    }
    if(!answer){
      const m2 = block.match(GAB_REGEX);
      if(m2){answer = normAnswer(m2[1]);enun = block.replace(GAB_REGEX,'').trim();}
    }
    enun = enun.replace(/^(?:q(?:uest[aã]o)?\s*)?\d+\s*[.\)\-:]?\s*/i,'').trim();
    if(enun.length>=20&&answer)out.push({enunciado:enun,answer,kind:'CE'});
    else if(enun.length>=20)out.push({enunciado:enun,answer:null,kind:'CE',needsAnswer:true});
  });
  return out;
}

// Pre-fetch cache: keyed by err.id → {promise, result, error}
// Called right after an error is logged, while user is reading the explanation.
// When user clicks "Criar flashcard", the card is usually already ready (instant).
function prefetchErrorCard(err,modelOverride){
  if(!ST.prefetchedCards)ST.prefetchedCards={};
  if(ST.prefetchedCards[err.id])return; // already fetching/fetched
  const prompt = `O candidato errou:

QUESTÃO: ${err.question}
GABARITO: ${err.correctAnswer}
EXPLICAÇÃO: ${err.explanation}
ARMADILHA: ${err.trap} (tipo: ${TRAP_TYPES[err.trapType||0]})
GATILHO: ${err.keyword||''}
TÓPICO: ${err.topic||''}

Gere UM flashcard que RESOLVA a dificuldade. Escolha o tipo de card que melhor ataca este tipo de erro.`;
  const entry = {promise:null,result:null,error:null,startedAt:Date.now()};
  ST.prefetchedCards[err.id] = entry;
  entry.promise = callAPIWithScore('srs','flashcard',SYS_CARD_FROM_ERROR,[{role:'user',content:prompt}],{model:modelOverride},75)
    .then(gated=>{entry.result=gated;return gated;})
    .catch(e=>{entry.error=e;throw e;});
}
function getPrefetchedCard(errId){
  const entry = (ST.prefetchedCards||{})[errId];
  if(!entry)return null;
  return entry;
}
function clearPrefetchedCard(errId){
  if(ST.prefetchedCards&&ST.prefetchedCards[errId])delete ST.prefetchedCards[errId];
}

async function generateCardFromError(err,btn,modelOverride,ctaRow,quick){
  const orig = btn.textContent;
  btn.disabled=true;btn.textContent='Gerando...';
  try{
    // Try prefetched result first
    let gated;
    const pre = getPrefetchedCard(err.id);
    if(pre){
      if(pre.result){
        // Already done
        gated = pre.result;
      } else if(pre.promise&&!pre.error){
        // Still in flight — await it
        btn.textContent='Quase pronto...';
        gated = await pre.promise;
      }
    }
    if(!gated){
      // No prefetch or prefetch failed — fetch now
      const prompt = `O candidato errou:

QUESTÃO: ${err.question}
GABARITO: ${err.correctAnswer}
EXPLICAÇÃO: ${err.explanation}
ARMADILHA: ${err.trap} (tipo: ${TRAP_TYPES[err.trapType||0]})
GATILHO: ${err.keyword||''}
TÓPICO: ${err.topic||''}

Gere UM flashcard que RESOLVA a dificuldade. Escolha o tipo de card que melhor ataca este tipo de erro.`;
      gated = await callAPIWithScore('srs','flashcard',SYS_CARD_FROM_ERROR,[{role:'user',content:prompt}],{model:modelOverride},75);
    }
    clearPrefetchedCard(err.id);
    const res = gated.result;
    if(!res||!res.front)throw new Error('Resposta inválida da IA');
    const newCard = {
      id:Date.now()+''+Math.random(),
      front:res.front,back:res.back,
      type:res.type||'concept',
      tags:res.tags||[err.topic||''],
      disciplineId:err.disciplineId,
      nextReview:Date.now(),interval:0,ease:2.5,reviews:0,
      createdAt:Date.now(),
      fromErrorId:err.id,
      generatedBy:modelOverride||DATA.config.model,
      score:res.score||gated.finalScore,
      sourceErrorData:{question:err.question,correctAnswer:err.correctAnswer,explanation:err.explanation,trap:err.trap,keyword:err.keyword,trapType:err.trapType,topic:err.topic}
    };
    ST.lastGenScore = {key:'srs',score:gated.finalScore,regenerated:gated.regenerated,discarded:gated.discarded,count:1};
    btn.disabled=false;btn.textContent=orig;
    if(quick){
      // Skip modal — save directly
      DATA.srs.cards.push(newCard);
      const e2 = DATA.errors.find(x=>x.id===err.id);
      if(e2)e2.hasCard=true;
      save();
      if(typeof showToast==='function')showToast('✓ Flashcard criado e adicionado ao deck.');
      if(ctaRow){
        ctaRow.innerHTML='';
        const done = mk('div','alert alert-accent');done.style.margin='0';
        done.innerHTML='✓ <b>Flashcard criado e adicionado ao deck.</b>';
        ctaRow.appendChild(done);
      }
      render();
    } else {
      showEditCardModal(newCard,true,()=>{
        const e = DATA.errors.find(x=>x.id===err.id);
        if(e)e.hasCard=true;
        save();
        if(ctaRow){
          ctaRow.innerHTML='';
          const done = mk('div','alert alert-accent');done.style.margin='0';
          done.innerHTML='✓ <b>Flashcard criado e adicionado ao deck.</b> Aparecerá para revisão.';
          ctaRow.appendChild(done);
        }
      });
    }
  }catch(e){
    btn.disabled=false;btn.textContent=orig;
    alert('Erro ao gerar card: '+(e.message||e));
  }
}

  const actions = mk('div','flex');actions.style.marginTop='1rem';actions.style.gap='8px';
  const saveB = mkBtn(isNew?'Adicionar ao deck':'Salvar','btn btn-p');
  saveB.addEventListener('click',()=>{
    card.front=inpF.value.trim()||card.front;
    card.back=inpB.value.trim()||card.back;
    card.type=selType;
    card.disciplineId=selD.value;
    card.tags=inpG.value.split(',').map(s=>s.trim()).filter(Boolean);
    card.lastEdited=Date.now();
    if(isNew)DATA.srs.cards.push(card);
    save();
    if(onSave)onSave();
    closeModal();render();
  });
  actions.appendChild(saveB);
  if(!isNew){
    const delB = mkBtn('Remover','btn btn-danger');
    delB.addEventListener('click',()=>{
      if(confirm('Remover este flashcard?')){
        DATA.srs.cards=DATA.srs.cards.filter(c=>c.id!==card.id);
        save();closeModal();render();
      }
    });
    actions.appendChild(delB);
  }
  m.appendChild(actions);
  showModal(m);
}

/* HISTORY — timeline of errors */
/* ===== HISTORY — ferramenta ativa de revisão ===== */

// Error signature — identifies "same question" for recurrence tracking
function errSignature(err){
  return (err.question||'').slice(0,120).toLowerCase().replace(/\s+/g,' ').trim();
}
// How many times each signature appears in the errors array
function errRecurrenceMap(){
  const map = {};
  (DATA.errors||[]).forEach(e=>{
    const sig = errSignature(e);
    map[sig] = (map[sig]||0)+1;
  });
  return map;
}
// Status: 'unreviewed' | 'reviewing' | 'fixed'
function errStatus(err){
  if(err.hasCard&&err.retryOk)return 'fixed';
  if(err.retryCount>0)return 'reviewing';
  return 'unreviewed';
}
// Highlight keyword in question text (safe HTML escape)
function escapeHTML(s){return (s||'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function highlightKeyword(text,keyword){
  if(!keyword||!text)return escapeHTML(text);
  const kw = keyword.trim();
  if(kw.length<2)return escapeHTML(text);
  // Case-insensitive, global
  const re = new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escapeHTML(text).replace(re,'<mark class="kw-hl">$1</mark>');
}
// Generate short insight based on error patterns in filtered subset
function errorInsight(errors){
  if(errors.length<3)return null;
  // Most frequent trap across errors
  const trapCount = {};
  errors.forEach(e=>{const t=e.trapType||0;trapCount[t]=(trapCount[t]||0)+1;});
  const sorted = Object.entries(trapCount).sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0)return null;
  const [dominantTrap,count] = sorted[0];
  const ratio = count/errors.length;
  if(ratio<0.35||count<3)return null;
  // Most frequent discipline in this trap
  const discCount = {};
  errors.filter(e=>(e.trapType||0)===parseInt(dominantTrap)).forEach(e=>{
    const d = e.disciplineId;if(d)discCount[d]=(discCount[d]||0)+1;
  });
  const topDisc = Object.entries(discCount).sort((a,b)=>b[1]-a[1])[0];
  const trap = TRAP_TYPES[parseInt(dominantTrap)];
  if(topDisc){
    const disc = getDiscipline(topDisc[0]);
    const dName = disc?disc.name:'alguma disciplina';
    return `💡 Você tem tido dificuldade com "${trap}", especialmente em ${dName} (${count} erros deste tipo).`;
  }
  return `💡 Padrão identificado: "${trap}" aparece em ${Math.round(ratio*100)}% dos seus erros.`;
}

// Quick-review mode — sequential drill through errors
function startHistoryQuickReview(errorsList){
  if(!errorsList||errorsList.length===0)return;
  ST.historyReviewList = errorsList.map(e=>e.id);
  ST.historyReviewIdx = 0;
  ST.historyReviewAnswered = false;
  ST.historyReviewAnswer = null;
  ST.historyReviewStats = {correct:0,answered:0};
  ST.historyReviewActive = true;
  render();
}
function exitHistoryQuickReview(){
  ST.historyReviewActive = false;
  ST.historyReviewList = null;
  render();
}
function historyReviewNext(){
  ST.historyReviewIdx += 1;
  ST.historyReviewAnswered = false;
  ST.historyReviewAnswer = null;
  render();
}
function historyReviewAnswer(ans){
  const errId = ST.historyReviewList[ST.historyReviewIdx];
  const err = (DATA.errors||[]).find(e=>e.id===errId);
  if(!err)return;
  ST.historyReviewAnswered = true;
  ST.historyReviewAnswer = ans;
  const ok = ans===err.correctAnswer;
  err.retryCount = (err.retryCount||0)+1;
  err.lastRetryAt = Date.now();
  if(ok){err.retryOk = true;err.retryCorrectCount=(err.retryCorrectCount||0)+1;}
  ST.historyReviewStats.answered += 1;
  if(ok)ST.historyReviewStats.correct += 1;
  save();render();
}

// Individual retry on a card (inline, not in quick-review mode)
function historyRetryToggle(errId){
  if(!ST.historyRetrying)ST.historyRetrying={};
  if(ST.historyRetrying[errId]){
    delete ST.historyRetrying[errId];
    delete (ST.historyRetryAnswer||{})[errId];
  } else {
    ST.historyRetrying[errId] = true;
  }
  render();
}
function historyRetrySubmit(errId,ans){
  const err = (DATA.errors||[]).find(e=>e.id===errId);
  if(!err)return;
  if(!ST.historyRetryAnswer)ST.historyRetryAnswer={};
  ST.historyRetryAnswer[errId] = ans;
  err.retryCount = (err.retryCount||0)+1;
  err.lastRetryAt = Date.now();
  if(ans===err.correctAnswer){err.retryOk = true;err.retryCorrectCount=(err.retryCorrectCount||0)+1;}
  save();render();
}

  }
  if(entry.errors.length>0){
    const s = mk('span','map-stat-chip');s.innerHTML=`❌ <b>${entry.errors.length}</b> erro${entry.errors.length>1?'s':''}`;
    statsBar.appendChild(s);
  }
  if(entry.errorsRecent>0){
    const s = mk('span','map-stat-chip red');s.innerHTML=`🔴 <b>${entry.errorsRecent}</b> em 7 dias`;
    statsBar.appendChild(s);
  }
  if(entry.cards.length>0){
    const s = mk('span','map-stat-chip');s.innerHTML=`🎴 <b>${entry.cards.length}</b> flashcard${entry.cards.length>1?'s':''}`;
    statsBar.appendChild(s);
  }
  if(entry.questions.length>0){
    const s = mk('span','map-stat-chip');s.innerHTML=`📝 <b>${entry.questions.length}</b> questão(ões)`;
    statsBar.appendChild(s);
  }
  const dom = topicDominantTrap(entry);
  if(dom){
    const s = mk('span','map-stat-chip amber');s.innerHTML=`🎯 Cai em: <b>${TRAP_TYPES[dom.trapType]}</b> (${dom.count}×)`;
    statsBar.appendChild(s);
  }
  panel.appendChild(statsBar);

  // Teoria (AI summary)
  const key = topicKey(sel.disciplineId,sel.rawTopic||entry.name);
  const cached = DATA.topicSummaries[key];
  const teoriaSec = mk('div','map-section');
  const teoriaLbl = mk('div','section-label');teoriaLbl.textContent='📖 Teoria';teoriaLbl.style.marginBottom='.5rem';
  teoriaSec.appendChild(teoriaLbl);
  if(cached){
    if(cached.summary){
      const s = mk('p','map-summary');s.textContent=cached.summary;
      teoriaSec.appendChild(s);
    }
    if(cached.key_points&&cached.key_points.length>0){
      const kpLbl = mk('div','map-sublbl');kpLbl.textContent='Pontos-chave';
      teoriaSec.appendChild(kpLbl);
      const ul = mk('ul','map-kp');
      cached.key_points.forEach(p=>{const li=mk('li');li.textContent=p;ul.appendChild(li);});
      teoriaSec.appendChild(ul);
    }
    if(cached.watch_out){
      const wo = mk('p','map-watch');wo.innerHTML = `<b>⚠ Onde a banca pega:</b> ${escapeHTML(cached.watch_out)}`;
      teoriaSec.appendChild(wo);
    }
    const regen = mkBtn('🔄 Regerar resumo','btn btn-sm');regen.style.marginTop='.5rem';
    regen.addEventListener('click',async()=>{
      regen.disabled=true;regen.textContent='Gerando...';
      delete DATA.topicSummaries[key];save();
      try{await generateTopicSummary(sel.disciplineId,sel.rawTopic||entry.name);}catch(e){alert('Erro: '+(e.message||e));}
      render();
    });
    teoriaSec.appendChild(regen);
  } else {
    const info = mk('p','txt3');info.style.marginBottom='.5rem';
    info.textContent='Ainda sem resumo. Gere um agora (usa o conteúdo carregado, cacheado permanentemente).';
    teoriaSec.appendChild(info);
    const genBtn = mkBtn('📖 Gerar resumo','btn btn-p btn-sm');
    genBtn.addEventListener('click',async()=>{
      genBtn.disabled=true;genBtn.textContent='Gerando...';
      try{await generateTopicSummary(sel.disciplineId,sel.rawTopic||entry.name);}catch(e){alert('Erro: '+(e.message||e));}
      render();
    });
    teoriaSec.appendChild(genBtn);
  }
  panel.appendChild(teoriaSec);

  // Flashcards
  if(entry.cards.length>0){
    const sec = mk('div','map-section');
    const lbl = mk('div','section-label');lbl.textContent=`🎴 Flashcards (${entry.cards.length})`;lbl.style.marginBottom='.5rem';
    sec.appendChild(lbl);
    // Prioritize: from errors + low ease
    const sorted = [...entry.cards].sort((a,b)=>{
      const errA = a.fromErrorId?1:0;
      const errB = b.fromErrorId?1:0;
      if(errA!==errB)return errB-errA;
      return (a.ease||2.5)-(b.ease||2.5);
    });
    sorted.slice(0,5).forEach(c=>{
      const item = mk('div','map-card-item');
      const front = mk('p','map-card-front');
      front.textContent = (c.front||'').slice(0,110)+(c.front&&c.front.length>110?'...':'');
      item.appendChild(front);
      const meta = mk('p','map-card-meta');
      const parts = [];
      if(c.fromErrorId)parts.push('<span class="tag-err">do erro</span>');
      if((c.ease||2.5)<2)parts.push('<span class="tag-hard">difícil</span>');
      const typeInfo = CARD_TYPES[c.type];
      if(typeInfo)parts.push(`${typeInfo.emoji} ${typeInfo.label}`);
      meta.innerHTML = parts.join(' · ');
      item.appendChild(meta);
      sec.appendChild(item);
    });
    if(entry.cards.length>5){
      const more = mk('p','txt3');more.style.fontSize='11px';more.textContent=`+${entry.cards.length-5} outros`;
      sec.appendChild(more);
    }
    const reviewBtn = mkBtn('🎴 Revisar flashcards deste tópico','btn btn-sm');reviewBtn.style.marginTop='.5rem';
    reviewBtn.addEventListener('click',()=>{
      ST.view='srs';
      ST.srsSubview='study';
      ST.srsStudyDisc = sel.disciplineId;
      render();
    });
    sec.appendChild(reviewBtn);
    panel.appendChild(sec);
  }

  // Erros
  if(entry.errors.length>0){
    const sec = mk('div','map-section');
    const lbl = mk('div','section-label');lbl.textContent=`❌ Erros (${entry.errors.length})`;lbl.style.marginBottom='.5rem';
    sec.appendChild(lbl);
    const recent = sortByRecency(entry.errors).slice(0,3);
    recent.forEach(e=>{
      const item = mk('div','map-err-item');
      const qt = mk('p','map-err-q');
      qt.textContent = e.question.slice(0,130)+(e.question.length>130?'...':'');
      item.appendChild(qt);
      const meta = mk('p','map-err-meta');
      meta.innerHTML = `<span class="badge b-err">${TRAP_TYPES[e.trapType||0]}</span> · Gab: ${e.correctAnswer} · ${formatErrorDate(e.date)}`;
      item.appendChild(meta);
      sec.appendChild(item);
    });
    if(entry.errors.length>3){
      const more = mk('p','txt3');more.style.fontSize='11px';more.textContent=`+${entry.errors.length-3} outros`;
      sec.appendChild(more);
    }
    const viewBtn = mkBtn('📜 Ver todos no Histórico','btn btn-sm');viewBtn.style.marginTop='.5rem';
    viewBtn.addEventListener('click',()=>{
      ST.view='history';
      ST.historyFilter = sel.disciplineId;
      render();
    });
    sec.appendChild(viewBtn);
    // Drill button if dominant trap
    if(dom){
      const drillBtn = mkBtn(`🎯 Drill: ${TRAP_TYPES[dom.trapType]}`,'btn btn-sm');
      drillBtn.style.cssText='margin-top:.5rem;margin-left:6px';
      drillBtn.addEventListener('click',()=>{
        ST.view='drill';
        ST.drillTarget = dom.trapType;
        ST.drillQ=null;ST.drillFb=null;ST.drillAnswered=false;
        render();
      });
      sec.appendChild(drillBtn);
    }
    panel.appendChild(sec);
  }

  // Questões do banco
  if(entry.questions.length>0){
    const sec = mk('div','map-section');
    const lbl = mk('div','section-label');
    lbl.textContent=`📝 Questões no banco (${entry.questions.length})`;lbl.style.marginBottom='.5rem';
    sec.appendChild(lbl);
    const mini = mk('p','txt3');mini.style.cssText='font-size:11.5px;margin-bottom:.5rem';
    mini.textContent = `${entry.importedCount} importadas · ${entry.aiCount} geradas pela IA`;
    sec.appendChild(mini);
    const bankBtn = mkBtn('📝 Ver no Banco','btn btn-sm');
    bankBtn.addEventListener('click',()=>{
      ST.view='imported';
      ST.importedSubview='list';
      // Use correct state key (importedFilters is wrong — the actual key is 'importedFilters' tied to getBankFilters)
      ST.importedFilters = {disc:sel.disciplineId,source:'all',kind:'all',banca:'all',cargo:'all',topic:entry.name,perf:'all',search:''};
      render();
    });
    sec.appendChild(bankBtn);
    panel.appendChild(sec);
  }

  return panel;
}

function renderHistory(){
  const wrap = mk('div','fade');

  // Quick-review mode (full-screen drill)
  if(ST.historyReviewActive&&ST.historyReviewList){
    return renderHistoryQuickReview(wrap);
  }

  const h = mk('h1');h.textContent='Histórico de Erros';
  const sub = mk('p','txt2');sub.style.marginBottom='1rem';
  sub.textContent='Revise, tente novamente e transforme erros em acertos. Cada tentativa é registrada.';
  wrap.appendChild(h);wrap.appendChild(sub);

  const all = DATA.errors||[];
  if(all.length===0){
    wrap.appendChild(infoBox('Nenhum erro registrado ainda. Conforme você resolve questões, os erros aparecem aqui.'));
    return wrap;
  }

  // Discipline filter chips
  const actDiscs = activeDisciplines();
  const discsWithErrors = actDiscs.filter(d=>all.some(e=>e.disciplineId===d.id));
  const filter = ST.historyFilter||'all';
  if(discsWithErrors.length>=2){
    const filterRow = mk('div','disc-filter');filterRow.style.marginBottom='.75rem';
    const allChip = mk('button','disc-chip'+(filter==='all'?' on':''));
    if(filter==='all'){allChip.style.background='var(--surface2)';allChip.style.color='var(--text)';}
    const allDot = mk('span','dot');allDot.style.background='var(--text2)';
    const allNm = mk('span');allNm.textContent='Todas';
    const allCn = mk('span','count');allCn.textContent=all.length;
    allChip.appendChild(allDot);allChip.appendChild(allNm);allChip.appendChild(allCn);
    allChip.addEventListener('click',()=>{ST.historyFilter='all';render();});
    filterRow.appendChild(allChip);
    discsWithErrors.forEach(d=>{
      const cnt = all.filter(e=>e.disciplineId===d.id).length;
      const chip = mk('button','disc-chip'+(filter===d.id?' on':''));
      if(filter===d.id){chip.style.background=d.color+'22';chip.style.color=d.color;}
      const dot = mk('span','dot');dot.style.background=d.color;
      const nm = mk('span');nm.textContent=d.name;
      const cn = mk('span','count');cn.textContent=cnt;
      chip.appendChild(dot);chip.appendChild(nm);chip.appendChild(cn);
      chip.addEventListener('click',()=>{ST.historyFilter=d.id;render();});
      filterRow.appendChild(chip);
    });
    wrap.appendChild(filterRow);
  }

  // Apply filter
  const filtered = sortByRecency(filter==='all'?all:all.filter(e=>e.disciplineId===filter));

  // Empty filter state
  if(filtered.length===0){
    wrap.appendChild(infoBox('Nenhum erro nessa disciplina.'));
    return wrap;
  }

  // INSIGHT (Parte 10) — small banner at top
  const insight = errorInsight(filtered);
  if(insight){
    const ins = mk('div','history-insight');
    ins.textContent = insight;
    wrap.appendChild(ins);
  }

  // QUICK REVIEW BUTTON (Parte 2)
  const DAY = 24*60*60*1000;
  const recentErrors = filtered.filter(e=>Date.now()-(e.date||0)<=DAY);
  const reviewSource = recentErrors.length>=3 ? recentErrors : filtered.slice(0,10);
  if(reviewSource.length>=3){
    const qrWrap = mk('div');qrWrap.style.cssText='margin-bottom:1rem';
    const qrBtn = mk('button','quick-review-btn');
    qrBtn.innerHTML = `<span>⚡ <b>Revisar erros recentes</b></span><span>${reviewSource.length} questão(ões) em sequência</span>`;
    qrBtn.addEventListener('click',()=>startHistoryQuickReview(reviewSource));
    qrWrap.appendChild(qrBtn);
    wrap.appendChild(qrWrap);
  }

  // VIEW MODE TOGGLE: by-time OR by-trap
  const viewMode = ST.historyView||'time';
  const toggleRow = mk('div','flex');toggleRow.style.cssText='gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center';
  const vtLbl = mk('span','txt3');vtLbl.textContent='Agrupar por:';vtLbl.style.fontSize='11px';
  toggleRow.appendChild(vtLbl);
  [['time','📅 Tempo'],['trap','🎯 Tipo de armadilha']].forEach(([val,lbl])=>{
    const b = mk('button','filter-chip'+(viewMode===val?' on':''));
    b.textContent=lbl;
    b.addEventListener('click',()=>{ST.historyView=val;render();});
    toggleRow.appendChild(b);
  });
  wrap.appendChild(toggleRow);

  const recurrence = errRecurrenceMap();

  if(viewMode==='trap'){
    renderHistoryByTrap(wrap,filtered,recurrence);
  } else {
    renderHistoryByTime(wrap,filtered,recurrence);
  }

  return wrap;
}

function renderHistoryByTime(wrap,filtered,recurrence){
  const now = Date.now();
  const DAY = 24*60*60*1000;
  const groups = {recent:[],yesterday:[],older:[]};
  filtered.forEach(e=>{
    const age = now-(e.date||0);
    if(age<=DAY)groups.recent.push(e);
    else if(age<=2*DAY)groups.yesterday.push(e);
    else groups.older.push(e);
  });
  const renderGroup = (label,items,highlight)=>{
    if(items.length===0)return;
    const lbl = sLabel(label+' · '+items.length);
    lbl.style.marginTop='1.25rem';
    wrap.appendChild(lbl);
    items.forEach(e=>wrap.appendChild(renderErrorItem(e,recurrence,highlight)));
  };
  renderGroup('🔴 Últimas 24 horas',groups.recent,true);
  renderGroup('📅 Entre 24 e 48 horas',groups.yesterday,false);
  renderGroup('📜 Mais antigos',groups.older,false);
}

function renderHistoryByTrap(wrap,filtered,recurrence){
  // Group by trap type
  const groups = {};
  filtered.forEach(e=>{
    const t = e.trapType||0;
    if(!groups[t])groups[t]=[];
    groups[t].push(e);
  });
  const sortedTraps = Object.entries(groups).sort((a,b)=>b[1].length-a[1].length);
  sortedTraps.forEach(([trapIdx,items])=>{
    const trapName = TRAP_TYPES[parseInt(trapIdx)];
    const header = mk('div','trap-group-head');
    const title = mk('div');
    title.innerHTML = `<span class="trap-group-title">${trapName}</span> <span class="trap-group-count">${items.length} erro${items.length>1?'s':''}</span>`;
    header.appendChild(title);
    // "Treinar essa armadilha" button — goes to Drill
    const drillBtn = mkBtn('🎯 Treinar esta armadilha','btn btn-sm');
    drillBtn.addEventListener('click',()=>{
      ST.view='drill';
      ST.drillTarget=parseInt(trapIdx);
      ST.drillQ=null;ST.drillFb=null;ST.drillAnswered=false;
      render();
    });
    header.appendChild(drillBtn);
    header.style.marginTop='1rem';
    wrap.appendChild(header);
    items.forEach(e=>wrap.appendChild(renderErrorItem(e,recurrence,false)));
  });
}

function renderErrorItem(e,recurrence,highlight24h){
  const sig = errSignature(e);
  const recurCount = recurrence[sig]||1;
  const status = errStatus(e);
  const retrying = (ST.historyRetrying||{})[e.id];
  const retryAns = (ST.historyRetryAnswer||{})[e.id];

  const it = mk('div','history-card');it.style.marginBottom='.625rem';
  if(highlight24h)it.classList.add('recent-24h');
  if(recurCount>=3)it.classList.add('recurring');
  if(status==='fixed')it.classList.add('fixed');
  it.setAttribute('data-status',status);

  // Header row: date + discipline + trap + status + recurrence badges
  const meta = mk('div','history-card-meta');
  const dateStr = formatErrorDate(e.date);
  const dt = mk('span','txt3');dt.textContent=dateStr;
  meta.appendChild(dt);
  const disc = getDiscipline(e.disciplineId);
  if(disc){
    const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
    const dot = mk('span','disc-dot');dot.style.background=disc.color;
    const dn = mk('span');dn.textContent=disc.name;
    dTag.appendChild(dot);dTag.appendChild(dn);
    meta.appendChild(dTag);
  }
  const trTag = mk('span','badge b-err');trTag.textContent=TRAP_TYPES[e.trapType||0];
  meta.appendChild(trTag);
  // Status
  const statusMap = {unreviewed:['❌ Não revisado','b-err'],reviewing:['🔁 Revisando','b-warn'],fixed:['✅ Corrigido','b-ok']};
  const [statusLbl,statusCls] = statusMap[status];
  const st = mk('span','badge '+statusCls);st.textContent=statusLbl;
  meta.appendChild(st);
  // Recurrence badge
  if(recurCount>=2){
    const rc = mk('span','badge b-warn');rc.title='Esta questão já apareceu outras vezes';
    rc.textContent = recurCount>=3?`🔥 ${recurCount}×`:`↻ ${recurCount}×`;
    meta.appendChild(rc);
  }
  // Has-card indicator
  if(e.hasCard){
    const hc = mk('span','badge b-ok');hc.textContent='🎴';hc.title='Já virou flashcard';
    meta.appendChild(hc);
  }
  it.appendChild(meta);

  // Topic
  if(e.topic){
    const tp = mk('p','txt3');tp.style.cssText='margin:4px 0';tp.textContent=e.topic;
    it.appendChild(tp);
  }

  // Question with keyword highlight
  const qt = mk('p','history-question');
  qt.innerHTML = highlightKeyword(e.question,e.keyword);
  it.appendChild(qt);

  // Retry UI (Parte 1) — inline on this card
  if(retrying){
    const retryBox = mk('div','retry-box');
    if(retryAns){
      // Show result
      const ok = retryAns===e.correctAnswer;
      const res = mk('div','retry-result '+(ok?'ok':'err'));
      const resIcon = ok?'✓ Acertou desta vez!':'✗ Ainda errado';
      res.innerHTML = `<b>${resIcon}</b> · Gabarito: <b>${e.correctAnswer}</b>`;
      retryBox.appendChild(res);
      // Show explanation now
      if(e.explanation){
        const ex = mk('p','retry-expl');ex.textContent=e.explanation;
        retryBox.appendChild(ex);
      }
      const closeBtn = mkBtn(ok?'✅ Concluir revisão':'↻ Tentar novamente','btn btn-sm');
      closeBtn.style.marginTop='.5rem';
      closeBtn.addEventListener('click',()=>{
        if(ok){
          // Close retry UI, mark as fixed
          delete ST.historyRetrying[e.id];
          delete ST.historyRetryAnswer[e.id];
        } else {
          // Allow another try
          delete ST.historyRetryAnswer[e.id];
        }
        render();
      });
      retryBox.appendChild(closeBtn);
    } else {
      // Awaiting answer
      const prompt = mk('p','txt2');prompt.style.cssText='margin-bottom:.5rem;font-size:12.5px';
      prompt.textContent='Responda sem olhar o gabarito:';
      retryBox.appendChild(prompt);
      const btnRow = mk('div','flex');btnRow.style.gap='6px';
      ['C','E'].forEach(a=>{
        const b = mkBtn(a==='C'?'Certo':'Errado','btn btn-ans '+(a==='C'?'btn-c':'btn-e'));
        b.addEventListener('click',()=>historyRetrySubmit(e.id,a));
        btnRow.appendChild(b);
      });
      retryBox.appendChild(btnRow);
      const cancel = mkBtn('Cancelar','btn btn-sm');cancel.style.cssText='margin-top:.5rem;background:transparent;border:none;color:var(--text3);padding:4px 0';
      cancel.addEventListener('click',()=>historyRetryToggle(e.id));
      retryBox.appendChild(cancel);
    }
    it.appendChild(retryBox);
  } else {
    // Normal mode: show answer + collapsible explanation
    const ansRow = mk('div','history-answer');
    ansRow.innerHTML = `<span>Gabarito:</span> <b>${e.correctAnswer}</b>`;
    it.appendChild(ansRow);
    // Collapsible explanation
    if(e.explanation){
      const expId = 'exp-'+e.id;
      const expanded = (ST.historyExpandedExpl||{})[e.id];
      const expBtn = mk('button','exp-toggle-btn');
      expBtn.innerHTML = expanded?'▼ Esconder explicação':'▶ Ver explicação';
      expBtn.addEventListener('click',()=>{
        if(!ST.historyExpandedExpl)ST.historyExpandedExpl={};
        ST.historyExpandedExpl[e.id] = !expanded;render();
      });
      it.appendChild(expBtn);
      if(expanded){
        const expBox = mk('div','history-expl-box');
        const expTxt = mk('p');expTxt.style.cssText='margin:0;font-size:12.5px;line-height:1.6';expTxt.textContent=e.explanation;
        expBox.appendChild(expTxt);
        if(e.trap){
          const trp = mk('p');trp.style.cssText='margin:6px 0 0;font-size:11.5px;color:var(--text2)';
          trp.innerHTML = `<b>Armadilha:</b> ${escapeHTML(e.trap)}`;
          expBox.appendChild(trp);
        }
        if(e.keyword){
          const kw = mk('p');kw.style.cssText='margin:4px 0 0;font-size:11.5px;color:var(--text2)';
          kw.innerHTML = `<b>Gatilho:</b> <mark class="kw-hl">${escapeHTML(e.keyword)}</mark>`;
          expBox.appendChild(kw);
        }
        it.appendChild(expBox);
      }
    }
  }

  // Actions row (only when not retrying)
  if(!retrying){
    const actions = mk('div','history-actions');
    // Retry button (Parte 1)
    if(!retrying){
      const retryBtn = mkBtn('🔁 Tentar novamente','btn btn-sm');
      retryBtn.addEventListener('click',()=>historyRetryToggle(e.id));
      actions.appendChild(retryBtn);
    }
    // Flashcard actions (Parte 4) — two variants
    if(!e.hasCard){
      const quickCard = mkBtn('⚡ Gerar flashcard','btn btn-sm');
      quickCard.title = 'Gera e salva direto, sem abrir editor';
      quickCard.style.cssText='border-color:var(--accent);color:var(--accent-text)';
      quickCard.addEventListener('click',()=>generateCardFromError(e,quickCard,null,null,true));
      actions.appendChild(quickCard);
      const editCard = mkBtn('✏️ Gerar e editar','btn btn-sm');
      editCard.title = 'Gera e abre o editor para você revisar antes de salvar';
      editCard.addEventListener('click',()=>generateCardFromError(e,editCard));
      actions.appendChild(editCard);
    } else {
      const done = mk('span','badge b-ok');done.textContent='✓ Flashcard criado';
      actions.appendChild(done);
    }
    // Ver na matéria (contextual)
    if(e.topic){
      const mapBtn = mkBtn('🗺️ Ver na matéria','btn btn-sm');
      mapBtn.title='Abrir este tópico no Mapa da Matéria';
      mapBtn.addEventListener('click',()=>mapNavigate(e.disciplineId,e.topic));
      actions.appendChild(mapBtn);
    }
    it.appendChild(actions);
  }
  return it;
}

function renderHistoryQuickReview(wrap){
  const total = ST.historyReviewList.length;
  const idx = ST.historyReviewIdx;
  const errId = ST.historyReviewList[idx];
  const stats = ST.historyReviewStats;

  // Top bar
  const topBar = mk('div','qr-topbar');
  const exitBtn = mkBtn('← Sair','back-btn');
  exitBtn.addEventListener('click',exitHistoryQuickReview);
  topBar.appendChild(exitBtn);
  const progress = mk('span','txt2');progress.style.cssText='font-size:12.5px';
  progress.textContent = `${idx+1} de ${total} · ${stats.correct}/${stats.answered} acertos`;
  topBar.appendChild(progress);
  wrap.appendChild(topBar);

  if(idx>=total){
    // Complete
    const card = mk('div','card');card.style.cssText='text-align:center;padding:2rem 1rem';
    const big = mk('div');big.style.cssText='font-size:48px;margin-bottom:.5rem';big.textContent='🎉';
    card.appendChild(big);
    const msg = mk('h3');msg.style.marginBottom='.5rem';msg.textContent='Revisão concluída!';
    card.appendChild(msg);
    const pct = stats.answered>0?Math.round(stats.correct/stats.answered*100):0;
    const res = mk('p','txt2');res.textContent=`${stats.correct} de ${stats.answered} acertos (${pct}%)`;
    card.appendChild(res);
    const backBtn2 = mkBtn('Voltar ao histórico','btn btn-p');backBtn2.style.marginTop='1rem';
    backBtn2.addEventListener('click',exitHistoryQuickReview);
    card.appendChild(backBtn2);

      b.addEventListener('click',()=>historyReviewAnswer(a));

    });
    wrap.appendChild(br);
  } else {
    const ok = ST.historyReviewAnswer===err.correctAnswer;
    const fb = mk('div','fb-card fade '+(ok?'ok':'err'));
    const badge = mk('span','badge '+(ok?'b-ok':'b-err'));
    badge.textContent = ok?'✓ Correto!':`✗ Incorreto · Gabarito: ${err.correctAnswer}`;
    fb.appendChild(badge);
    if(err.explanation){
      const ex = mk('p');ex.style.cssText='margin-top:.75rem;font-size:13px;line-height:1.6';
      ex.innerHTML = highlightKeyword(err.explanation,err.keyword);
      fb.appendChild(ex);

      const tr = mk('p','txt2');tr.style.cssText='margin-top:.5rem;font-size:12px';
      tr.innerHTML = `<b>Armadilha:</b> ${escapeHTML(err.trap)}`;
      fb.appendChild(tr);
    }
    const nextBtn = mkBtn(idx===total-1?'Finalizar →':'Próximo erro →','btn btn-p');
    nextBtn.style.marginTop='.875rem';
    nextBtn.addEventListener('click',historyReviewNext);
    fb.appendChild(nextBtn);
    wrap.appendChild(fb);
  }
  return wrap;
}

function formatErrorDate(ts){
  if(!ts)return '';
  const d = new Date(ts);
  const now = Date.now();
  const age = now-ts;
  if(age<60*1000)return 'agora';
  if(age<60*60*1000)return Math.floor(age/60000)+' min atrás';
  if(age<24*60*60*1000)return Math.floor(age/3600000)+' h atrás';
  if(age<7*24*60*60*1000)return Math.floor(age/(24*3600000))+' d atrás';
  const pad = n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* TURBO REVIEW — orchestrates SRS cards, recent errors, new questions from weak disciplines */
function turboWorstDiscipline(){
  // Worst = lowest accuracy among disciplines with 3+ attempts, else disc with most errors
  const byD = DATA.session.byDiscipline||{};
  const active = activeDisciplines();
  let worst = null, worstPct = 101;
  active.forEach(d=>{
    const st = byD[d.id];
    if(st&&st.total>=3){
      const pct = st.correct/st.total*100;
      if(pct<worstPct){worstPct=pct;worst=d;}
    }
  });
  if(worst)return worst;
  // Fallback: discipline with highest weighted error score (recent errors count more)
  const errScores = {};
  (DATA.errors||[]).forEach(e=>{
    if(e.disciplineId)errScores[e.disciplineId]=(errScores[e.disciplineId]||0)+errorWeight(e);
  });
  const sorted = Object.entries(errScores).sort((a,b)=>b[1]-a[1]);
  if(sorted.length>0){const d = getDiscipline(sorted[0][0]);if(d&&d.active)return d;}
  return active[0]||null;
}

function turboStart(){
  ST.turbo = {
    active:true,mode:null,item:null,step:'loading',
    card:null,q:null,fb:null,showBack:false,answered:false,loading:false,
    stats:{srs:0,errors:0,questions:0,correct:0,startTime:Date.now()}
  };
  ST.view='turbo';
  turboNext();
}

function turboExit(){
  ST.turbo.active=false;
  ST.view='dashboard';render();
}

// Decide next item: SRS card > recent error → flashcard > new question from weak disc
// Returns {type:'srs',card} | {type:'error',err} | {type:'question'} | {type:'done'}
function turboPickNext(){
  // 1. SRS cards due (respects active disciplines)
  const due = srsActiveDue('all');
  if(due.length>0)return {type:'srs',card:due[0]};
  // 2. Errors without flashcard, most recent first (top 50)
  const recent = prioritizedErrors(true).slice(0,50);
  if(recent.length>0)return {type:'error',err:recent[0]};
  // 3. New question from weakest discipline
  return {type:'question'};
}

async function turboNext(){
  const t = ST.turbo;
  t.card=null;t.q=null;t.fb=null;t.showBack=false;t.answered=false;t.step='loading';t.loading=true;
  render();
  const pick = turboPickNext();
  t.mode = pick.type;
  if(pick.type==='srs'){
    t.card = pick.card;t.step='card';t.loading=false;
    render();return;
  }
  if(pick.type==='error'){
    t.item = pick.err;
    // Use the error itself as a quick review step: show the question + explanation (no AI call needed)
    t.step='errorReview';t.loading=false;
    render();return;
  }
  // question mode: fetch via practice prompt
  t.step='question';
  try{
    const worst = turboWorstDiscipline();
    const hint = worst?` Priorize o tópico da disciplina "${worst.name}".`:'';
    const res = await callAPI(SYS_PRACT,[{role:'user',content:'Questão para revisão turbo.'+hint}]);
    t.q = res;t.loading=false;render();
  }catch(e){
    t.loading=false;t.error=e.message||'erro';
    render();
  }
}

async function turboSubmitAnswer(answer){
  const t = ST.turbo;
  if(t.answered||t.loading)return;
  t.answered=true;t.loading=true;render();
  try{
    const hist = [{role:'user',content:'Questão para revisão turbo.'},{role:'assistant',content:JSON.stringify(t.q)},{role:'user',content:'Resposta: '+answer}];
    const res = await callAPI(SYS_PRACT,hist);
    const ok = res.is_correct;
    // Update stats
    t.stats.questions+=1;
    if(ok)t.stats.correct+=1;
    DATA.session.total+=1;if(ok)DATA.session.correct+=1;
    if(!ok){const tt=res.trap_type??0;DATA.session.dna[tt]=(DATA.session.dna[tt]||0)+1;}
    const discId = inferDiscipline(t.q.topic||'');
    updateByDisc(discId,ok);
    save();
    let errCtx=null;
    if(!ok){
      errCtx=logError({question:t.q.question,correct_answer:t.q.correct_answer,explanation:res.explanation,trap:res.trap,keyword:res.keyword,trap_type:res.trap_type,topic:t.q.topic,method:'turbo'});
    }
    t.fb = {ok,explanation:res.explanation,trap:res.trap,keyword:res.keyword,errCtx};
    t.loading=false;
    render();
  }catch(e){
    t.answered=false;t.loading=false;
    alert('Erro: '+(e.message||e));
    render();
  }
}

  htHead.innerHTML = `<span>💡 Como exportar do TEC Concursos</span><span class="howto-caret">${htExpanded?'▼':'▶'}</span>`;
  htHead.addEventListener('click',()=>{ST.importHowtoOpen=!htExpanded;render();});
  howto.appendChild(htHead);
  if(htExpanded){
    const body = mk('div','import-howto-body');
    body.innerHTML = `
      <p><b>Passo a passo:</b></p>
      <ol>
        <li>No TEC, abra o caderno ou lista de questões que deseja importar.</li>
        <li>Clique em <b>Imprimir</b> no menu superior.</li>
        <li>Configure:
          <ul>
            <li><b>Imprimir gabaritos:</b> "Junto com cada questão"</li>
            <li><b>Imprimir cabeçalho:</b> "Com matéria e assunto"</li>
            <li><b>Quantidade máxima de questões:</b> o total desejado</li>
            <li><b>Imprimir QR code:</b> Não (recomendado)</li>
          </ul>
        </li>
        <li>Clique em <b>IMPRIMIR CADERNO</b>. Na janela de impressão, escolha <b>"Salvar como PDF"</b>.</li>
        <li>Volte aqui e <b>carregue o PDF</b> usando o botão abaixo, ou copie o texto manualmente.</li>
      </ol>
      <p class="muted">O sistema remove automaticamente cabeçalhos, URLs de ordenação e QR codes do PDF do TEC.</p>
    `;
    howto.appendChild(body);
  }
  card.appendChild(howto);

  // Import mode tabs
  const modeRow = mk('div','flex');modeRow.style.cssText='gap:6px;margin:1rem 0 .75rem';
  const mode = ST.importMode||'text';
  [['text','📝 Colar texto'],['pdf','📄 Importar PDF']].forEach(([v,lbl])=>{
    const b = mk('button','filter-chip'+(mode===v?' on':''));
    b.textContent=lbl;
    b.addEventListener('click',()=>{ST.importMode=v;render();});
    modeRow.appendChild(b);
  });
  card.appendChild(modeRow);

  if(mode==='pdf'){
    // PDF upload area
    const pdfArea = mk('div','pdf-import-area');
    if(ST.importPdfLoading){
      pdfArea.innerHTML = '<div class="loading-row"><span class="spinner"></span> <span id="pdf-import-progress">'+(ST.importPdfProgress||'Processando PDF...')+'</span></div>';
    } else {
      const uploadLbl = mk('label','pdf-upload-btn');
      uploadLbl.innerHTML = '<span class="sib-icon">📄</span><span class="sib-body"><b>Selecionar PDF do TEC</b><span>Extrai texto e limpa cabeçalhos automaticamente</span></span>';
      const pdfInp = mk('input');pdfInp.type='file';pdfInp.accept='.pdf,application/pdf';pdfInp.style.display='none';
      pdfInp.addEventListener('change',async e=>{
        const file = e.target.files[0];if(!file)return;
        ST.importPdfLoading = true;
        ST.importPdfProgress = 'Carregando...';
        render();
        try{
          const text = await extractPdfText(file,(curr,total)=>{
            ST.importPdfProgress = `Extraindo página ${curr}/${total}...`;
            const progEl = document.getElementById('pdf-import-progress');
            if(progEl)progEl.textContent = ST.importPdfProgress;
          });
          // Clean TEC-specific header noise
          const cleaned = cleanTecPdfText(text);
          ST.importInput.text = cleaned;
          ST.importPreview = parseImportedQuestions(cleaned);
          ST.importPdfLoading = false;
          ST.importPdfProgress = null;
          const parsed = ST.importPreview.filter(q=>q.answer).length;
          if(parsed===0){
            showToast('⚠ Nenhuma questão identificada. Revise o texto extraído e ajuste se necessário.');
          } else {
            showToast(`✓ ${parsed} questão(ões) extraída(s) do PDF.`);
          }
          render();
        }catch(err){
          ST.importPdfLoading = false;
          ST.importPdfProgress = null;
          alert('Erro ao processar PDF: '+(err.message||err));
          render();
        }
      });
      uploadLbl.appendChild(pdfInp);
      uploadLbl.addEventListener('click',()=>pdfInp.click());
      pdfArea.appendChild(uploadLbl);
      const hint = mk('p','txt3');hint.style.cssText='margin-top:.5rem;font-size:11.5px;line-height:1.5';
      hint.innerHTML = 'O texto extraído aparecerá abaixo para você revisar. O parser detecta questões C/E e múltipla escolha automaticamente. Se o TEC mudou o layout e algo não for detectado, ajuste o texto manualmente antes de salvar.';
      pdfArea.appendChild(hint);
    }
    card.appendChild(pdfArea);
  }

  // Text area — always shown (PDF extraction puts content here for editing)
  const textLbl = mk('label');textLbl.textContent = mode==='pdf' ? 'Texto extraído (editável)' : 'Cole o texto aqui';
  textLbl.style.marginTop = mode==='pdf'?'1rem':'.75rem';
  card.appendChild(textLbl);
  if(mode==='text'){
    const tip = mk('p','txt2');tip.style.cssText='margin:0 0 .5rem;font-size:12px';
    tip.innerHTML='<b>Formatos aceitos:</b> TEC Concursos (URL + cabeçalho + enunciado + alternativas + "Gabarito: X") ou formato simples (questões separadas por linha em branco, gabarito em "Gabarito: C" ou linha própria).';
    card.appendChild(tip);
  }
  const ta = mk('textarea');ta.rows=10;
  ta.placeholder='Cole questões do TEC Concursos (com URL e cabeçalho) ou texto simples.';
  ta.value=ST.importInput.text;
  ta.addEventListener('input',e=>{
    ST.importInput.text=e.target.value;
    ST.importPreview=parseImportedQuestions(e.target.value);
    renderPreviewInto(previewArea);
    saveBtn.disabled = ST.importPreview.filter(q=>q.answer).length===0;
  });
  card.appendChild(ta);

  const row = mk('div','grid g2');row.style.marginTop='.75rem';
  const col1 = mk('div');
  const lbl1 = mk('label');lbl1.textContent='Disciplina';
  const selD = mk('select');
  DATA.disciplines.forEach(d=>{
    const o = mk('option');o.value=d.id;o.textContent=d.name;
    if(ST.importInput.disciplineId===d.id)o.selected=true;
    selD.appendChild(o);
  });
  selD.addEventListener('change',e=>{ST.importInput.disciplineId=e.target.value;});
  col1.appendChild(lbl1);col1.appendChild(selD);
  const col2 = mk('div');
  const lbl2 = mk('label');lbl2.textContent='Tópico (opcional)';
  const inpT = mk('input');inpT.type='text';inpT.placeholder='Ex: Ciclo de inteligência';
  inpT.value=ST.importInput.topic;
  inpT.addEventListener('input',e=>{ST.importInput.topic=e.target.value;});
  col2.appendChild(lbl2);col2.appendChild(inpT);
  row.appendChild(col1);row.appendChild(col2);
  card.appendChild(row);
  wrap.appendChild(card);

  const previewTitle = sLabel('Preview (antes de salvar)');
  previewTitle.style.marginTop='1.25rem';
  wrap.appendChild(previewTitle);
  const previewArea = mk('div');
  wrap.appendChild(previewArea);

  function renderPreviewInto(container){
    container.innerHTML='';
    const preview = ST.importPreview||[];
    if(preview.length===0){
      const p = mk('p','txt3');p.textContent='Cole texto no campo acima para ver o preview.';
      container.appendChild(p);return;
    }
    const parsed = preview.filter(q=>q.answer).length;
    const pending = preview.filter(q=>q.needsAnswer).length;
    const mc = preview.filter(q=>q.kind==='MC').length;
    const ce = preview.filter(q=>q.kind==='CE'&&q.answer).length;
    const summary = mk('p','txt2');summary.style.marginBottom='.5rem';
    summary.innerHTML = `<b>${parsed}</b> questão(ões) com gabarito${ce>0?` · <span style="color:var(--accent-text)">${ce} C/E</span>`:''}${mc>0?` · <span style="color:var(--blue-text)">${mc} múltipla escolha</span>`:''}${pending>0?` · <span style="color:var(--amber-text)">${pending} sem gabarito</span>`:''}`;
    container.appendChild(summary);
    preview.forEach((q,i)=>{
      const it = mk('div','card card-pad');it.style.marginBottom='.5rem';
      const headRow = mk('div','flex');headRow.style.cssText='gap:6px;margin-bottom:4px;flex-wrap:wrap;align-items:center';
      const num = mk('span','txt3');num.textContent='Q'+(i+1);
      headRow.appendChild(num);
      if(q.kind==='MC'){
        const k = mk('span','badge b-info');k.textContent='Múltipla escolha';headRow.appendChild(k);
      } else {
        const k = mk('span','badge b-info');k.textContent='C/E';headRow.appendChild(k);
      }
      if(q.meta){
        const mt = mk('span','txt3');mt.style.fontSize='10.5px';mt.textContent=q.meta.slice(0,60)+(q.meta.length>60?'...':'');
        headRow.appendChild(mt);
      }
      it.appendChild(headRow);
      const qt = mk('p','txt');qt.style.cssText='margin:.25rem 0;white-space:pre-wrap';qt.textContent=q.enunciado;
      it.appendChild(qt);
      // Show alternatives for MC
      if(q.kind==='MC'&&q.alternatives){
        const altWrap = mk('div');altWrap.style.cssText='margin:.5rem 0;padding-left:4px';
        q.alternatives.forEach(alt=>{
          const line = mk('p','txt2');line.style.cssText='margin:2px 0';
          const isCorrect = q.answer===alt.letter;
          line.innerHTML=`<b${isCorrect?' style="color:var(--accent-text)"':''}>${alt.letter})</b> ${alt.text}`;
          altWrap.appendChild(line);
        });
        it.appendChild(altWrap);
      }
      if(q.answer){
        const bg = mk('span','badge '+(q.kind==='MC'||q.answer==='C'?'b-ok':'b-err'));
        bg.textContent='Gabarito: '+q.answer;
        it.appendChild(bg);
      } else if(q.needsAnswer){
        const ar = mk('div','flex');ar.style.cssText='gap:6px;margin-top:.5rem';
        const lb = mk('span','txt2');lb.textContent='Definir:';
        const bc = mkBtn('Certo','btn btn-sm');
        bc.addEventListener('click',()=>{q.answer='C';delete q.needsAnswer;renderPreviewInto(container);saveBtn.disabled=false;});
        const be = mkBtn('Errado','btn btn-sm');
        be.addEventListener('click',()=>{q.answer='E';delete q.needsAnswer;renderPreviewInto(container);saveBtn.disabled=false;});
        ar.appendChild(lb);ar.appendChild(bc);ar.appendChild(be);
        it.appendChild(ar);
      }
      container.appendChild(it);
    });
  }

  const saveBtn = mkBtn('Salvar no banco →','btn btn-p');saveBtn.style.marginTop='.75rem';
  saveBtn.disabled=true;
  saveBtn.addEventListener('click',()=>{
    const valid = (ST.importPreview||[]).filter(q=>q.answer);
    if(valid.length===0){alert('Nenhuma questão com gabarito válido.');return;}
    valid.forEach(q=>{
      const rec = {
        id:Date.now()+''+Math.random(),
        enunciado:q.enunciado,
        answer:q.answer,
        kind:q.kind||'CE',
        disciplineId:ST.importInput.disciplineId,
        topic:ST.importInput.topic||q.topic||'',
        source:'imported',
        createdAt:Date.now(),
        attempts:0,correctCount:0
      };
      if(q.kind==='MC'&&q.alternatives)rec.alternatives=q.alternatives;
      if(q.meta)rec.meta=q.meta;
      if(q.source)rec.sourceUrl=q.source;
      DATA.importedQuestions.push(rec);
    });
    save();
    alert(`${valid.length} questão(ões) adicionada(s).`);
    ST.importInput.text='';ST.importPreview=[];
    ST.importedSubview='list';
    render();
  });
  wrap.appendChild(saveBtn);

  if(ST.importInput.text){
    ST.importPreview = parseImportedQuestions(ST.importInput.text);
    renderPreviewInto(previewArea);
    saveBtn.disabled = ST.importPreview.filter(q=>q.answer).length===0;
  } else renderPreviewInto(previewArea);

  return wrap;
}

function renderImportedPractice(wrap){
  const bank = DATA.importedQuestions||[];
  if(bank.length===0){
    wrap.appendChild(infoBox('Importe questões primeiro para praticar.'));
    return wrap;
  }
  const actDiscs = activeDisciplines();
  const discsWithQ = actDiscs.filter(d=>bank.some(q=>q.disciplineId===d.id));
  const filter = ST.importedPracticeDisc||'all';
  if(discsWithQ.length>=2){
    const fr = mk('div','disc-filter');fr.style.marginBottom='1rem';
    const allChip = mk('button','disc-chip'+(filter==='all'?' on':''));
    if(filter==='all'){allChip.style.background='var(--surface2)';allChip.style.color='var(--text)';}
    const d1 = mk('span','dot');d1.style.background='var(--text2)';
    const n1 = mk('span');n1.textContent='Todas';
    allChip.appendChild(d1);allChip.appendChild(n1);
    allChip.addEventListener('click',()=>{ST.importedPracticeDisc='all';ST.importedCurrent=null;ST.importedAnswered=false;render();});
    fr.appendChild(allChip);
    discsWithQ.forEach(d=>{
      const chip = mk('button','disc-chip'+(filter===d.id?' on':''));
      if(filter===d.id){chip.style.background=d.color+'22';chip.style.color=d.color;}
      const dot = mk('span','dot');dot.style.background=d.color;
      const nm = mk('span');nm.textContent=d.name;
      chip.appendChild(dot);chip.appendChild(nm);
      chip.addEventListener('click',()=>{ST.importedPracticeDisc=d.id;ST.importedCurrent=null;ST.importedAnswered=false;render();});
      fr.appendChild(chip);
    });
    wrap.appendChild(fr);
  }
  const pool = filter==='all'?bank:bank.filter(q=>q.disciplineId===filter);
  if(pool.length===0){wrap.appendChild(infoBox('Sem questões nessa disciplina.'));return wrap;}
  if(!ST.importedCurrent||!pool.find(q=>q.id===ST.importedCurrent.id)){
    ST.importedCurrent = pool[Math.floor(Math.random()*pool.length)];
    ST.importedAnswered=false;ST.importedAnswer=null;
  }
  const q = ST.importedCurrent;

  const meta = mk('div','flex');meta.style.cssText='gap:6px;margin-bottom:.5rem;flex-wrap:wrap';
  const disc = getDiscipline(q.disciplineId);
  if(disc){
    const dTag = mk('span','disc-tag');dTag.style.background=disc.color+'22';dTag.style.color=disc.color;
    const dot = mk('span','disc-dot');dot.style.background=disc.color;
    const dn = mk('span');dn.textContent=disc.name;
    dTag.appendChild(dot);dTag.appendChild(dn);meta.appendChild(dTag);
  }
  if(q.topic){const tp = mk('span','topic-tag');tp.textContent=q.topic;tp.style.marginBottom='0';meta.appendChild(tp);}
  const src = mk('span','badge b-info');src.textContent='📋 Importada';meta.appendChild(src);
  wrap.appendChild(meta);

  const qc = mk('div','card fade');
  const qt = mk('p','txt');qt.style.cssText='margin:0;white-space:pre-wrap';qt.textContent=q.enunciado;
  qc.appendChild(qt);
  // Render alternatives inside the card if MC
  if(q.kind==='MC'&&q.alternatives){
    const altWrap = mk('div');altWrap.style.cssText='margin-top:.875rem;display:flex;flex-direction:column;gap:6px';
    q.alternatives.forEach(alt=>{
      const line = mk('p','txt');line.style.cssText='margin:0;padding:6px 8px;border-radius:var(--rs)';
      if(ST.importedAnswered){
        if(alt.letter===q.answer){line.style.background='var(--accent-light)';line.style.color='var(--accent-text)';}
        else if(alt.letter===ST.importedAnswer){line.style.background='var(--red-light)';line.style.color='var(--red-text)';}
      }
      line.innerHTML = `<b>${alt.letter})</b> ${alt.text}`;
      altWrap.appendChild(line);
    });
    qc.appendChild(altWrap);
  }
  wrap.appendChild(qc);

  if(!ST.importedAnswered){
    if(q.kind==='MC'&&q.alternatives){
      // Letter buttons
      const br = mk('div','grid');br.style.cssText='grid-template-columns:repeat(5,1fr);gap:6px;margin-top:.875rem';
      q.alternatives.forEach(alt=>{
        const b = mkBtn(alt.letter,'btn btn-ans');
        b.style.cssText='padding:10px 4px;font-size:14px;font-weight:700';
        b.addEventListener('click',()=>{
          ST.importedAnswered=true;ST.importedAnswer=alt.letter;
          q.attempts=(q.attempts||0)+1;
          const ok = alt.letter===q.answer;
          if(ok)q.correctCount=(q.correctCount||0)+1;
          DATA.session.total+=1;if(ok)DATA.session.correct+=1;
          updateByDisc(q.disciplineId,ok);
          if(!ok){
            const errRec = logError({question:q.enunciado+'\n\nAlternativas:\n'+q.alternatives.map(a=>`${a.letter}) ${a.text}`).join('\n'),correct_answer:q.answer,explanation:'(questão importada — múltipla escolha)',trap:'',keyword:'',trap_type:0,topic:q.topic||'',method:'imported'});
            ST.importedLastErrId = errRec.id;
          } else {
            ST.importedLastErrId = null;
          }
          save();render();
        });
        br.appendChild(b);
      });
      wrap.appendChild(br);
    } else {
      // C/E
      const br = mk('div','flex');br.style.marginTop='.875rem';
      ['C','E'].forEach(a=>{
        const b = mkBtn(a==='C'?'Certo':'Errado','btn btn-ans '+(a==='C'?'btn-c':'btn-e'));
        b.addEventListener('click',()=>{
          ST.importedAnswered=true;ST.importedAnswer=a;
          q.attempts=(q.attempts||0)+1;
          const ok = a===q.answer;
          if(ok)q.correctCount=(q.correctCount||0)+1;
          DATA.session.total+=1;if(ok)DATA.session.correct+=1;
          updateByDisc(q.disciplineId,ok);
          if(!ok){
            const errRec = logError({question:q.enunciado,correct_answer:q.answer,explanation:'(questão importada)',trap:'',keyword:'',trap_type:0,topic:q.topic||'',method:'imported'});
            ST.importedLastErrId = errRec.id;
          } else {
            ST.importedLastErrId = null;
          }
          save();render();
        });
        br.appendChild(b);
      });
      wrap.appendChild(br);
    }
  } else {
    const ok = ST.importedAnswer===q.answer;
    const fb = mk('div','fb-card fade '+(ok?'ok':'err'));
    const badge = mk('span','badge '+(ok?'b-ok':'b-err'));
    badge.textContent = ok?'✓ Correto':`✗ Incorreto · Gabarito: ${q.answer}`;
    fb.appendChild(badge);
    const info = mk('p','txt2');info.style.marginTop='.75rem';
    info.textContent='Questão importada — sem explicação automática. Consulte o comentário original na fonte.';
    fb.appendChild(info);
    const actions = mk('div','flex');actions.style.cssText='margin-top:.875rem;gap:8px;flex-wrap:wrap';
    const nb = mkBtn('Próxima →','btn btn-p');
    nb.addEventListener('click',()=>{
      ST.importedCurrent=null;ST.importedAnswered=false;ST.importedAnswer=null;render();
    });
    actions.appendChild(nb);
    if(q.sourceUrl){
      const srcLink = mk('a');srcLink.href=q.sourceUrl.startsWith('http')?q.sourceUrl:'https://'+q.sourceUrl;
      srcLink.target='_blank';srcLink.rel='noopener';
      srcLink.className='btn';srcLink.style.cssText='font-size:12px;padding:6px 12px;text-decoration:none';
      srcLink.textContent='Ver no TEC ↗';
      actions.appendChild(srcLink);
    }
    if(!ok){
      // Create flashcard button — uses the error just logged
      const errRef = DATA.errors.find(e=>e.id===ST.importedLastErrId);
      if(errRef){
        const ctaRow = mk('div');ctaRow.style.cssText='margin-bottom:.875rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center';
        if(errRef.hasCard){
          const done = mk('div','alert alert-accent');done.style.cssText='margin:0;flex:1;min-width:200px';
          done.innerHTML='✓ <b>Flashcard criado e adicionado ao deck.</b>';
          ctaRow.appendChild(done);
        } else {
          const genBtn = mkBtn('🎴 Criar flashcard deste erro','btn');
          genBtn.style.cssText='border-color:var(--accent);color:var(--accent-text);background:var(--accent-light);font-weight:600';
          genBtn.addEventListener('click',()=>generateCardFromError(errRef,genBtn,null,ctaRow));
          ctaRow.appendChild(genBtn);
        }
        // Ver na matéria
        if(errRef.topic){
          const mapBtn = mkBtn('🗺️ Ver na matéria','btn btn-sm');
          mapBtn.addEventListener('click',()=>mapNavigate(errRef.disciplineId,errRef.topic));
          ctaRow.appendChild(mapBtn);
        }
        fb.insertBefore(ctaRow,actions);
      }
      const exBtn = mkBtn('🤖 Pedir explicação à IA','btn');
      exBtn.addEventListener('click',async()=>{
        exBtn.disabled=true;exBtn.textContent='Pensando...';
        try{
          const qText = q.kind==='MC'?`${q.enunciado}\n\nAlternativas:\n${(q.alternatives||[]).map(a=>`${a.letter}) ${a.text}`).join('\n')}`:q.enunciado;
          const prompt = `QUESTÃO: ${qText}\nGABARITO: ${q.answer}\n\nCandidato respondeu ${ST.importedAnswer} e errou. Explique o gabarito em 2-3 frases, identifique a armadilha e a palavra-gatilho. Responda em JSON:\n{"explanation":"...","trap":"...","keyword":"..."}`;
          const res = await callAPI('Você é professor Cebraspe. Responda SEMPRE em JSON puro, sem markdown.',[{role:'user',content:prompt}]);
          const box = mk('div','meta-box');box.style.marginTop='.75rem';
          const p1 = mk('p');p1.style.margin='0';p1.innerHTML=`<strong>Explicação:</strong> ${res.explanation||''}`;box.appendChild(p1);
          if(res.trap){const p2=mk('p');p2.style.margin='0';p2.innerHTML=`<strong>Armadilha:</strong> ${res.trap}`;box.appendChild(p2);}
          if(res.keyword){const p3=mk('p');p3.style.margin='0';p3.innerHTML=`<strong>Gatilho:</strong> ${res.keyword}`;box.appendChild(p3);}
          fb.insertBefore(box,actions);
          exBtn.remove();
        }catch(e){
          exBtn.disabled=false;exBtn.textContent='🤖 Pedir explicação à IA';
          alert('Erro: '+(e.message||e));
        }
      });
      actions.appendChild(exBtn);
    }
    fb.appendChild(actions);
    wrap.appendChild(fb);
  }
  return wrap;
}

/* REVIEW HUB — entry point for Turbo and Eve with full explanations */
function renderReview(){
  const wrap = mk('div','fade');
  const backB = mkBtn('← Voltar ao painel','back-btn');
  backB.addEventListener('click',()=>{ST.view='dashboard';render();});
  wrap.appendChild(backB);
  const h = mk('h1');h.textContent='Modos de Revisão';
  const sub = mk('p','txt2');sub.style.marginBottom='1.5rem';
  sub.textContent='Dois modos complementares para a reta final de estudos. Escolha conforme sua fase atual e disponibilidade.';
  wrap.appendChild(h);wrap.appendChild(sub);

  // Turbo card
  const turbo = mk('button','rev-hub-card rev-hub-turbo');
  const tHead = mk('div','rev-hub-head');
  const tEm = mk('span','rev-hub-emoji');tEm.textContent='⚡';
  const tTitle = mk('div','rev-hub-title');tTitle.textContent='Revisão Turbo';
  tHead.appendChild(tEm);tHead.appendChild(tTitle);
  turbo.appendChild(tHead);
  const tTag = mk('p','rev-hub-tagline');
  tTag.textContent='Ciclo adaptativo de alta intensidade. Combina três tipos de revisão em loop contínuo, priorizando o que você menos domina.';
  turbo.appendChild(tTag);
  const tBul = mk('ul','rev-hub-bullets');
